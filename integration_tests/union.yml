  - [19]
- sql: "select * from (select a from foo union all select d from bar union all select g from baz union all select a from foobar union all select d from barbaz) as tmp order by a"
  description: "five unions, all operator at positions 1-4"
  expected_names: ["a"]
  expected_types: [int]
