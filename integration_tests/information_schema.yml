#
# Schema
#
schema:
- db: test
  tables:
  - table: foo
    collection: "information_schema_1"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
  - table: bar
    collection: "information_schema_2"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: b
      MongoType: int
      SqlName: b
      SqlType: int
- db: test2
  tables:
  - table: foo
    collection: "information_schema_1"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int

#
# Tests
#
testcases:

# SCHEMATA
- sql: "select * from information_schema.schemata order by schema_name"
  description: "schemata full"
  expected_names: ["CATALOG_NAME", "SCHEMA_NAME", "DEFAULT_CHARACTER_SET_NAME", "DEFAULT_COLLATION_NAME", "SQL_PATH"]
  expected_types: [string, string, string, string, string]
  expected:
  - ["def", "information_schema", "utf8", "utf8_bin", ""]
  - ["def", "test", "utf8", "utf8_bin", ""]
  - ["def", "test2", "utf8", "utf8_bin", ""]

# TABLES
- sql: "select TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME, TABLE_TYPE, TABLE_COLLATION, TABLE_COMMENT from information_schema.tables order by TABLE_SCHEMA, TABLE_NAME"
  description: "tables full"
  expected_names: ["TABLE_CATALOG", "TABLE_SCHEMA", "TABLE_NAME", "TABLE_TYPE", "TABLE_COLLATION", "TABLE_COMMENT"]
  expected_types: [string, string, string, string, string, string]
  expected:
  - ["def", "information_schema", "CHARACTER_SETS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "COLLATIONS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "COLLATION_CHARACTER_SET_APPLICABILITY", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "COLUMNS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "COLUMN_PRIVILEGES", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "ENGINES", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "EVENTS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "FILES", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "GLOBAL_STATUS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "GLOBAL_VARIABLES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "KEY_COLUMN_USAGE", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "PARAMETERS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "PARTITIONS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "PLUGINS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "PROCESSLIST", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "PROFILING", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "REFERENTIAL_CONSTRAINTS", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "ROUTINES", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "information_schema", "SCHEMATA", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "SCHEMA_PRIVILEGES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "SESSION_STATUS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "SESSION_VARIABLES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "STATISTICS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "TABLES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "TABLESPACES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "TABLE_CONSTRAINTS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "TABLE_PRIVILEGES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "TRIGGERS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "USER_PRIVILEGES", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "VIEWS", "SYSTEM VIEW", "utf8_bin",""]
  - ["def", "information_schema", "ndb_transid_mysql_connection_map", "SYSTEM VIEW", "utf8_bin", ""]
  - ["def", "test", "bar", "VIEW", "utf8_bin", "{ \"collectionName\": \"information_schema_2\" }"]
  - ["def", "test", "foo", "VIEW", "utf8_bin", "{ \"collectionName\": \"information_schema_1\" }"]
  - ["def", "test2", "foo", "VIEW", "utf8_bin", "{ \"collectionName\": \"information_schema_1\" }"]

# COLUMNS
- sql: "select * from information_schema.columns where table_schema like 'test%' order by table_schema, table_name, ordinal_position"
  description: "columns full"
  expected_names: ["TABLE_CATALOG", "TABLE_SCHEMA", "TABLE_NAME", "COLUMN_NAME", "ORDINAL_POSITION", "COLUMN_DEFAULT", "IS_NULLABLE", "DATA_TYPE",
    "CHARACTER_MAXIMUM_LENGTH", "CHARACTER_OCTET_LENGTH", "NUMERIC_PRECISION", "NUMERIC_SCALE", "DATETIME_PRECISION", "CHARACTER_SET_NAME",
    "COLLATION_NAME", "COLUMN_TYPE", "COLUMN_KEY", "EXTRA", "PRIVILEGES", "COLUMN_COMMENT"]
  expected_types: [string, string, string, string, int64, string, string, string, int64, int64, int64, int64, int64,
    string, string, string, string, string, string, string]
  expected:
  - ["def", "test", "bar", "id", "0", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"_id\" }"]
  - ["def", "test", "bar", "b", "1", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"b\" }"]
  - ["def", "test", "foo", "id", "0", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"_id\" }"]
  - ["def", "test", "foo", "a", "1", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"a\" }"]
  - ["def", "test2", "foo", "id", "0", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"_id\" }"]
  - ["def", "test2", "foo", "a", "1", ~, "YES", "int", ~, ~, ~, ~, ~, "utf8", "utf8_bin", "int", "", "", "select", "{ \"name\": \"a\" }"]

# GLOBAL_VARIABLES
- sql: "select * from information_schema.global_variables order by variable_name limit 1"
  description: "global variables"
  expected_names: ["VARIABLE_NAME", "VARIABLE_VALUE"]
  expected_types: [string, string]
  expected:
  - ["Ndb_slave_max_replicated_epoch", "unsupported"]

# SESSION VARIABLES
- sql: "select * from information_schema.session_variables order by variable_name limit 1"
  description: "session variables"
  expected_names: ["VARIABLE_NAME", "VARIABLE_VALUE"]
  expected_types: [string, string]
  expected:
  - ["Ndb_slave_max_replicated_epoch", "unsupported"]
