#
# Data
#
data:
- inline:
    db: "test"
    collection: "join_1"
    docs:
    - { _id: 0, a: 1, b: ~ }
    - { _id: 1, a: 2, b: 1 }
    - { _id: 2, a: 3 }
- inline:
    db: "test"
    collection: "join_2"
    docs:
    - { _id: 0, c: 10, d: ~ }
    - { _id: 1, c: 11, d: 1 }
    - { _id: 20, c: 30 }
- inline:
    db: "test"
    collection: "join_3"
    docs:
    - { _id: 0, a: 4, c: 10, d: ~ }
    - { _id: 1, a: 3, c: 11, d: 1 }
    - { _id: 2, a: 14, c: 30 }
    - { _id: 3, c: 30 }
- inline:
    db: "test"
    collection: "join_4"
    docs:
    - { _id: 0, a: 3, b: 5, c: 10, d: ~ }
    - { _id: 1, a: 2, b: 6, c: 11, d: 1 }
    - { _id: 20, c: 30 }
- inline:
    db: "test"
    collection: "join_5"
    docs:
    - { _id: 0, b: 5, c: 10, e: 3}
    - { _id: 1, b: 8, c: 11, e: 5}
    - { _id: 20, c: 30 }
- inline:
    db: "test"
    collection: "join_6"
    docs:
    - { _id: 1, rnum: 0, c1: 10, c2: 15 }
    - { _id: 2, rnum: 1, c1: 20, c2: 25 }
    - { _id: 3, rnum: 2, c2: 50}
- inline:
    db: "test"
    collection: "join_7"
    docs:
    - { _id: 0, c2: "BB"}
    - { _id: 1, c2: "DD"}
    - { _id: 2, c2: "EE"}
    - { _id: 3, c2: "FF"}
- inline:
    db: "test"
    collection: "join_8"
    docs:
    - { _id: 0, a: 1, b: [{c: 1}, {c: 2, d: [5, 6]}]}
    - { _id: 1, a: 1, b: [{c: 1}, {c: 3}]}
    - { _id: 2, a: 2, b: [{c: 2, d: [7]}, {c: 3}]}
- inline:
    db: "test"
    collection: "join_9"
    docs:
    - { _id: 0, a: 3, b: 5, c: 10}

#
# Schema
#
schema:
- db: test
  tables:
  - table: foo
    collection: "join_1"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
    - Name: b
      MongoType: int
      SqlName: b
      SqlType: int
  - table: bar
    collection: "join_2"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: c
      MongoType: int
      SqlName: c
      SqlType: int
    - Name: d
      MongoType: int
      SqlName: d
      SqlType: int
  - table: baz
    collection: "join_3"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
    - Name: c
      MongoType: int
      SqlName: c
      SqlType: int
    - Name: d
      MongoType: int
      SqlName: d
      SqlType: int
  - table: foobar
    collection: "join_4"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
    - Name: b
      MongoType: int
      SqlName: b
      SqlType: int
    - Name: c
      MongoType: int
      SqlName: c
      SqlType: int
    - Name: d
      MongoType: int
      SqlName: d
      SqlType: int
  - table: barbaz
    collection: "join_5"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: b
      MongoType: int
      SqlName: b
      SqlType: int
    - Name: c
      MongoType: int
      SqlName: c
      SqlType: int
    - Name: e
      MongoType: int
      SqlName: e
      SqlType: int
  - table: tjoin1
    collection: "join_6"
    pipeline: []
    columns:
    - Name: _id
      MongoType: int
      SqlName: _id
      SqlType: int
    - Name: c1
      MongoType: float64
      SqlName: c1
      SqlType: float64
    - Name: c2
      MongoType: float64
      SqlName: c2
      SqlType: float64
    - Name: rnum
      MongoType: float64
      SqlName: rnum
      SqlType: float64
  - table: tjoin2
    collection: "join_7"
    pipeline: []
    columns:
    - Name: _id
      MongoType: int
      SqlName: _id
      SqlType: int
    - Name: c2
      MongoType: string
      SqlName: c2
      SqlType: varchar
  - table: parent
    collection: "join_8"
    pipeline: []
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
  - table: child
    collection: "join_8"
    pipeline: [
      $unwind: { path: "$b", includeArrayIndex: "b_idx" }
    ]
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: b_idx
      MongoType: int
      SqlName: b_idx
      SqlType: int
    - Name: b.c
      MongoType: int
      SqlName: c
      SqlType: int
  - table: grandchild
    collection: "join_8"
    pipeline: [
      $unwind: { path: "$b", includeArrayIndex: "b_idx" },
      $unwind: { path: "$b.d", includeArrayIndex: "b.d_idx" }
    ]
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: b_idx
      MongoType: int
      SqlName: b_idx
      SqlType: int
    - Name: b.d_idx
      MongoType: int
      SqlName: d_idx
      SqlType: int
    - Name: b.d
      MongoType: int
      SqlName: d
      SqlType: int
  - table: qux
    collection: "join_9"
    columns:
    - Name: _id
      MongoType: int
      SqlName: id
      SqlType: int
    - Name: a
      MongoType: int
      SqlName: a
      SqlType: int
    - Name: b
      MongoType: int
      SqlName: b
      SqlType: int
    - Name: c
      MongoType: int
      SqlName: c
      SqlType: int
    - Name: d
      MongoType: int
      SqlName: d
      SqlType: int

#
# Tests
#
testcases:

# Cross Joins
- sql: "select * from test.foo, test.bar"
  description: "global star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select foo.*, bar.* from test.foo, test.bar"
  description: "qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from test.foo f, test.bar b"
  description: "aliased qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from test.foo f, (select * from test.bar) b"
  description: "aliased qualified star with subquery"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select tx.rnum,tx.c1, tx.c2, ty.c2 from tjoin1 tx, tjoin2 ty order by 1, 2, 3, 4"
  description: "BI-857"
  expected_names: ["rnum", "c1", "c2", "c2"]
  expected_types: [int, int, int, varchar]
  expected:
  - [0, 10, 15, "BB"]
  - [0, 10, 15, "DD"]
  - [0, 10, 15, "EE"]
  - [0, 10, 15, "FF"]
  - [1, 20, 25, "BB"]
  - [1, 20, 25, "DD"]
  - [1, 20, 25, "EE"]
  - [1, 20, 25, "FF"]
  - [2, ~, 50, "BB"]
  - [2, ~, 50, "DD"]
  - [2, ~, 50, "EE"]
  - [2, ~, 50, "FF"]

# Implicit Inner Joins
- sql: "select a, c from test.foo, test.bar where foo.id = bar.id"
  description: "implicit inner join"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]
- sql: "select a, c from test.foo, test.bar where foo.id = bar.id AND foo.a > 1"
  description: "implicit inner join with additional criteria"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11]
- sql: "select a, c from test.foo, test.bar where foo.id = bar.id AND foo.a = 1214"
  description: "implicit inner join with no results"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: []
- sql: "select a, c from test.foo, (select * from test.bar) bar where foo.id = bar.id"
  description: "implicit inner join with subquery"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]

# Inner Joins
- sql: "select a, c from test.foo inner join test.bar on foo.id = bar.id"
  description: "inner join"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]
- sql: "select a, c from test.foo inner join test.bar on foo.id = bar.id AND foo.a > 1"
  description: "inner join with additional criteria"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11]
- sql: "select a, c from test.foo inner join test.bar on foo.a > 1 AND foo.id = bar.id"
  description: "inner join with additional criteria (reversed)"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11]
- sql: "select a, c from test.foo inner join test.bar on foo.id = bar.id AND foo.a = 1214"
  description: "inner join with no results"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: []
- sql: "select a, c from test.foo inner join (select * from test.bar) bar on foo.id = bar.id"
  description: "inner join with subquery"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]
- sql: "select a, c from test.foo inner join test.bar on foo.b = bar.d"
  description: "inner join with null on the left"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11] 
- sql: "select foo.a, bar.c, baz.d from test.foo inner join test.bar on foo.id = bar.id inner join test.baz on bar.id = baz.id"
  description: "inner join with three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [1, 10, ~]
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d, foobar.b from test.foo inner join test.bar on foo.id = bar.id inner join test.baz on bar.id = baz.id inner join test.foobar on baz.id = foobar.id"
  description: "inner join with four tables"
  expected_names: ["a", "c", "d", "b"]
  expected_types: [int, int, int, int]
  expected: 
  - [1, 10, ~, 5]
  - [2, 11, 1, 6]
- sql: "select foo.a, bar.c, baz.d, foobar.b, barbaz.e from test.foo inner join test.bar on foo.id = bar.id inner join test.baz on bar.id = baz.id inner join test.foobar on baz.id = foobar.id inner join test.barbaz on foobar.id = barbaz.id"
  description: "inner join with five tables"
  expected_names: ["a", "c", "d", "b", "e"]
  expected_types: [int, int, int, int, int]
  expected: 
  - [1, 10, ~, 5, 3]
  - [2, 11, 1, 6, 5]
- sql: "select foo.a, bar.c, baz.d from test.foo inner join test.bar on foo.id = bar.id inner join test.baz on bar.id = baz.id AND foo.a > 1"
  description: "inner join with three tables with additional criteria"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from test.foo inner join test.bar on foo.a > 1 AND foo.id = bar.id inner join test.baz on bar.id = baz.id"
  description: "inner join with three tables with additional criteria (reversed)"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from test.foo inner join (select * from test.bar) bar on foo.id = bar.id inner join test.baz on bar.id = baz.id"
  description: "inner join with subquery and three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [1, 10, ~]
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from test.foo inner join test.bar on foo.b = bar.d inner join test.baz on bar.d = baz.d"
  description: "inner join with null on the left and three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1] 
- sql: "select foobar.a, barbaz.c from test.foobar join test.barbaz on foobar.b = barbaz.b and foobar.c = barbaz.c join test.qux on foobar.a = qux.a"
  description: "multi-way inner join with a filter expression that does not push down and different columns referenced in different stages"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected:
  - [3, 10]

