#
# Tests
#
testcases:

# Cross Joins
- sql: "select * from join_test.foo, join_test.bar"
  description: "global star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select foo.*, bar.* from join_test.foo, join_test.bar"
  description: "qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from join_test.foo f, join_test.bar b"
  description: "aliased qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from join_test.foo f, (select * from join_test.bar) b"
  description: "aliased qualified star with subquery"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select tx.rnum,tx.c1, tx.c2, ty.c2 from tjoin1 tx, tjoin2 ty order by 1, 2, 3, 4"
  description: "BI-857"
  expected_names: ["rnum", "c1", "c2", "c2"]
  expected_types: [int, int, int, varchar]
  expected:
  - [0, 10, 15, "BB"]
  - [0, 10, 15, "DD"]
  - [0, 10, 15, "EE"]
  - [0, 10, 15, "FF"]
  - [1, 20, 25, "BB"]
  - [1, 20, 25, "DD"]
  - [1, 20, 25, "EE"]
  - [1, 20, 25, "FF"]
  - [2, ~, 50, "BB"]
  - [2, ~, 50, "DD"]
  - [2, ~, 50, "EE"]
  - [2, ~, 50, "FF"]

# Implicit Inner Joins
- sql: "select a, c from join_test.foo, join_test.bar where foo.id = bar.id"
  description: "implicit inner join"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]
- sql: "select a, c from join_test.foo, join_test.bar where foo.id = bar.id AND foo.a > 1"
  description: "implicit inner join with additional criteria"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11]
- sql: "select a, c from join_test.foo, join_test.bar where foo.id = bar.id AND foo.a = 1214"
  description: "implicit inner join with no results"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: []
- sql: "select a, c from join_test.foo, (select * from join_test.bar) bar where foo.id = bar.id"
  description: "implicit inner join with subquery"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]

# Inner Joins
- sql: "select a, c from join_test.foo inner join join_test.bar on foo.id = bar.id"
