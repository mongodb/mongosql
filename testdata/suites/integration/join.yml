- sql: "select a, c from join_test.foo inner join join_test.bar on foo.id = bar.id AND foo.a = 1214"
  description: "inner join with no results"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: []
- sql: "select a, c from join_test.foo inner join (select * from join_test.bar) bar on foo.id = bar.id"
  description: "inner join with subquery"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [1, 10]
  - [2, 11]
- sql: "select a, c from join_test.foo inner join join_test.bar on foo.b = bar.d"
  description: "inner join with null on the left"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected: 
  - [2, 11] 
- sql: "select foo.a, bar.c, baz.d from join_test.foo inner join join_test.bar on foo.id = bar.id inner join join_test.baz on bar.id = baz.id"
  description: "inner join with three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [1, 10, ~]
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d, foobar.b from join_test.foo inner join join_test.bar on foo.id = bar.id inner join join_test.baz on bar.id = baz.id inner join join_test.foobar on baz.id = foobar.id"
  description: "inner join with four tables"
  expected_names: ["a", "c", "d", "b"]
  expected_types: [int, int, int, int]
  expected: 
  - [1, 10, ~, 5]
  - [2, 11, 1, 6]
- sql: "select foo.a, bar.c, baz.d, foobar.b, barbaz.e from join_test.foo inner join join_test.bar on foo.id = bar.id inner join join_test.baz on bar.id = baz.id inner join join_test.foobar on baz.id = foobar.id inner join join_test.barbaz on foobar.id = barbaz.id"
  description: "inner join with five tables"
  expected_names: ["a", "c", "d", "b", "e"]
  expected_types: [int, int, int, int, int]
  expected: 
  - [1, 10, ~, 5, 3]
  - [2, 11, 1, 6, 5]
- sql: "select foo.a, bar.c, baz.d from join_test.foo inner join join_test.bar on foo.id = bar.id inner join join_test.baz on bar.id = baz.id AND foo.a > 1"
  description: "inner join with three tables with additional criteria"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from join_test.foo inner join join_test.bar on foo.a > 1 AND foo.id = bar.id inner join join_test.baz on bar.id = baz.id"
  description: "inner join with three tables with additional criteria (reversed)"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from join_test.foo inner join (select * from join_test.bar) bar on foo.id = bar.id inner join join_test.baz on bar.id = baz.id"
  description: "inner join with subquery and three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [1, 10, ~]
  - [2, 11, 1]
- sql: "select foo.a, bar.c, baz.d from join_test.foo inner join join_test.bar on foo.b = bar.d inner join join_test.baz on bar.d = baz.d"
  description: "inner join with null on the left and three tables"
  expected_names: ["a", "c", "d"]
  expected_types: [int, int, int]
  expected: 
  - [2, 11, 1] 
- sql: "select foobar.a, barbaz.c from join_test.foobar join join_test.barbaz on foobar.b = barbaz.b and foobar.c = barbaz.c join join_test.qux on foobar.a = qux.a"
  description: "multi-way inner join with a filter expression that does not push down and different columns referenced in different stages"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected:
  - [3, 10]

