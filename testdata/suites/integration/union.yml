- sql: "select * from (select a, c from foo order by a limit 2 union select d, f from bar order by d limit 1) as tmp order by a"
  description: "order by and limit paradigm"
  expected_names: ["a", "c"]
  expected_types: [int, int]
  expected:
  - [1, 5]
  - [2, 6]
  - [8, 12]
- sql: "select * from (select d from foo inner join bar on foo.id=bar.id union select g from baz) as tmp order by d"
  description: "join paired with single union"
  expected_names: ["d"]
  expected_types: [int]
  expected:
  - [1]
  - [4]
  - [7]
  - [13]
- sql: "select * from (select a from foo union select d from foo inner join bar on foo.id=bar.id union select g from baz) as tmp order by a"
  description: "join paired with two unions"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [4]
  - [7]
  - [8]
  - [13]
  - [14]
- sql: "select * from (select d from foo inner join bar on foo.id=bar.id union all select a from baz inner join foobar on baz.id=foobar.id) as tmp order by d"
  description: "two joins single union"
  expected_names: ["d"]
  expected_types: [int]
  expected:
  - [1]
  - [1]
  - [1]
  - [4]
  - [7]
  - [13]
