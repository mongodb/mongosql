#
# Tests
#
testcases:

- sql: "select * from (select a,b from foo union select d,e from bar) as tmp order by a"
  description: "distinct values with implicit distinct operator"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 3]
  - [2, 4]
  - [7, 9]
  - [8, 10]
  - [13, 15]
  - [14, 16]
- sql: "select * from (select d from bar union select g from baz) as tmp order by d"
  description: "non-distinct values with implicit distinct operator"
  expected_names: ["d"]
  expected_types: [int]
  expected:
  - [1]
  - [4]
  - [7]
  - [13]
- sql: "select * from (select d from bar union all select g from baz) as tmp order by d"
  description: "non-distinct values with all operator"
  expected_names: ["d"]
  expected_types: [int]
  expected:
  - [1]
  - [1]
  - [4]
  - [7]
  - [7]
  - [13]
- sql: "select * from (select * from baz union select * from foobar) as tmp order by i"
  description: "larger distinct values with implicit distinct operator"
  expected_names: ["id", "g", "h", "i"]
  expected_types: [int, int, int, int]
  expected:
  - [0, 1, 2, 3]
  - [0, 1, 2, 4]
  - [1, 4, 5, 6]
  - [2, 7, 8, 9]
  - [2, 1, 2, 18]
- sql: "select * from (select * from baz union all select * from foobar) as tmp order by i"
  description: "larger distinct values with all operator"
  expected_names: ["id", "g", "h", "i"]
  expected_types: [int, int, int, int]
  expected:
  - [0, 1, 2, 3]
  - [0, 1, 2, 4]
  - [1, 4, 5, 6]
  - [1, 4, 5, 6]
  - [2, 7, 8, 9]
  - [2, 1, 2, 18]
- sql: "select * from (select a from foo union select d from bar union select g from baz) as tmp order by a"
  description: "three unions, implicit distinct operator"
  expected_names: ["a"]
  expected_types: [int]
  expected:
