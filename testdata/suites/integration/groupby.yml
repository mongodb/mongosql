#
# Tests
# (we are using an order by here as well because output order from MongoDB after a $group and MySQL after a group by is unspecified)
#
testcases:
- sql: "select a from groupby_test.foo group by a order by a"
  id: '0'
  db: groupby_test
  description: "no aggregations"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select a from groupby_test.foo group by 1 order by a"
  id: '1'
  db: groupby_test
  description: "no aggregations with ordinal"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select a as f from groupby_test.foo group by f order by a"
  id: '2'
  db: groupby_test
  description: "no aggregations with alias"
  expected_names: ["f"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select a, sum(b) from groupby_test.foo group by a order by a"
  id: '3'
  db: groupby_test
  description: "single aggregation"
  expected_names: ["a", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 5]
  - [3, 3]
- sql: "select a, sum(b) from groupby_test.foo group by 1 order by a"
  id: '4'
  db: groupby_test
  description: "single aggregation with ordinal"
  expected_names: ["a", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 5]
  - [3, 3]
- sql: "select a as f, sum(b) from groupby_test.foo group by f order by a"
  id: '5'
  db: groupby_test
  description: "single aggregation with alias"
  expected_names: ["f", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 5]
  - [3, 3]
- sql: "select a, sum(b), count(*) from groupby_test.foo group by a order by a"
  id: '6'
  db: groupby_test
  description: "multiple aggregations"
  expected_names: ["a", "sum(b)", "count(*)"]
  expected_types: [int, int, int]
  expected:
  - [1, 1, 1]
  - [2, 5, 2]
  - [3, 3, 1]
- sql: "select a, sum(b), count(*) from groupby_test.foo group by 1 order by a"
  id: '7'
  db: groupby_test
  description: "multiple aggregations with ordinal"
  expected_names: ["a", "sum(b)", "count(*)"]
  expected_types: [int, int, int]
  expected:
  - [1, 1, 1]
  - [2, 5, 2]
  - [3, 3, 1]
- sql: "select a as f, sum(b), count(*) from groupby_test.foo group by f order by a"
  id: '8'
  db: groupby_test
  description: "multiple aggregations with alias"
  expected_names: ["f", "sum(b)", "count(*)"]
  expected_types: [int, int, int]
  expected:
  - [1, 1, 1]
  - [2, 5, 2]
  - [3, 3, 1]

# Subsequent Subqueries
- sql: "select sum(a) from foo f group by b order by (select b from foo where f.id = id)"
  id: '9'
  db: groupby_test
  description: "correlated subquery following the group by"
  expected_names: ["sum(a)"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [5]
- sql: "select sum(a) from foo f group by b order by (select -b from foo where f.id = id)"
  id: '10'
  db: groupby_test
  description: "correlated subquery following the group by"
  expected_names: ["sum(a)"]
  expected_types: [int]
  expected:
  - [5]
  - [2]
  - [1]

# Distinct
