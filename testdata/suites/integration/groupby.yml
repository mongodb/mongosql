  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select distinct a, b from groupby_test.foo order by a, b"
  id: '12'
  db: groupby_test
  description: "distinct multiple columns"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 2]
  - [2, 3]
  - [3, 3]
- sql: "select distinct b from groupby_test.foo group by a order by a"
  id: '13'
  db: groupby_test
  description: "distinct single column grouped"
  expected_names: ["b"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select distinct a, b from groupby_test.foo group by a order by a"
  id: '14'
  db: groupby_test
  description: "distinct multiple column grouped"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 2]
  - [3, 3]
- sql: "select distinct a, sum(b) from groupby_test.foo group by a order by a"
  id: '15'
  db: groupby_test
  description: "distinct multiple column grouped"
  expected_names: ["a", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [1, 1]
  - [2, 5]
  - [3, 3]

# Aggregates in Subqueries
- sql: "select a, (select sum(f.a) from foo limit 1) from foo f"
  id: '16'
  db: groupby_test
  description: "correlated aggregate that gets aggregated by parent"
  expected_names: ["a", "(select sum(f.a) from foo limit 1)"]
  expected_types: [int, float64]
  expected:
  - [1, 8]
- sql: "select a, (select sum(a + f.a) from foo) from foo f"
  id: '17'
  db: groupby_test
  description: "correlated aggregate"
  expected_names: ["a", "(select sum(a+f.a) from foo)"]
  expected_types: [int, float64]
  expected:
  - [1, 12]
  - [2, 16]
  - [2, 16]
  - [3, 20]
- sql: "select a, (select sum(a + sum(f.a)) from foo) as b from foo f"
  id: '18'
  db: groupby_test
  description: "correlated aggregate"
  expected_names: ["a", "b"]
  expected_types: [int, float64]
  expected:
  - [1, 40]
- sql: "select a from foo f group by 1 order by (select sum(f.a) from foo limit 1)"
  id: '19'
  db: groupby_test
  description: "correlated aggregate in order by that gets aggregated by parent"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [3]
  - [2]
- sql: "select a from foo f group by 1 order by (select sum(a + f.a) from foo)"
  id: '20'
  db: groupby_test
  description: "correlated aggregate in order by"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select a from foo f having 10 > (select sum(f.a) from foo limit 1)"
  id: '21'
  db: groupby_test
  description: "correlated aggregate in having that gets aggregated by parent"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
- sql: "select a from foo f having 20 > (select sum(a + f.a) from foo)"
  id: '22'
  db: groupby_test
  description: "correlated aggregate in having"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [2]
- sql: "select a from foo f group by (select sum(a + f.a) / b from foo)"
  id: '23'
  db: groupby_test
  description: "correlated aggregate in group by"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select sum(a) from foo f group by (select sum(a + f.a) / b from foo)"
  id: '24'
  db: groupby_test
  description: "correlated aggregate in group by"
  expected_names: ["sum(a)"]
  expected_types: [int]
  expected:
  - [1]
  - [4]
  - [3]


# Having
- sql: "select a, sum(b) from groupby_test.foo group by a having sum(b) > 1 order by a"
  id: '25'
  db: groupby_test
  description: "having with a single condition"
  expected_names: ["a", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [2, 5]
  - [3, 3]
- sql: "select a, sum(b) from groupby_test.foo group by a having a > 2 AND sum(b) > 1 order by a"
  id: '26'
  db: groupby_test
  description: "having with multiple conditions"
  expected_names: ["a", "sum(b)"]
  expected_types: [int, int]
  expected:
  - [3, 3]
- sql: "select id from groupby_test.foo having sum(a) > 4 order by id"
  id: '27'
  db: groupby_test
  description: "having without group by and a non-projected column"
  expected_names: ["id"]
  expected_types: [int]
  expected:
  - [0]
- sql: "select id from groupby_test.foo group by id having sum(a) > 1 order by id"
  id: '28'
  db: groupby_test
  description: "having using a non-projected column"
  expected_names: ["id"]
  expected_types: [int]
  expected:
  - [1]
  - [2]
  - [3]
- sql: "select id from groupby_test.foo group by a having sum(a) > 1 order by id"
  id: '29'
  db: groupby_test
  description: "having using a non-projected column"
  expected_names: ["id"]
  expected_types: [int]
  expected:
  - [1]
  - [3]
- sql: "select id, sum(a) from groupby_test.foo group by a having sum(a) > 1 order by id"
  id: '30'
  db: groupby_test
  description: "having using a non-projected column"
  expected_names: ["id", "sum(a)"]
  expected_types: [int, int]
  expected:
  - [1, 4]
  - [3, 3]

