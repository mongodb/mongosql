#
# Tests
#
testcases:

# Between
- sql: "select a from where_test.foo where id between 1 and 4"
  id: '0'
  db: where_test
  description: "between distinct values"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [2]
  - [3]
- sql: "select a from baz where b = 5 and a between 1 and 4"
  id: '1'
  db: where_test
  description: "between distinct values"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]
- sql: "select a from where_test.foo where id between 1 and 1"
  id: '2'
  db: where_test
  description: "between the same value"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [2]
- sql: "select a from where_test.foo where id between 4 and 1"
  id: '3'
  db: where_test
  description: "between reversed values"
  expected_names: ["a"]
  expected_types: [int]
  expected: []
- sql: "select a from where_test.foo where id between 1 and 2 or id between 2 and 4"
  id: '4'
  db: where_test
  description: "multiple betweens"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [2]
  - [3]
- sql: "select a from where_test.foo where id not between 1 and 4"
  id: '5'
  db: where_test
  description: "not between distinct values"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [1]

# Case
- sql: "select a from foo where (case when a > 1 then true else false end)"
  id: '6'
