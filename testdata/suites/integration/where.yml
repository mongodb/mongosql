# Subquery
- sql: "select id from where_test.foo where a = (select a from where_test.bar where id = (select id from where_test.foo limit 1))"
  id: '25'
  db: where_test
  description: "non-correlated nested subqueries"
  expected_names: ["id"]
  expected_types: [int]
  expected:
  - [1]
- sql: "select id from where_test.foo where a = (select min(a) from where_test.bar)"
  id: '26'
  db: where_test
  description: "non-correlated subquery"
  expected_names: ["id"]
  expected_types: [int]
  expected:
  - [1]
- sql: "select a from where_test.foo where (id, a) = (select id, a from where_test.bar where foo.id = bar.id AND foo.a = bar.a)"
  id: '27'
  db: where_test
  description: "correlated subquery"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [2]
  - [3]
- sql: "select id from where_test.foo where 4 not in (select a from where_test.bar)"
  id: '28'
  db: where_test
  description: "not in subquery"
  expected_names: ["id"]
  expected_types: [string]
  expected:
  - [0]
  - [1]
  - [2]
