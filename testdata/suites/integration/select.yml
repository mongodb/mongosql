# UUID
- sql: "select * FROM select_test.uuid"
  id: '62'
  db: select_sTest
  description: "uuid bit fiddling"
  expected_names: ["csharp", "java", "olduuid", "uuid"]
  expected_types: [varchar, varchar, varchar, varchar]
  expected:
  - ["01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10"]
- sql: "select csharp FROM select_test.uuid where csharp=\"01020304-0506-0708-090a-0b0c0d0e0f10\""
  id: '63'
  db: select_sTest
  description: "uuid where clause"
  expected_names: ["csharp"]
  expected_types: [varchar]
  expected:
  - ["01020304-0506-0708-090a-0b0c0d0e0f10"]
- sql: "select t2.java FROM select_test.uuid t1 INNER JOIN select_test.uuid t2 ON t1.java=t2.java where t1.olduuid=\"01020304-0506-0708-090a-0b0c0d0e0f10\""
  id: '64'
  db: select_sTest
  description: "join using same uuid subtype 3 encoding"
  expected_names: ["java"]
  expected_types: ["varchar"]
  expected:
  - ["01020304-0506-0708-090a-0b0c0d0e0f10"]
- sql: "select s.uuid, t.java, q.csharp, r.olduuid FROM select_test.uuid q INNER JOIN select_test.uuid r ON q.java = r.java INNER JOIN select_test.uuid s ON r.csharp = s.csharp INNER JOIN select_test.uuid t ON r.olduuid = t.csharp where t.uuid = \"01020304-0506-0708-090a-0b0c0d0e0f10\""
  id: '65'
  db: select_sTest
  description: "nested JOIN using mixed uuid subtype 3 encodings"
  expected_names: ["uuid", "java", "csharp", "olduuid", ]
  expected_types: [varchar, varchar, varchar, varchar]
  expected:
  - ["01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10", "01020304-0506-0708-090a-0b0c0d0e0f10"]
- sql: "select t2.olduuid FROM select_test.uuid t1 INNER JOIN select_test.uuid t2 ON t1.csharp=t2.java where t1.olduuid=\"01020304-0506-0708-090a-0b0c0d0e0f10\""
  id: '66'
  db: select_sTest
  description: "join using different uuid subtype 3 encodings"
  expected_names: ["olduuid"]
  expected_types: ["varchar"]
  expected:
