- sql: "select value, convert(value, CHAR) as converted from datetime"
  id: datetime_to_char
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", "2000-01-02 12:34:56.000000"]

- sql: "select value, convert(value, DATE) as converted from datetime"
  id: datetime_to_date
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
