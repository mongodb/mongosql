testcases:

#
# conversions from int
#

- sql: "select value from int"
  id: int_data_assertion
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value"]
  expected_types: [int]
  expected:
  - [0]
  - [1]
  - [2]
  - [50000]
  - [-1]
  - [~]

- sql: "select value, convert(value, BINARY) as converted from int"
  id: int_to_binary
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, ~]
  - [1, ~]
  - [2, ~]
  - [50000, ~]
  - [-1, ~]
  - [~, ~]

- sql: "select value, convert(value, CHAR) as converted from int"
  id: int_to_char
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, "0"]
  - [1, "1"]
  - [2, "2"]
  - [50000, "50000"]
  - [-1, "-1"]
  - [~, ~]

- sql: "select value, convert(value, DATE) as converted from int"
  id: int_to_date
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, "0001-01-01"]
  - [1, "0001-01-01"]
  - [2, "0001-01-01"]
  - [50000, "0001-01-01"]
  - [-1, "0001-01-01"]
  - [~, ~]

- sql: "select value, convert(value, DATETIME) as converted from int"
  id: int_to_datetime
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, "0001-01-01 00:00:00"]
  - [1, "0001-01-01 00:00:00"]
  - [2, "0001-01-01 00:00:00"]
  - [50000, "0001-01-01 00:00:00"]
  - [-1, "0001-01-01 00:00:00"]
  - [~, ~]

- sql: "select value, convert(value, TIME) as converted from int"
  id: int_to_time
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, ~]
  - [1, ~]
  - [2, ~]
  - [50000, ~]
  - [-1, ~]
  - [~, ~]

- sql: "select value, convert(value, DECIMAL) as converted from int"
  id: int_to_decimal
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, float]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

- sql: "select value, convert(value, SIGNED) as converted from int"
  id: int_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, int]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

- sql: "select value, convert(value, INTEGER) as converted from int"
  id: int_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mysql"
  expected_names: ["value", "converted"]
  expected_types: [int, int]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

