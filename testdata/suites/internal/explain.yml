    expected_results:
      - [1, ProjectStage, '[{name: ''_id+_id'', type: ''float''}]', '[2]', ~, null, null, null, null, null, '{"pushdown_errors":[{"name":"ProjectStage","reason":"unable to push down source stage"}]}']
      - [2, SubquerySourceStage, '[{name: join_test.b.''_id'', type: ''int''}]', '[3]', ~, null, null, null, null, null, '{"pushdown_errors":[{"name":"SubquerySourceStage","reason":"unable to push down source stage"}]}']
      - [3, ProjectStage, '[{name: join_test.join_2.''_id'', type: ''int''}]', '[4]', ~, null, null, null, null, null, '{"pushdown_errors":[{"name":"ProjectStage","reason":"unable to push down source stage"}]}']
      - [4, GroupByStage, '[{name: join_test.join_2.''_id'', type: ''int''}]', '[5]', ~, null, null, null, null, null, '{"pushdown_errors":[{"name":"GroupByStage","reason":"unable to push down source stage"}]}']
      - [5, UnionDistinct, '[{name: join_test.join_2.''_id'', type: ''int''}]', '[6, 7]', ~, null, null, null, null, null, '{"pushdown_errors":[{"name":"UnionStage","reason":"unions cannot be pushed down"}]}']
      - [6, MongoSourceStage, '[{name: join_test.join_2.''_id'', type: ''int''}]', null, join_test, '[join_2]', '[join_2]', '[join_2]', '[{"$project": {"join_test_DOT_join_2_DOT__id": "$_id"}}]', null, null]
      - [7, MongoSourceStage, '[{name: join_test.join_3.''_id'', type: ''int''}]', null, join_test, '[join_3]', '[join_3]', '[join_3]', '[{"$project": {"join_test_DOT_join_3_DOT__id": "$_id"}}]', null, null]
    expected_types: [int, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar]
    id: '5'
    pushdown_only: true
    sql: explain select _id+_id from (select _id from join_2 union select _id from join_3) b

