- sql: "explain select b+2 from bar"
  id: '9'
  schema_mapping_heuristics:
  - drdl
  db: functions_test
  exact_server_version: "3.6"
  description: "explain query"
  pushdown_only: true
  expected_names: ["stage_id", "plan_stage", "plan_columns", "sources", "databases", "tables", "aliases", "collections", "pipeline", "pipeline_explain", "comment"]
  expected_types: ["int", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
  expected:
  - [1, "ProjectStage", "[{name: 'b+2', type: 'float'}]", "[2]", "functions_test", ~, ~, ~, ~, ~, "Convert(functions_test.bar.b, int)+2 could not be translated"]
  - [2, "MongoSourceStage", "[{name: functions_test.bar.'b', type: 'varchar'}]", ~, "functions_test", "[bar]", "[bar]", "[scalar]", "[{\"$project\":{\"b\":\"$b\",\"_id\":0}}]", ~, ~]
