    expected_names: [stage_id, plan_stage, plan_columns, sources, database, tables, aliases, collections, pipeline, pipeline_explain, comment]
    expected_results:
      - [1, MongoSourceStage, '[{name: join_test.join_1.''_id'', type: ''int''}, {name: join_test.join_1.''a'', type: ''int''}]', null, join_test, '[join_1, join_2]', '[join_1, join_2]', '[join_1, join_2]', '[{"$lookup": {"from": "join_2","localField": "_id","foreignField": "_id","as": "__joined_join_2"}},{"$project": {"__joined_join_2": {"$cond": [{"$lte": ["$_id",null]},[],"$__joined_join_2"]},"_id": {"$numberInt":"1"},"a": {"$numberInt":"1"},"b": {"$numberInt":"1"}}},{"$unwind": {"path": "$__joined_join_2","preserveNullAndEmptyArrays": true}},{"$project": {"join_test_DOT_join_1_DOT__id": "$_id","join_test_DOT_join_1_DOT_a": "$a","_id": {"$numberInt":"0"}}}]', null, null]
