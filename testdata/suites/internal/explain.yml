  - [5, "MongoSourceStage", "[{name: union_test.b.'id', type: 'int'}, {name: union_test.b.'d', type: 'int'}, {name: union_test.b.'e', type: 'int'}, {name: union_test.b.'f', type: 'int'}]", ~, "union_test", "[bar]", "[b]", "[union_2]", "[{\"$project\":{\"union_test_DOT_b_DOT_id\":\"$_id\",\"union_test_DOT_b_DOT_d\":\"$d\",\"union_test_DOT_b_DOT_e\":\"$e\",\"union_test_DOT_b_DOT_f\":\"$f\"}}]", ~, ~]

