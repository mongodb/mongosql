- sql: "explain select id+id from (select id from bar union select id from baz) b"
  id: '5'
  db: join_test
  exact_server_version: "3.6"
  description: "explain query"
  pushdown_only: true
  expected_names: ["stage_id", "plan_stage", "plan_columns", "sources", "databases", "tables", "aliases", "collections", "pipeline", "pipeline_explain", "comment"]
  expected_types: ["int", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
  expected:
  - [1, "ProjectStage", "[{name: 'id+id', type: 'float'}]", "[2]", "join_test", ~, ~, ~, ~, ~, ~]
  - [2, "SubquerySourceStage", "[{name: join_test.b.'id', type: 'int'}]", "[3]", "join_test", ~, ~, ~, ~, ~, ~]
  - [3, "ProjectStage", "[{name: join_test.bar.'id', type: 'int'}]", "[4]", "join_test", ~, ~, ~, ~, ~, ~]
  - [4, "GroupByStage", "[{name: join_test.bar.'id', type: 'int'}]", "[5]", "join_test", ~, ~, ~, ~, ~, ~]
  - [5, "UnionDistinct", "[{name: join_test.bar.'id', type: 'int'}]", "[6, 7]", "join_test", ~, ~, ~, ~, ~, ~]
  - [6, "MongoSourceStage", "[{name: join_test.bar.'id', type: 'int'}]", ~, "join_test", "[bar]", "[bar]", "[join_2]", "[{\"$project\":{\"join_test_DOT_bar_DOT_id\":\"$_id\"}}]", ~, ~]
  - [7, "MongoSourceStage", "[{name: join_test.baz.'id', type: 'int'}]", ~, "join_test", "[baz]", "[baz]", "[join_3]", "[{\"$project\":{\"join_test_DOT_baz_DOT_id\":\"$_id\"}}]", ~, ~]

- sql: "explain select id+id from (select id from bar union select id from baz) b order by id limit 10"
  id: '6'
