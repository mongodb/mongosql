      - [3, ProjectStage, '[{name: join_test.join_1.''_id'', type: ''int''}, {name: join_test.join_1.''a'', type: ''int''}, {name: join_test.join_1.''b'', type: ''int''}]', '[4]', null, null, null, null, null, null, null]
      - [4, MongoSourceStage, '[{name: join_test.join_1.''_id'', type: ''int''}, {name: join_test.join_1.''a'', type: ''int''}, {name: join_test.join_1.''b'', type: ''int''}]', null, 'join_test', '[join_1]', '[join_1]', '[join_1]', '[]', null, null]
      - [5, MongoSourceStage, '[{name: join_test.join_2.''c'', type: ''int''}]', null, 'join_test', '[join_2]', '[join_2]', '[join_2]', '[{"$project": {"join_test_DOT_join_2_DOT_c": "$c"}}]', null, null]
    expected_types: [int, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar]
