- sql: "explain select _id+_id from (select _id from join_2 union select _id from join_3) b"
  id: '5'
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  db: join_test
  description: "explain query"
  pushdown_only: true
  expected_names: ["stage_id", "plan_stage", "plan_columns", "sources", "databases", "tables", "aliases", "collections", "pipeline", "pipeline_explain", "comment"]
  expected_types: ["int", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
  expected:
  - [1, "ProjectStage", "[{name: '_id+_id', type: 'float'}]", "[2]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [2, "SubquerySourceStage", "[{name: join_test.b.'_id', type: 'int'}]", "[3]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [3, "ProjectStage", "[{name: join_test.join_2.'_id', type: 'int'}]", "[4]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [4, "GroupByStage", "[{name: join_test.join_2.'_id', type: 'int'}]", "[5]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [5, "UnionDistinct", "[{name: join_test.join_2.'_id', type: 'int'}]", "[6, 7]", "join_test", ~, ~, ~, ~, ~, "union cannot be pushed down"]
  - [6, "MongoSourceStage", "[{name: join_test.join_2.'_id', type: 'int'}]", ~, "join_test", "[join_2]", "[join_2]", "[join_2]", "[{\"$project\":{\"join_test_DOT_join_2_DOT__id\":\"$_id\"}}]", ~, ~]
  - [7, "MongoSourceStage", "[{name: join_test.join_3.'_id', type: 'int'}]", ~, "join_test", "[join_3]", "[join_3]", "[join_3]", "[{\"$project\":{\"join_test_DOT_join_3_DOT__id\":\"$_id\"}}]", ~, ~]

- sql: "explain select _id+_id from (select _id from join_2 union select _id from join_3) b order by _id limit 10"
  id: '6'
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  db: join_test
  description: "explain query"
  pushdown_only: true
  expected_names: ["stage_id", "plan_stage", "plan_columns", "sources", "databases", "tables", "aliases", "collections", "pipeline", "pipeline_explain", "comment"]
  expected_types: ["int", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
  expected:
  - [1, "ProjectStage", "[{name: '_id+_id', type: 'float'}]", "[2]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [2, "LimitStage", "[{name: join_test.b.'_id', type: 'int'}]", "[3]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [3, "OrderByStage", "[{name: join_test.b.'_id', type: 'int'}]", "[4]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [4, "SubquerySourceStage", "[{name: join_test.b.'_id', type: 'int'}]", "[5]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [5, "ProjectStage", "[{name: join_test.join_2.'_id', type: 'int'}]", "[6]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [6, "GroupByStage", "[{name: join_test.join_2.'_id', type: 'int'}]", "[7]", "join_test", ~, ~, ~, ~, ~, "transitive"]
  - [7, "UnionDistinct", "[{name: join_test.join_2.'_id', type: 'int'}]", "[8, 9]", "join_test", ~, ~, ~, ~, ~, "union cannot be pushed down"]
  - [8, "MongoSourceStage", "[{name: join_test.join_2.'_id', type: 'int'}]", ~, "join_test", "[join_2]", "[join_2]", "[join_2]", "[{\"$project\":{\"join_test_DOT_join_2_DOT__id\":\"$_id\"}}]", ~, ~]
  - [9, "MongoSourceStage", "[{name: join_test.join_3.'_id', type: 'int'}]", ~, "join_test", "[join_3]", "[join_3]", "[join_3]", "[{\"$project\":{\"join_test_DOT_join_3_DOT__id\":\"$_id\"}}]", ~, ~]

