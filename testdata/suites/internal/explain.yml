  pushdown_only: true
  expected_names: ["stage_id", "plan_stage", "plan_columns", "sources", "databases", "tables", "aliases", "collections", "pipeline", "pipeline_explain", "comment"]
  expected_types: ["int", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
  expected:
  - [1, "MongoSourceStage", "[{name: join_test.foo.'id', type: 'int'}, {name: join_test.foo.'a', type: 'int'}]", ~, "join_test", "[foo, bar]", "[foo, bar]", "[join_1, join_2]", "[{\"$lookup\":{\"as\":\"__joined_bar\",\"foreignField\":\"_id\",\"from\":\"join_2\",\"localField\":\"_id\"}},{\"$project\":{\"__joined_bar\":{\"$cond\":[{\"$eq\":[{\"$ifNull\":[\"$_id\",null]},null]},{\"$literal\":[]},\"$__joined_bar\"]},\"_id\":1,\"a\":1,\"b\":1}},{\"$unwind\":{\"path\":\"$__joined_bar\",\"preserveNullAndEmptyArrays\":true}},{\"$project\":{\"join_test_DOT_foo_DOT_id\":\"$_id\",\"join_test_DOT_foo_DOT_a\":\"$a\",\"_id\":0}}]", ~, ~]

