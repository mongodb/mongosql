  - [1, "ProjectStage", "[{name: 'id+id', type: 'float'}]", "[2]", "join_test", ~, ~, ~, ~, ~, ~]
  - [2, "LimitStage", "[{name: join_test.b.'id', type: 'int'}]", "[3]", "join_test", ~, ~, ~, ~, ~, ~]
  - [3, "OrderByStage", "[{name: join_test.b.'id', type: 'int'}]", "[4]", "join_test", ~, ~, ~, ~, ~, ~]
  - [4, "SubquerySourceStage", "[{name: join_test.b.'id', type: 'int'}]", "[5]", "join_test", ~, ~, ~, ~, ~, ~]
  - [5, "ProjectStage", "[{name: join_test.bar.'id', type: 'int'}]", "[6]", "join_test", ~, ~, ~, ~, ~, ~]
  - [6, "GroupByStage", "[{name: join_test.bar.'id', type: 'int'}]", "[7]", "join_test", ~, ~, ~, ~, ~, ~]
  - [7, "UnionDistinct", "[{name: join_test.bar.'id', type: 'int'}]", "[8, 9]", "join_test", ~, ~, ~, ~, ~, ~]
  - [8, "MongoSourceStage", "[{name: join_test.bar.'id', type: 'int'}]", ~, "join_test", "[bar]", "[bar]", "[join_2]", "[{\"$project\":{\"join_test_DOT_bar_DOT_id\":\"$_id\"}}]", ~, ~]
