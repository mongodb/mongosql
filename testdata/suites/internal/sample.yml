testcases:

  - db: "sample_test"
    description: "field limit simple"
    expected_names: ["column_name"]
    expected_results:
      - ["_id"]
      - ["int1"]
      - ["int2"]
    expected_types: [varchar]
    id: 0
    sql_cleanup_list: [
      'set @@global.max_num_fields_per_collection=DEFAULT',
      'flush sample'
    ]
    sql_list: [
      'set @@global.max_num_fields_per_collection=3',
      'flush sample',
      'select column_name from information_schema.columns where table_name="simple"'
    ]
    sync: true

    # For the following test, we just count the number of columns rather than checking their names.
    # We use $sample to get documents from the server, which has no guaranteed order, so we can't know
    # which fields we'll get.
  - db: "sample_test"
    description: "field limit works when fields distributed amongst several documents"
    expected_names: ["numColumns"]
    expected_results:
      - [3]
    expected_types: [int]
    id: 1
    sql_cleanup_list: [
      'set @@global.max_num_fields_per_collection=DEFAULT',
      'flush sample'
    ]
    sql_list: [
      'set @@global.max_num_fields_per_collection=3',
      'flush sample',
      'select count(*) as numColumns from information_schema.columns where table_name="many_docs"'
    ]
    sync: true

  - db: "sample_test"
    description: "field limit works when some fields come from nested documents"
    expected_names: ["column_name"]
    expected_results:
      - ["_id"]
      - ["doc1.int1"]
      - ["doc1.int2"]
    expected_types: [varchar]
    id: 2
