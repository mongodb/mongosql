testcases:

# SCHEMATA
- sql: "select * from information_schema.schemata where SCHEMA_NAME like 'information%' order by schema_name"
  id: '0'
  schema_mapping_heuristics:
  - drdl
  db: information_schema_test
  description: "schemata full"
  expected_names: ["CATALOG_NAME", "SCHEMA_NAME", "DEFAULT_CHARACTER_SET_NAME", "DEFAULT_COLLATION_NAME", "SQL_PATH"]
  expected_types: [varchar, varchar, varchar, varchar, varchar]
  expected:
  - ["def", "information_schema", "utf8", "utf8_bin", ""]
  - ["def", "information_schema_test", "utf8", "utf8_bin", ""]
  - ["def", "information_schema_test2", "utf8", "utf8_bin", ""]

