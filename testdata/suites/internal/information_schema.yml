  - db: information_schema_test
    description: table_constraints_test
    expected_names: [constraint_name, constraint_type]
    expected_results:
      - [PRIMARY, PRIMARY KEY]
      - [fk_information_schema_test_information_schema_3_b_to_information_schema_3_1, FOREIGN KEY]
    expected_types: [varchar, varchar]
    id: '6'
    sql: select constraint_name, constraint_type from information_schema.TABLE_CONSTRAINTS where TABLE_NAME='information_schema_3_b' AND CONSTRAINT_SCHEMA='information_schema_test'
    unordered: true

  - db: information_schema_test
    description: check child keys when sibling arrays are present in a child table
    expected_names: [constraint_name, column_name]
    expected_results:
      - [PRIMARY, _id]
      - [PRIMARY, b_idx]
      - [fk_information_schema_test_information_schema_3_b_to_information_schema_3_1, _id]
    expected_types: [varchar, varchar]
    id: '7'
    sql: select constraint_name, column_name from information_schema.key_column_usage where table_name='information_schema_3_b' AND CONSTRAINT_SCHEMA='information_schema_test'
    unordered: true

  - db: information_schema_test
    description: check grandchild keys when no child table exists without siblings
    expected_names: [constraint_name, column_name]
    expected_results:
      - [PRIMARY, _id]
      - [PRIMARY, b.d_idx]
      - [PRIMARY, b_idx]
      - [fk_information_schema_test_information_schema_3_b_d_to_information_schema_3_b_1, _id]
      - [fk_information_schema_test_information_schema_3_b_d_to_information_schema_3_b_1, b_idx]
    expected_types: [varchar, varchar]
    id: '8'
    sql: select constraint_name, column_name from information_schema.key_column_usage where table_name='information_schema_3_b_d' AND CONSTRAINT_SCHEMA='information_schema_test' order by constraint_name
    unordered: true

  - db: information_schema_test
    description: check when foreign keys are aliased between grandgrandchild and grandchild tables and child table doesn't exist
    expected_names: [constraint_name, column_name, referenced_table_name, referenced_column_name]
    expected_results:
      - [PRIMARY, _id, null, null]
      - [PRIMARY, b_idx, null, null]
      - [fk_information_schema_test_information_schema_4_b_d_e_to_information_schema_4_b_1, _id, information_schema_4_b, _id]
      - [fk_information_schema_test_information_schema_4_b_d_e_to_information_schema_4_b_1, b_idx, information_schema_4_b, b_idx]
    expected_types: [varchar, varchar, varchar, varchar]
    id: '9'
    sql: select constraint_name, column_name, referenced_table_name, referenced_column_name from information_schema.key_column_usage where table_name='information_schema_4_b_d_e' AND CONSTRAINT_SCHEMA='information_schema_test'
    unordered: true

  - db: information_schema_test
    description: check if unqiue indexes get picked up
    expected_names: [constraint_name, column_name]
    expected_results:
