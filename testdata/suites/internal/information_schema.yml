# PRIMARY KEYS/FOREIGN KEYS
- sql: "select constraint_name, constraint_type from information_schema.TABLE_CONSTRAINTS where TABLE_NAME='grandchild' AND CONSTRAINT_SCHEMA='information_schema_test'"
  id: '6'
  schema_mapping_heuristics:
  - drdl
  db: information_schema_test
  description: "table_constraints_test"
  expected_names: ["constraint_name", "constraint_type"]
  expected_types: [varchar, varchar]
  expected:
  - ["PRIMARY", "PRIMARY KEY"]
  - ["fk_information_schema_test_grandchild_to_parent_1", "FOREIGN KEY"]

- sql: "select constraint_name, column_name from information_schema.key_column_usage where table_name='childAndSibling' AND CONSTRAINT_SCHEMA='information_schema_test'"
  id: '7'
  schema_mapping_heuristics:
  - drdl
  db: information_schema_test
  description: "check child keys when sibling arrays are present in a child table"
  expected_names: ["constraint_name", "column_name"]
  expected_types: [varchar, varchar]
  expected:
  - ["PRIMARY", "id"]
  - ["PRIMARY", "b_idx"]
  - ["PRIMARY", "c_idx"]

- sql: "select constraint_name, column_name from information_schema.key_column_usage where table_name='grandchild' AND CONSTRAINT_SCHEMA='information_schema_test'"
  id: '8'
  schema_mapping_heuristics:
  - drdl
  db: information_schema_test
  description: "check grandchild keys when no child table exists without siblings"
  expected_names: ["constraint_name", "column_name"]
  expected_types: [varchar, varchar]
  expected:
  - ["PRIMARY", "id"]
  - ["PRIMARY", "b_idx"]
  - ["PRIMARY", "d_idx"]
  - ["fk_information_schema_test_grandchild_to_parent_1", "id"]

- sql: "select constraint_name, column_name, referenced_table_name, referenced_column_name from information_schema.key_column_usage where table_name='grandGrandChild1' AND CONSTRAINT_SCHEMA='information_schema_test'"
  id: '9'
  schema_mapping_heuristics:
  - drdl
  db: information_schema_test
  description: "check when foreign keys are aliased between grandgrandchild and grandchild tables and child table doesn't exist"
  expected_names: ["constraint_name", "column_name", "referenced_table_name", "referenced_column_name"]
  expected_types: [varchar, varchar, varchar, varchar]
  expected:
  - ["PRIMARY", "id", ~, ~]
  - ["PRIMARY", "b_alias", ~, ~]
  - ["PRIMARY", "d_alias", ~, ~]
  - ["PRIMARY", "e_alias", ~, ~]
  - ["fk_information_schema_test_grandGrandChild1_to_grandchild1_1", "id", "grandchild1", "id"]
  - ["fk_information_schema_test_grandGrandChild1_to_grandchild1_1", "b_alias", "grandchild1", "b_idx"]
  - ["fk_information_schema_test_grandGrandChild1_to_grandchild1_1", "d_alias", "grandchild1", "d_idx"]

# Testing that unique indexes show up
