    expected_results:
      - [5.7.12]
    expected_types: [varchar]
    id: '19'
    schema_mapping_heuristics: [drdl]
    sql: select @@version limit 1

  - db: test
    expected_results:
      - [5.7.12]
    expected_types: [varchar]
    id: '20'
    schema_mapping_heuristics: [drdl]
    sql: select @@version limit 0, 1

  - db: test
    expected_results: null
    expected_types: [varchar]
    id: '21'
    schema_mapping_heuristics: [drdl]
    sql: select @@version limit 0, 0

  - db: test
    expected_results: null
    expected_types: [varchar]
    id: '22'
    schema_mapping_heuristics: [drdl]
    sql: select @@version limit 0 OFFSET 2

  - db: test
    expected_results:
      - [5.7.12]
    expected_types: [varchar]
    id: '23'
    schema_mapping_heuristics: [drdl]
    sql: select @@version limit 1 OFFSET 0

  - db: functions_test
    expected_results:
      - [2]
      - [null]
      - [-2]
      - [5]
      - [null]
    expected_types: [int]
    id: '24'
    schema_mapping_heuristics: [drdl]
    sql: select a + true from scalar

  - db: where_test
    expected_names: [s, x]
    expected_results:
      - [123abc, 0]
      - ['   12 3 abc', 0]
      - [0a23bc, 1]
      - [1a23bc, 0]
      - [hello, 1]
      - ['  42world', 0]
      - ['123', 0]
    expected_types: [varchar, int]
    id: string_col_xor_0
    schema_mapping_heuristics: [majority, drdl]
    sql: select s, s xor 1 x from where_strings
    variables: {type_conversion_mode: mysql}

  - db: where_test
    expected_names: [s, x]
    expected_results:
      - [123abc, 1]
      - ['   12 3 abc', 1]
      - [0a23bc, 1]
      - [1a23bc, 1]
      - [hello, 1]
      - ['  42world', 1]
      - ['123', 0]
    expected_types: [varchar, int]
    id: string_col_xor_1
    schema_mapping_heuristics: [majority, drdl]
    sql: select s, s xor 1 x from where_strings
    variables: {type_conversion_mode: mongosql}

  - db: test
    expected_names: [_id]
    expected_results:
      - [570e919f65d33734a8605cb9]
    expected_types: [varchar]
    id: _id search in literal
    schema_mapping_heuristics: [majority, drdl]
    sql: select _id from test2 where _id in ('570e919f65d33734a8605cb9')

  - db: test
    expected_names: [_id]
    expected_results:
      - [570e919f65d33734a8605cb9]
    expected_types: [varchar]
    id: _id search in column
    schema_mapping_heuristics: [majority, drdl]
    sql: select _id from test2 where _id in (_id)

  - db: test
    expected_names: [sum]
    expected_results:
      - [0]
    expected_types: [int]
    id: _id with float in column
    schema_mapping_heuristics: [majority, drdl]
    sql: select _id=a as sum from test2

  - db: test
    expected_names: [sum]
    expected_results:
      - [0]
    expected_types: [int]
    id: _id with string in column
    schema_mapping_heuristics: [majority, drdl]
    sql: select _id=b as sum from test2

  - db: test
    expected_names: [eval]
    expected_results:
      - [1]
    expected_types: [int]
    id: _id expression in column
    schema_mapping_heuristics: [majority, drdl]
    sql: select (_id in (_id)) as eval from test2

  - db: test
    expected_names: [eval]
    expected_results:
      - [1]
    expected_types: [int]
    id: _id expression in literal
    schema_mapping_heuristics: [majority, drdl]
    sql: select (_id in ('570e919f65d33734a8605cb9')) as eval from test2

  - db: test
    expected_names: [count]
    expected_results:
      - [1]
    expected_types: [int]
    id: _id_in_single_str_tuple_predicate
    schema_mapping_heuristics: [majority, drdl]
    sql: select count(*) as count from test2 where (_id in ('570e919f65d33734a8605cb9'))

  - db: test
    expected_names: [eval]
    expected_results:
      - [1]
    expected_types: [int]
    id: _id_in_longer_str_tuple
    schema_mapping_heuristics: [majority, drdl]
    sql: select (_id in ('570e919f65d33734a8605cb9', '570e919f65d33734a8605cb9')) as eval from test2

  - db: test
    expected_names: [count]
    expected_results:
      - [1]
    expected_types: [int]
    id: _id_in_longer_str_tuple_predicate
    schema_mapping_heuristics: [majority, drdl]
    sql: select count(*) as count from test2 where (_id in ('570e919f65d33734a8605cb9', '570e919f65d33734a8605cb9'))
