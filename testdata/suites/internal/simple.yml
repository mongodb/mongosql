- sql: "select a + true from bar"
  id: '24'
  schema_mapping_heuristics:
  - drdl
  db: functions_test
  expected_types: [int]
  expected:
    - [2]
    - [~]
    - [-2]
    - [5]
    - [~]
- sql: "select s, s xor 1 x from where_strings"
  id: 'string_col_xor_0'
  schema_mapping_heuristics:
  - majority
  - drdl
  variables:
    type_conversion_mode: "mysql"
  db: where_test
  expected_names: ["s", "x"]
  expected_types: ["varchar", "int"]
  expected:
  - ['123abc', 0]
  - ['   12 3 abc', 0]
  - ['0a23bc', 1]
  - ['1a23bc', 0]
  - ['hello', 1]
  - ['  42world', 0]
  - ['123', 0]
- sql: "select s, s xor 1 x from where_strings"
  id: 'string_col_xor_1'
  schema_mapping_heuristics:
  - majority
  - drdl
  variables:
    type_conversion_mode: "mongosql"
  db: where_test
  expected_names: ["s", "x"]
  expected_types: ["varchar", "int"]
  expected:
  - ['123abc', 1]
  - ['   12 3 abc', 1]
  - ['0a23bc', 1]
  - ['1a23bc', 1]
  - ['hello', 1]
  - ['  42world', 1]
  - ['123', 0]
