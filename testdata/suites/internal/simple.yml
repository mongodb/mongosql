# Tests
testcases:
- sql: "SELECT a, b, c, latitude, longitude from .test1"
  id: '0'
  schema_mapping_heuristics:
  - drdl
  db: test
  expected_types: [int, varchar, int, float, float]
  expected:
    - [1, "hello world!", 11, 124.0, 35.0]
- sql: "SELECT a, b, c, latitude, longitude from test1"
  id: '1'
