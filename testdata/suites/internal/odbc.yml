testcases:

  - db: odbc_test
    description: odbc function
    expected_names: [_id, exp(a)]
    expected_results:
      - [0, 2.718281828459045]
      - [1, 7]
      - [2, 20]
    expected_types: [int, float]
    id: '0'
    sql: select _id, {fn exp(a)} from odbc_1
    unordered: true

  - db: odbc_test
    description: odbc time literal
    expected_names: [time]
    expected_results:
      - ['0000-01-01 12:40:30']
    expected_types: [varchar]
    id: '1'
    sql: select {t '12:40:30'} as `time`
    unordered: true

  - db: odbc_test
    description: odbc timestamp literal
    expected_names: [ts]
    expected_results:
      - ['2012-01-02 12:40:30']
    expected_types: [varchar]
    id: '2'
    sql: select {ts '2012-01-02 12:40:30'} as `ts`
    unordered: true

  - db: odbc_test
    description: odbc date literal
    expected_names: [d]
    expected_results:
      - ['2012-01-02']
    expected_types: [varchar]
    id: '3'
    sql: select {d '2012-01-02'} as `d`
    unordered: true

  - db: odbc_test
    description: odbc left outer join
    expected_names: [_id, _id]
    expected_results:
      - [0, 0]
      - [1, 1]
      - [2, null]
    expected_types: [int, int]
    id: '4'
    sql: select odbc_1._id, odbc_2._id from { OJ odbc_1 LEFT OUTER JOIN odbc_2 ON odbc_1._id=odbc_2._id }
    unordered: true

  - db: odbc_test
    description: mysql specific odbc inner join
    expected_names: [_id, _id]
    expected_results:
      - [0, 0]
      - [1, 1]
    expected_types: [int, int]
    id: '5'
    sql: select odbc_1._id, odbc_2._id from { OJ odbc_1 INNER JOIN odbc_2 ON odbc_1._id=odbc_2._id }
    unordered: true
