testcases:

  - db: subqueries_from_test
    description: global *
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '0'
    sql: select * from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: qualified *
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '1'
    sql: select foo.* from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: duplicate qualified *
    expected_names: [_id, a, b, _id, a, b]
    expected_results:
      - [0, 1, null, 0, 1, null]
      - [1, 2, null, 1, 2, null]
      - [2, 3, null, 2, 3, null]
    expected_types: [int, int, int, int, int, int]
    id: '2'
    sql: select foo.*, foo.* from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: alias qualified *
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '3'
    sql: select f.* from (select * from subqueries_from_test.subqueries_from) f

  - db: subqueries_from_test
    description: columns
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '4'
    sql: select _id, a, b from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: columns with wrong casing
    expected_names: [_ID, A, B]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '5'
    sql: select _ID, A, B from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: qualified columns
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '6'
    sql: select foo._id, foo.a, foo.b from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: alias qualified columns
    expected_names: [_id, a, b]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '7'
    sql: select f._id, f.a, f.b from (select * from subqueries_from_test.subqueries_from) f

  - db: subqueries_from_test
    description: duplicate columns
    expected_names: [_id, a, b, _id, a, b]
    expected_results:
      - [0, 1, null, 0, 1, null]
      - [1, 2, null, 1, 2, null]
      - [2, 3, null, 2, 3, null]
    expected_types: [int, int, int, int, int, int]
    id: '8'
    sql: select _id, a, b, _id, a, b from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: aliases
    expected_names: [d, e, f]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '9'
    sql: select _id as d, a as e, b as f from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: aliased as another column
    expected_names: [a, b, _id]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '10'
    sql: select _id as a, a as b, b as _id from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: duplicate aliases
    expected_names: [_id, _id, _id]
    expected_results:
      - [0, 1, null]
      - [1, 2, null]
      - [2, 3, null]
    expected_types: [int, int, int]
    id: '11'
    sql: select _id, a as _id, b as _id from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: aliases differing by case
    expected_names: [_id, _ID]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    expected_types: [int, int]
    id: '12'
    sql: select _id, a as _ID from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: subset of columns
    expected_names: [_id, b]
    expected_results:
      - [0, null]
      - [1, null]
      - [2, null]
    expected_types: [int, int]
    id: '13'
    sql: select _id, b from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: subset of columns out of order
    expected_names: [b, _id]
    expected_results:
      - [null, 0]
      - [null, 1]
      - [null, 2]
    expected_types: [int, int]
    id: '14'
    sql: select b, _id from (select * from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: global * from column subset
    expected_names: [_id, a]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    expected_types: [int, int]
    id: '15'
    sql: select * from (select _id, a from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: global * from aliased column subset
    expected_names: [a, b]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    expected_types: [int, int]
    id: '16'
    sql: select * from (select _id as a, a as b from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: named columns from aliased column subset
    expected_names: [a, b]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    expected_types: [int, int]
    id: '17'
    sql: select a, b from (select _id as a, a as b from subqueries_from_test.subqueries_from) foo

  - db: subqueries_from_test
    description: named columns from aliased column subset from a nested subquery
    expected_names: [a, b]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [2, 3]
    expected_types: [int, int]
    id: '18'
    sql: select a, b from (select * from (select _id as a, a as b from subqueries_from_test.subqueries_from) foo) f

  - db: subqueries_from_test
    description: BI-982
    expected_names: [name, sum(value)]
    expected_results:
      - [rec1, 241.14]
    expected_types: [varchar, float]
    id: '19'
    sql: SELECT name, sum ( value )  FROM ( SELECT CASE WHEN INSTR(name, '2') THEN '2' ELSE name END name, value from `subqueries_from_test`.`subqueries_BI-982` ) as derived_table

  - db: subqueries_from_test
    description: test a left subquery comparison
    expected_names: [a]
    expected_results:
      - [1]
    expected_types: [int]
    id: 'left_subquery'
    sql: select (select _id from subqueries_from limit 1) = 0 a

  - db: subqueries_from_test
    description: test a right subquery comparison
    expected_names: [a]
    expected_results:
      - [1]
    expected_types: [int]
    id: 'right_subquery'
    sql: select 0 = (select _id from subqueries_from limit 1) a

  - db: subqueries_from_test
    description: test a subquery comparison where one of the children is a union
    expected_names: [_id, a, b]
    expected_results: []
    expected_types: [int, int, int]
    id: 'union_subquery'
    sql: select * from subqueries_from where (select * from subqueries_from limit 1) = (select * from subqueries_from limit 0 union select * from `subqueries_BI-982` limit 1);

  - db: subqueries_from_test
    description: BI-2144 regression test--no panic for correlated column expr
    expected_names: [(select a)]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: 'correlated_column_subquery'
    sql: select (select a) from subqueries_from
