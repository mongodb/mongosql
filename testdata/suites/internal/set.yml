- sql: "SET @@global.log_level = 2"
  id: '28a'
  db: set_test
  verify: "SELECT @@global.log_level"
  description: "set global log level"
  expected_types: [int]
  sql_cleanup: "SET @@global.log_level = DEFAULT"
  expected:
  - [2]
- sql: "SET @@global.log_level = -1"
  id: '28b'
  db: set_test
  verify: "SELECT @@global.log_level"
  description: "SET global log level with negative value"
  expected_types: [int]
  sql_cleanup: "SET @@global.log_level = DEFAULT"
  expected:
  - [-1]
