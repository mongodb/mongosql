  id: '28c'
  db: set_test
  description: "should not be allowed to set the session variable"
  sql_cleanup: "SET @@global.log_level = DEFAULT"
  expected_error: "Error 1229: Variable 'log_level' is a GLOBAL variable and should be set with SET GLOBAL"
