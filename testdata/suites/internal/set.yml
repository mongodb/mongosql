#
# Test Cases
#
testcases:

- sql: "set @t1 = 12"
  id: '0'
  db: set_test
  verify: "select @t1"
  description: "user variable"
  expected_names: ["@t1"]
  expected_types: [int]
  expected: 
  - [12]
- sql: "set @binlog_format = '12'"
  id: '1'
  db: set_test
  verify: "select @binlog_format"
  description: "binlog_format"
  expected_names: ["@binlog_format"]
  expected_types: [varchar]
  expected: 
  - ["12"]
- sql: "set @t1 = (select sum(a) from foo)"
  id: '2'
  db: set_test
  verify: "select @t1"
  description: "user variable with query"
  expected_names: ["@t1"]
  expected_types: [int]
  expected: 
  - [6]
- sql: "set @t1 = (select sum(a) from foo), @t2 = 12"
  id: '3'
  db: set_test
  verify: "select @t1, @t2"
  description: "mulitple user variable with query"
  expected_names: ["@t1", "@t2"]
  expected_types: [int, int]
  expected: 
  - [6, 12]
