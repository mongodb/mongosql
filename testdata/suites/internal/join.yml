testcases:

# Cross Joins
- sql: "select * from join_test.join_1, join_test.join_2"
  id: '0'
  schema_mapping_heuristics:
  - drdl
  db: join_test
  schema_mapping_heuristics:
  - majority
  - drdl
  description: "global star"
  expected_names: ["_id", "a", "b", "_id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select join_1.*, join_2.* from join_test.join_1, join_test.join_2"
  id: '1'
  schema_mapping_heuristics:
  - drdl
  db: join_test
  schema_mapping_heuristics:
  - majority
  - drdl
  description: "qualified star"
