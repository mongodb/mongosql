#
# Tests
#
testcases:

# Cross Joins
- sql: "select * from join_test.foo, join_test.bar"
  id: '0'
  db: join_test
  description: "global star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select foo.*, bar.* from join_test.foo, join_test.bar"
  id: '1'
  db: join_test
  description: "qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from join_test.foo f, join_test.bar b"
  id: '2'
  db: join_test
  description: "aliased qualified star"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from join_test.foo f, (select * from join_test.bar) b"
  id: '3'
  db: join_test
  description: "aliased qualified star with subquery"
  expected_names: ["id", "a", "b", "id", "c", "d"]
  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select tx.rnum,tx.c1, tx.c2, ty.c2 from tjoin1 tx, tjoin2 ty order by 1, 2, 3, 4"
  id: '4'
  db: join_test
  description: "BI-857"
  expected_names: ["rnum", "c1", "c2", "c2"]
  expected_types: [int, int, int, varchar]
  expected:
  - [0, 10, 15, "BB"]
  - [0, 10, 15, "DD"]
  - [0, 10, 15, "EE"]
  - [0, 10, 15, "FF"]
  - [1, 20, 25, "BB"]
  - [1, 20, 25, "DD"]
  - [1, 20, 25, "EE"]
  - [1, 20, 25, "FF"]
  - [2, ~, 50, "BB"]
  - [2, ~, 50, "DD"]
  - [2, ~, 50, "EE"]
  - [2, ~, 50, "FF"]

# Implicit Inner Joins
