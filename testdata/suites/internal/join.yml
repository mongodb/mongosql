  expected_types: [int, int, int, int, int, int]
  expected: 
  - [0, 1, ~, 0, 10, ~]
  - [0, 1, ~, 1, 11, 1]
  - [0, 1, ~, 20, 30, ~]
  - [1, 2, 1, 0, 10, ~]
  - [1, 2, 1, 1, 11, 1]
  - [1, 2, 1, 20, 30, ~]
  - [2, 3, ~, 0, 10, ~]
  - [2, 3, ~, 1, 11, 1]
  - [2, 3, ~, 20, 30, ~]
- sql: "select f.*, b.* from join_test.join_1 f, join_test.join_2 b"
  id: '2'
