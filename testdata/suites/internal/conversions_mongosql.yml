#
# conversions from varchar
#

- sql: "select value from varchar"
  id: varchar_data_assertion
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value"]
  expected_types: [varchar]
  expected:
  - [""]
  - ["  abc "]
  - [" 123 "]
  - [" -123.4 "]
  - ["0"]
  - ["1"]
  - ["true"]
  - ["false"]
  - [" false "]
  - ["20180101"]
  - [" 20180101 "]
  - ["2018-01-01"]
  - [" 2018-01-01 "]
  - ["2.8e-3"]
  - ["2.8e3"]
  - ["   +1111e +3af"]
  - ["   +1111e -3af"]
  - ["   -1111e +3af"]
  - ["   -1111e -3af"]
  - ["   -1111 e -3af"]
  - ["   -1111 e -3af"]
  - ["   +1111 e -3af"]
  - ["5:05"]
  - [" 5:05 "]
  - ["5:05pm"]
  - ["17:05"]
  - [~]

- sql: "select value, convert(value, BINARY) as converted from varchar"
