- sql: "select value, convert(value, SIGNED) as converted from date"
  id: date_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, int]
  expected:
  - ["2000-01-02", 20000102]

#
# conversions from varchar
#

- sql: "select value from varchar"
  id: varchar_data_assertion
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value"]
  expected_types: [string]
  expected:
  - [""]
  - ["  abc "]
  - [" 123 "]
  - [" -123.4 "]
  - ["0"]
  - ["1"]
  - ["true"]
  - ["false"]
  - [" false "]
  - ["20180101"]
  - [" 20180101 "]
  - ["2018-01-01"]
  - [" 2018-01-01 "]
  - ["2.8e-3"]
  - ["2.8e3"]
  - ["   +1111e +3af"]
  - ["   +1111e -3af"]
  - ["   -1111e +3af"]
  - ["   -1111e -3af"]
  - ["   -1111 e -3af"]
  - ["   -1111 e -3af"]
  - ["   +1111 e -3af"]
  - ["5:05"]
  - [" 5:05 "]
  - ["5:05pm"]
  - ["17:05"]
  - [~]

- sql: "select value, convert(value, BINARY) as converted from varchar"
  id: varchar_to_binary
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["", ~]
  - ["  abc ", ~]
  - [" 123 ", ~]
  - [" -123.4 ", ~]
  - ["0", ~]
  - ["1", ~]
  - ["true", ~]
  - ["false", ~]
  - [" false ", ~]
  - ["20180101", ~]
  - [" 20180101 ", ~]
  - ["2018-01-01", ~]
  - [" 2018-01-01 ", ~]
  - ["2.8e-3", ~]
  - ["2.8e3", ~]
  - ["   +1111e +3af", ~]
  - ["   +1111e -3af", ~]
  - ["   -1111e +3af", ~]
  - ["   -1111e -3af", ~]
  - ["   -1111 e -3af", ~]
  - ["   -1111 e -3af", ~]
  - ["   +1111 e -3af", ~]
  - ["5:05", ~]
  - [" 5:05 ", ~]
  - ["5:05pm", ~]
  - ["17:05", ~]
  - [~, ~]

- sql: "select value, convert(value, CHAR) as converted from varchar"
  id: varchar_to_char
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["", ""]
  - ["  abc ", "  abc "]
  - [" 123 ", " 123 "]
  - [" -123.4 ", " -123.4 "]
  - ["0", "0"]
  - ["1", "1"]
  - ["true", "true"]
  - ["false", "false"]
  - [" false ", " false "]
  - ["20180101", "20180101"]
  - [" 20180101 ", " 20180101 "]
  - ["2018-01-01", "2018-01-01"]
  - [" 2018-01-01 ", " 2018-01-01 "]
  - ["2.8e-3", "2.8e-3"]
  - ["2.8e3", "2.8e3"]
  - ["   +1111e +3af", "   +1111e +3af"]
  - ["   +1111e -3af", "   +1111e -3af"]
  - ["   -1111e +3af", "   -1111e +3af"]
  - ["   -1111e -3af", "   -1111e -3af"]
  - ["   -1111 e -3af", "   -1111 e -3af"]
  - ["   -1111 e -3af", "   -1111 e -3af"]
  - ["   +1111 e -3af", "   +1111 e -3af"]
  - ["5:05", "5:05"]
  - [" 5:05 ", " 5:05 "]
  - ["5:05pm", "5:05pm"]
  - ["17:05", "17:05"]
  - [~, ~]

