- sql: "select value, convert(value, TIME) as converted from int"
  id: int_to_time
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, string]
  expected:
  - [0, ~]
  - [1, ~]
  - [2, ~]
  - [50000, ~]
  - [-1, ~]
  - [~, ~]

- sql: "select value, convert(value, DECIMAL) as converted from int"
  id: int_to_decimal
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, float]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

- sql: "select value, convert(value, SIGNED) as converted from int"
  id: int_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, int]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

#
# conversions from float
#

- sql: "select value from float"
  id: float_data_assertion
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value"]
  expected_types: [float]
  expected:
  - [0]
  - [1]
  - [1.1]
  - [2.5]
  - [50000.00001]
  - [-1]
  - [-1.1]
  - [-2.5]
  - [~]

- sql: "select value, convert(value, BINARY) as converted from float"
  id: float_to_binary
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [float, string]
  expected:
  - [0, ~]
  - [1, ~]
  - [1.1, ~]
  - [2.5, ~]
  - [50000.00001, ~]
  - [-1, ~]
  - [-1.1, ~]
  - [-2.5, ~]
  - [~, ~]

- sql: "select value, convert(value, CHAR) as converted from float"
  id: float_to_char
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [float, string]
  expected:
  - [0, "0"]
  - [1, "1"]
  - [1.1, "1.1"]
  - [2.5, "2.5"]
  - [50000.00001, "50000.00001"]
  - [-1, "-1"]
  - [-1.1, "-1.1"]
  - [-2.5, "-2.5"]
  - [~, ~]

