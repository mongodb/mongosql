testcases:

#
# conversions from int
#

- sql: "select value from int"
  id: int_data_assertion
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value"]
  expected_types: [int]
  expected:
  - [0]
  - [1]
  - [2]
  - [50000]
  - [-1]
  - [~]

- sql: "select value, convert(value, BINARY) as converted from int"
  id: int_to_binary
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, varchar]
  expected:
  - [0, ~]
  - [1, ~]
  - [2, ~]
  - [50000, ~]
  - [-1, ~]
  - [~, ~]

- sql: "select value, convert(value, CHAR) as converted from int"
  id: int_to_char
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, varchar]
  expected:
  - [0, "0"]
  - [1, "1"]
  - [2, "2"]
  - [50000, "50000"]
  - [-1, "-1"]
  - [~, ~]

- sql: "select value, convert(value, DATE) as converted from int"
  id: int_to_date
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, varchar]
  expected:
  - [0, "1970-01-01"]
  - [1, "1970-01-01"]
  - [2, "1970-01-01"]
  - [50000, "1970-01-01"]
  - [-1, "1969-12-31"]
  - [~, ~]

- sql: "select value, convert(value, DATETIME) as converted from int"
  id: int_to_datetime
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, varchar]
  expected:
  - [0, "1970-01-01 00:00:00"]
  - [1, "1970-01-01 00:00:00.001000"]
  - [2, "1970-01-01 00:00:00.002000"]
  - [50000, "1970-01-01 00:00:50"]
  - [-1, "1969-12-31 23:59:59.999000"]
  - [~, ~]

- sql: "select value, convert(value, TIME) as converted from int"
  id: int_to_time
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, varchar]
  expected:
  - [0, ~]
  - [1, ~]
  - [2, ~]
  - [50000, ~]
  - [-1, ~]
  - [~, ~]

- sql: "select value, convert(value, DECIMAL) as converted from int"
  id: int_to_decimal
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, float]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

- sql: "select value, convert(value, SIGNED) as converted from int"
  id: int_to_signed
  schema_mapping_heuristics:
  - drdl
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [int, int]
  expected:
  - [0, 0]
  - [1, 1]
  - [2, 2]
  - [50000, 50000]
  - [-1, -1]
  - [~, ~]

