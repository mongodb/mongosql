- sql: "select value, convert(value, TIME) as converted from float"
  id: float_to_time
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [float, string]
  expected:
  - [0, ~]
  - [1, ~]
  - [1.1, ~]
  - [2.5, ~]
  - [50000.00001, ~]
  - [-1, ~]
  - [-1.1, ~]
  - [-2.5, ~]
  - [~, ~]

- sql: "select value, convert(value, DECIMAL) as converted from float"
  id: float_to_decimal
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [float, float]
  expected:
  - [0, 0]
  - [1, 1]
  - [1.1, 1.1]
  - [2.5, 2.5]
  - [50000.00001, 50000.00001]
  - [-1, -1]
  - [-1.1, -1.1]
  - [-2.5, -2.5]
  - [~, ~]

- sql: "select value, convert(value, SIGNED) as converted from float"
  id: float_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [float, int]
  expected:
  - [0, 0]
  - [1, 1]
  - [1.1, 1]
  - [2.5, 3]
  - [50000.00001, 50000]
  - [-1, -1]
  - [-1.1, -1]
  - [-2.5, -3]
  - [~, ~]

#
# conversions from datetime
#

- sql: "select value from datetime"
  id: datetime_data_assertion
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value"]
  expected_types: [string]
  expected:
  - ["2000-01-02 12:34:56"]

- sql: "select value, convert(value, BINARY) as converted from datetime"
  id: datetime_to_binary
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", ~]

- sql: "select value, convert(value, CHAR) as converted from datetime"
  id: datetime_to_char
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", "2000-01-02 12:34:56.000000"]

- sql: "select value, convert(value, DATE) as converted from datetime"
  id: datetime_to_date
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", "2000-01-02"]

- sql: "select value, convert(value, DATETIME) as converted from datetime"
  id: datetime_to_datetime
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", "2000-01-02 12:34:56"]

- sql: "select value, convert(value, TIME) as converted from datetime"
  id: datetime_to_time
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, string]
  expected:
  - ["2000-01-02 12:34:56", ~]

- sql: "select value, convert(value, DECIMAL) as converted from datetime"
  id: datetime_to_decimal
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, float]
  expected:
  - ["2000-01-02 12:34:56", 20000102123456]

- sql: "select value, convert(value, SIGNED) as converted from datetime"
  id: datetime_to_signed
  db: conversions_test
  variables:
    type_conversion_mode: "mongosql"
  expected_names: ["value", "converted"]
  expected_types: [string, int]
  expected:
  - ["2000-01-02 12:34:56", 20000102123456]

