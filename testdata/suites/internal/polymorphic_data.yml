testcases:
- sql: 'describe weeks'
  schema_mapping_heuristics:
  - lattice
  - majority
  id: describe_weeks_monomorphic
  db: functions_test
  describe: 'test that we find the correct type for monomorphic data'
  expected_names: ['Field', 'Type', 'Null', 'Key', 'Default', 'Extra']
  expected_types: [string, string, string, string, string, string]
  expected:
  - [_id, 'varchar(65535)', 'YES',  'PRI',  ~,  '']
  - [s, 'varchar(65535)', 'YES', '',  ~,  '']

- sql: 'describe scalar_types'
  schema_mapping_heuristics:
  - lattice
  id: describe_scalar_type_lattice
  db: polymorphic_data_test
  describe: 'test that we find the correct type lattice least upper bound for each column'
  expected_names: ['Field', 'Type', 'Null', 'Key', 'Default', 'Extra']
  expected_types: [string, string, string, string, string, string]
  expected:
  - [_id, 'bigint(20)', 'YES', PRI, ~, '' ]
  - [doubleint, double, 'YES', '', ~, '' ]
  - [doublelong, 'decimal(65,20)', 'YES', '', ~, '' ]
  - [mid, 'decimal(65,20)', 'YES', '', ~, '' ]
  - [mixed, 'varchar(65535)', 'YES', '', ~, '']
  - [supremum, 'varchar(65535)', 'YES', '', ~, '' ]

- sql: 'describe scalar_types'
  schema_mapping_heuristics:
  - majority
  id: describe_scalar_type_lattice_majority
  db: polymorphic_data_test
  describe: 'test that we find the correct type lattice least upper bound for each column'
  expected_names: ['Field', 'Type', 'Null', 'Key', 'Default', 'Extra']
  expected_types: [string, string, string, string, string, string]
  expected:
  - [_id, 'bigint(20)', 'YES', PRI, ~, '' ]
  - [doubleint, 'bigint(20)', 'YES', '', ~, '' ]
  - [doublelong, 'bigint(20)', 'YES', '', ~, '' ]
  - [mid, 'tinyint(1)', 'YES', '', ~, '' ]
  - [mixed, 'tinyint(1)', 'YES', '', ~, '']
  - [supremum, 'varchar(65535)', 'YES', '', ~, '' ]

- sql: 'select * from scalar_types'
  schema_mapping_heuristics:
  - lattice
  id: select_scalar_type_lattice
  db: polymorphic_data_test
  describe: 'show all the values in the scalar_types table'
  expected_names: [_id, doubleint, doublelong, mid, mixed, supremum]
  expected_types: [int, 'float64', string, string, string, string]
  expected:
  - [ 0, 1, 1, 1, hello, '01020304-0506-0708-090a-0b0c0d0e0f10' ]
  - [ 1, 2, 2, 1, 1, 314 ]
  - [ 2, 3.14, 3.14, 0, 0, 3.14 ]
  - [ 3, 4, 4, 3.14, 3.14, hello ]

- sql: 'select supremum from scalar_types'
  variables:
    polymorphic_type_conversion_mode: fast
    type_conversion_mode: "mongosql"
  schema_mapping_heuristics:
  - lattice
  min_server_version: 4.0
  id: select_scalar_type_lattice_fast
  db: polymorphic_data_test
  describe: 'show supremum column with polymorphic_type_conversion_mode=fast'
  expected_names: [supremum]
  expected_types: [string]
  expected:
  - [ ~ ]
  - [ 314 ]
  - [ 3.14 ]
  - [ hello ]

- sql: 'select supremum from scalar_types'
  variables:
    polymorphic_type_conversion_mode: safe
    type_conversion_mode: "mongosql"
  schema_mapping_heuristics:
  - lattice
  min_server_version: 4.0
  id: select_scalar_type_lattice_safe
  db: polymorphic_data_test
  describe: 'show supremum column with polymorphic_type_conversion_mode=safe'
  expected_names: [supremum]
  expected_types: [string]
  expected:
  - [ ~ ]
  - [ 314 ]
  - [ 3.14 ]
  - [ hello ]

- sql: 'select * from scalar_types'
  schema_mapping_heuristics:
  - majority
  id: select_scalar_majority
  db: polymorphic_data_test
  describe: 'show all the values in the scalar_types table'
  expected_names: [_id, doubleint, doublelong, mid, mixed, supremum]
  expected_types: [int, int, int, int, int, string]
  expected:
  - [ 0, 1, 1, 1, 0, '01020304-0506-0708-090a-0b0c0d0e0f10' ]
  - [ 1, 2, 2, 1, 1, 314 ]
  - [ 2, 3, 3, 0, 0, 3.14 ]
  - [ 3, 4, 4, 1, 1, hello ]

- sql: 'select * from simple_object_conflict'
  schema_mapping_heuristics:
  - lattice
  - majority
  id: select_simple_object_conflict
  db: polymorphic_data_test
  describe: 'show that object-scalar conflict works'
  expected_names: [_id, a, 'a.b', 'a.c']
  expected_types: [int, string, string, int]
  expected:
  - [ 0, hello, ~, ~ ]
  - [ 1, ~, world, 42]

- sql: 'select * from simple_array_conflict'
