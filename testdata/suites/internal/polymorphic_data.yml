  describe: 'select embedded docs as strings with type_conversion_mode=safe'
  expected_names: [a]
  expected_types: [string]
  expected:
  - [aboleth]
  - [~]
  - [~]
  - [~]
  - [~]
  - [~]
  - [1]
  - [~]
