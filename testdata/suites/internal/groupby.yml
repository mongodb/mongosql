  - db: groupby_test
    description: show that the distinct rewrite works for a simple query
    expected_names: [a, 'sum(distinct b)']
    expected_results:
      - [1, 1]
      - [3, 3]
      - [2, 5]
    expected_types: [int, int]
    id: 'distinct_rewrite_simple'
    schema_mapping_heuristics: [drdl]
    sql: 'select a, sum(distinct b) from groupby group by a'
    unordered: true
    variables: {rewrite_distinct_as_group: true}

  - db: groupby_test
    description: show that the distinct rewrite works for nested queries
    expected_names: ['count(distinct b)']
    expected_results:
      - [2]
    expected_types: [int]
    id: 'distinct_rewrite_nested'
