  - db: groupby_test
    description: correlated aggregate in having that gets aggregated by parent
    expected_names: [a]
    expected_results:
      - [1]
    expected_types: [int]
    id: 'correlated_aggregate_7'
    sql: select a from groupby f having 10 > (select sum(f.a) from groupby limit 1)
    unordered: true

  - db: groupby_test
