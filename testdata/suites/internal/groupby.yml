testcases:

  - db: groupby_test
    description: no aggregations
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '0'
    sql: select a from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: Group by ambiguous column alias
    expected_error: "Error 1052: Column 'z' in group clause is ambiguous"
    id: 'ambiguous_column_groupBy'
    sql: select a as z, b as z from groupby_test.groupby group by z
    unordered: true

  - db: groupby_test
    description: Group by unknown column reference
    expected_error: "Error 1054: Unknown column '0' in 'group clause'"
    id: 'unknown_column_groupBy'
    sql: select a from groupby_test.groupby group by 0
    unordered: true

  - db: groupby_test
    description: Group by starred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'f'"
    id: 'aggregation_aliased_groupBy_1'
    sql: select a as g, count(*) as f from groupby_test.groupby group by f order by g
    unordered: true

  - db: groupby_test
    description: Group by unstarred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'g'"
    id: 'aggregation_aliased_groupBy_2'
    sql: select a as f, sum(a) as g from groupby_test.groupby group by g order by g
    unordered: true

  - db: groupby_test
    description: Group by sum of variable column and unstarred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'g'"
    id: 'aggregation_aliased_groupBy_3'
    sql: select a as f, a+sum(a) as g from groupby_test.groupby group by g order by a
    unordered: true

  - db: groupby_test
    description: Group by sum of starred aggregation function and variable column that has been aliased
    expected_error: "Error 1056: Can't group on 'f'"
    id: 'aggregation_aliased_groupBy_4'
    sql: select a as g, count(*)+a as f from groupby_test.groupby group by f order by a
    unordered: true

  - db: groupby_test
    description: no aggregations with ordinal
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: 'no_aggregation_1'
    sql: select a from groupby_test.groupby group by 1 order by a
    unordered: true

  - db: groupby_test
    description: no aggregations with alias
    expected_names: [f]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: 'no_aggregation_2'
    sql: select a as f from groupby_test.groupby group by f order by a
    unordered: true

  - db: groupby_test
    description: same column chosen twice
    expected_names: [a, a]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [3, 3]
    expected_types: [int, int]
    id: 'alias_1'
    sql: select a, a from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: same column aliased as itself
    expected_names: [a, a]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [3, 3]
    expected_types: [int, int]
    id: 'alias_2'
    sql: select a as a, a from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: same column aliased twice as a new column
    expected_names: [z, z]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [3, 3]
    expected_types: [int, int]
    id: 'alias_3'
    sql: select a as z, a as z from groupby_test.groupby group by z order by z
    unordered: true

  - db: groupby_test
    description: literal value aliased to existing column in table join
    expected_names: [a]
    expected_results:
      - [1]
    expected_types: [int]
    id: 'alias_4'
    sql: select 1 as a from groupby_test.groupby join groupby_test.groupby g group by a
    unordered: true

  - db: groupby_test
    description: group by chooses the column with an existing name in the table
    expected_names: [a, a]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [3, 3]
    expected_types: [int, int]
    id: 'alias_5'
    sql: select _id as a, a from groupby_test.groupby group by a order by _id
    unordered: true

  - db: groupby_test
    description: group by chooses the column with an existing name in the table
    expected_names: [a, _id]
    expected_results:
      - [0, 1]
      - [1, 2]
      - [3, 3]
    expected_types: [int, int]
    id: 'alias_6'
    sql: select _id as a, a as _id from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: group by chooses the first unnamed column (1 as z) if multiple unnamed columns are provided
    expected_names: [z, z, z]
    expected_results:
      - [1, 1, 2]
    expected_types: [int, int, int]
    id: 'alias_7'
    sql: select 1 as z, a as z, a+b as z from groupby_test.groupby group by z
    unordered: true

  - db: groupby_test
    description: group by chooses the first unnamed column (a+0 as z) if multiple unnamed columns are provided
    expected_names: [z, z, z]
    expected_results:
      - [0, 1, 1]
      - [1, 2, 1]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: 'alias_8'
    sql: select _id as z, a+0 as z, 1 as z from groupby_test.groupby group by z order by z
    unordered: true

  - db: groupby_test
    description: single aggregation
    expected_names: [a, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: 'aggregation_1'
    sql: select a, sum(b) from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: single aggregation with ordinal
    expected_names: [a, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: 'aggregation_2'
    sql: select a, sum(b) from groupby_test.groupby group by 1 order by a
    unordered: true

  - db: groupby_test
    description: single aggregation with alias
    expected_names: [f, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: 'aggregation_3'
    sql: select a as f, sum(b) from groupby_test.groupby group by f order by a
    unordered: true

  - db: groupby_test
    description: multiple aggregations
    expected_names: [a, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: 'aggregation_4'
    sql: select a, sum(b), count(*) from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: multiple aggregations with ordinal
    expected_names: [a, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: 'aggregation_5'
    sql: select a, sum(b), count(*) from groupby_test.groupby group by 1 order by a
    unordered: true

  - db: groupby_test
    description: multiple aggregations with alias
    expected_names: [f, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: 'aggregation_6'
    sql: select a as f, sum(b), count(*) from groupby_test.groupby group by f order by a
    unordered: true

  - db: groupby_test
    description: correlated subquery following the group by
    expected_names: [sum(a)]
    expected_results:
      - [1]
      - [2]
      - [5]
    expected_types: [int]
    id: 'correlated_subquery_1'
    sql: select sum(a) from groupby f group by b order by (select b from groupby where f._id = _id)
    unordered: true

  - db: groupby_test
    description: correlated subquery following the group by
    expected_names: [sum(a)]
    expected_results:
      - [5]
      - [2]
      - [1]
    expected_types: [int]
    id: 'correlated_subquery_2'
    sql: select sum(a) from groupby f group by b order by (select -b from groupby where f._id = _id)
    unordered: true

  - db: groupby_test
    description: distinct single column
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: 'distinct_1'
    sql: select distinct a from groupby_test.groupby order by a
    unordered: true

  - db: groupby_test
    description: distinct multiple columns
    expected_names: [a, b]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [2, 3]
      - [3, 3]
    expected_types: [int, int]
    id: 'distinct_2'
    sql: select distinct a, b from groupby_test.groupby order by a, b
    unordered: true

  - db: groupby_test
    description: distinct single column grouped
    expected_names: [b]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: 'distinct_3'
    sql: select distinct b from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
