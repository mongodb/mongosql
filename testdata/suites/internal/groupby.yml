testcases:

  - db: groupby_test
    description: no aggregations
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '0'
    sql: select a from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: Group by starred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'f'"
    id: 'aggregation_aliased_groupBy_1'
    sql: select a as g, count(*) as f from groupby_test.groupby group by f order by g

  - db: groupby_test
    description: Group by unstarred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'g'"
    id: 'aggregation_aliased_groupBy_2'
    sql: select a as f, sum(a) as g from groupby_test.groupby group by g order by g

  - db: groupby_test
    description: Group by sum of variable column and unstarred aggregation function that has been aliased
    expected_error: "Error 1056: Can't group on 'g'"
    id: 'aggregation_aliased_groupBy_3'
    sql: select a as f, a+sum(a) as g from groupby_test.groupby group by g order by a

  - db: groupby_test
    description: Group by sum of starred aggregation function and variable column that has been aliased
    expected_error: "Error 1056: Can't group on 'f'"
    id: 'aggregation_aliased_groupBy_4'
    sql: select a as g, count(*)+a as f from groupby_test.groupby group by f order by a

  - db: groupby_test
    description: no aggregations with ordinal
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '1'
    sql: select a from groupby_test.groupby group by 1 order by a

  - db: groupby_test
    description: no aggregations with alias
    expected_names: [f]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '2'
    sql: select a as f from groupby_test.groupby group by f order by a

  - db: groupby_test
    description: single aggregation
    expected_names: [a, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: '3'
    sql: select a, sum(b) from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: single aggregation with ordinal
    expected_names: [a, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: '4'
    sql: select a, sum(b) from groupby_test.groupby group by 1 order by a

  - db: groupby_test
    description: single aggregation with alias
    expected_names: [f, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: '5'
    sql: select a as f, sum(b) from groupby_test.groupby group by f order by a

  - db: groupby_test
    description: multiple aggregations
    expected_names: [a, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: '6'
    sql: select a, sum(b), count(*) from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: multiple aggregations with ordinal
    expected_names: [a, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: '7'
    sql: select a, sum(b), count(*) from groupby_test.groupby group by 1 order by a

  - db: groupby_test
    description: multiple aggregations with alias
    expected_names: [f, sum(b), count(*)]
    expected_results:
      - [1, 1, 1]
      - [2, 5, 2]
      - [3, 3, 1]
    expected_types: [int, int, int]
    id: '8'
    sql: select a as f, sum(b), count(*) from groupby_test.groupby group by f order by a

  - db: groupby_test
    description: correlated subquery following the group by
    expected_names: [sum(a)]
    expected_results:
      - [1]
      - [2]
      - [5]
    expected_types: [int]
    id: '9'
    sql: select sum(a) from groupby f group by b order by (select b from groupby where f._id = _id)

  - db: groupby_test
    description: correlated subquery following the group by
    expected_names: [sum(a)]
    expected_results:
      - [5]
      - [2]
      - [1]
    expected_types: [int]
    id: '10'
    sql: select sum(a) from groupby f group by b order by (select -b from groupby where f._id = _id)

  - db: groupby_test
    description: distinct single column
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '11'
    sql: select distinct a from groupby_test.groupby order by a

  - db: groupby_test
    description: distinct multiple columns
    expected_names: [a, b]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [2, 3]
      - [3, 3]
    expected_types: [int, int]
    id: '12'
    sql: select distinct a, b from groupby_test.groupby order by a, b

  - db: groupby_test
    description: distinct single column grouped
    expected_names: [b]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '13'
    sql: select distinct b from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: distinct multiple column grouped
    expected_names: [a, b]
    expected_results:
      - [1, 1]
      - [2, 2]
      - [3, 3]
    expected_types: [int, int]
    id: '14'
    sql: select distinct a, b from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: distinct multiple column grouped
    expected_names: [a, sum(b)]
    expected_results:
      - [1, 1]
      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: '15'
    sql: select distinct a, sum(b) from groupby_test.groupby group by a order by a

  - db: groupby_test
    description: correlated aggregate that gets aggregated by parent
    expected_names: [a, (select sum(f.a) from groupby limit 1)]
    expected_results:
      - [1, 8]
    expected_types: [int, float]
    id: '16'
    sql: select a, (select sum(f.a) from groupby limit 1) from groupby f

  - db: groupby_test
    description: correlated aggregate
    expected_names: [a, (select sum(a+f.a) from groupby)]
    expected_results:
      - [1, 12]
      - [2, 16]
      - [2, 16]
      - [3, 20]
    expected_types: [int, float]
    id: '17'
    sql: select a, (select sum(a + f.a) from groupby) from groupby f

  - db: groupby_test
    description: correlated aggregate
    expected_names: [a, b]
    expected_results:
      - [1, 40]
    expected_types: [int, float]
    id: '18'
    sql: select a, (select sum(a + sum(f.a)) from groupby) as b from groupby f

  - db: groupby_test
    description: correlated aggregate in order by that gets aggregated by parent
    expected_names: [a]
    expected_results:
      - [1]
      - [3]
      - [2]
    expected_types: [int]
    id: '19'
    sql: select a from groupby f group by 1 order by (select sum(f.a) from groupby limit 1)

  - db: groupby_test
    description: correlated aggregate in order by
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '20'
    sql: select a from groupby f group by 1 order by (select sum(a + f.a) from groupby)

  - db: groupby_test
    description: correlated aggregate in having that gets aggregated by parent
    expected_names: [a]
    expected_results:
      - [1]
    expected_types: [int]
    id: '21'
    sql: select a from groupby f having 10 > (select sum(f.a) from groupby limit 1)

  - db: groupby_test
    description: correlated aggregate in having
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [2]
    expected_types: [int]
    id: '22'
    sql: select a from groupby f having 20 > (select sum(a + f.a) from groupby)

  - db: groupby_test
    description: correlated aggregate in group by
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [3]
    expected_types: [int]
    id: '23'
    sql: select a from groupby f group by (select sum(a + f.a) / b from groupby)

  - db: groupby_test
    description: correlated aggregate in group by
    expected_names: [sum(a)]
    expected_results:
      - [1]
      - [4]
      - [3]
    expected_types: [int]
    id: '24'
    sql: select sum(a) from groupby f group by (select sum(a + f.a) / b from groupby)

  - db: groupby_test
    description: having with a single condition
    expected_names: [a, sum(b)]
    expected_results:
