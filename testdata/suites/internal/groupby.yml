      - [2, 5]
      - [3, 3]
    expected_types: [int, int]
    id: 'distinct_5'
    sql: select distinct a, sum(b) from groupby_test.groupby group by a order by a
    unordered: true

  - db: groupby_test
    description: correlated aggregate that gets aggregated by parent
    expected_names: [a, (select sum(f.a) from groupby limit 1)]
    expected_results:
      - [1, 8]
    expected_types: [int, float]
    id: 'correlated_aggregate_1'
    sql: select a, (select sum(f.a) from groupby limit 1) from groupby f
    unordered: true

  - db: groupby_test
    description: correlated aggregate
    expected_names: [a, (select sum(a+f.a) from groupby)]
    expected_results:
      - [1, 12]
      - [2, 16]
      - [2, 16]
      - [3, 20]
    expected_types: [int, float]
    id: 'correlated_aggregate_2'
    sql: select a, (select sum(a + f.a) from groupby) from groupby f
    unordered: true

  - db: groupby_test
    description: correlated aggregate
    expected_names: [a, b]
    expected_results:
      - [1, 40]
    expected_types: [int, float]
    id: 'correlated_aggregate_3'
    sql: select a, (select sum(a + sum(f.a)) from groupby) as b from groupby f
    unordered: true

  - db: groupby_test
    description: correlated aggregate in order by that gets aggregated by parent
    expected_names: [a]
    expected_results:
      - [1]
      - [3]
      - [2]
    expected_types: [int]
    id: 'correlated_aggregate_5'
    sql: select a from groupby f group by 1 order by (select sum(f.a) from groupby limit 1)
    unordered: true

  - db: groupby_test
    description: correlated aggregate in order by
