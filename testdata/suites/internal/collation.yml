testcases:

  - db: collation_test
    description: order by
    expected_names: [_id, a]
    expected_results:
      - [0, a]
      - [2, A]
      - [1, B]
    expected_types: [int, varchar]
    id: '0'
    sql: select * from collation_1 order by a
    unordered: true

  - db: collation_test
    description: group by
    expected_names: [a, sum(_id)]
    expected_results:
      - [a, 2]
      - [B, 1]
    expected_types: [varchar, int]
    id: '1'
    sql: select a, sum(_id) from collation_1 group by a order by a
    unordered: true

  - db: collation_test
    description: where
    expected_names: [_id]
    expected_results:
      - [0]
      - [2]
    expected_types: [int]
    id: '2'
    sql: select _id from collation_1 where a = 'A'
    unordered: true
