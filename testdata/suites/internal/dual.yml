testcases:

  - description: value
    expected_names: ['1']
    expected_results:
      - [1]
    expected_types: [int]
    id: '0'
    sql: select 1

  - description: value from dual
    expected_names: ['1']
    expected_results:
      - [1]
    expected_types: [int]
    id: '1'
    sql: select 1 from dual

  - description: multiple values
    expected_names: ['1', '3']
    expected_results:
      - [1, 3]
    expected_types: [int, int]
    id: '2'
    sql: select 1, 3

  - description: multiple values from dual
    expected_names: ['1', '3']
    expected_results:
      - [1, 3]
    expected_types: [int, int]
    id: '3'
    sql: select 1, 3 from dual

  - description: computed values
    expected_names: [2*1, 3+5]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '4'
    sql: select 2*1, 3+5

  - description: computed values from dual
    expected_names: [2*1, 3+5]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '5'
    sql: select 2*1, 3+5 from dual

  - description: aliased computed values
    expected_names: [a, b]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '6'
    sql: select 2*1 as a, 3+5 as b

  - description: computed values from dual
    expected_names: [a, b]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '7'
    sql: select 2*1 as a, 3+5 as b from dual

  - description: unset user variable
    expected_names: ['@lkjasdflkjasdf']
    expected_results:
      - [null]
    expected_types: [varchar]
    id: '8'
    sql: select @lkjasdflkjasdf

  - description: version
    expected_names: ['@@version = version()']
    expected_results:
      - ['1']
    expected_types: [varchar]
    id: '9'
    sql: select @@version = version();

  - description: values with limit
    expected_names: ["3"]
    expected_results:
      - [3]
    expected_types: [int]
    id: '10'
    sql: select 3 limit 1

  - description: selecting individual column from dual does not leak collection data
    expected_error: "Error 1054: Unknown column 'a' in 'field list'"
    id: '11'
    sql: select a from DUAL

  - description: selecting multiple columns from dual does not leak collection data
    expected_error: "Error 1054: Unknown column 'a' in 'field list'"
    id: '12'
    sql: select a, b from DUAL

  - description: selecting simple and column from dual does not leak collection data
    expected_error: "Error 1054: Unknown column 'b' in 'field list'"
    id: '13'
    sql: select 1+2, b from DUAL

  - description: select star from dual does not leak collection data
    expected_error: "Error 1096: No tables used"
    id: '14'
    sql: select * from DUAL

  - description: aggregate function applied to value
    expected_names: ['sum(2)']
    expected_results:
      - [2]
    expected_types: [int]
    id: '15'
    sql: select sum(2)

  - description: aggregate function applied to value from dual
    expected_names: ['sum(2)']
    expected_results:
      - [2]
    expected_types: [int]
    id: '16'
    sql: select sum(2) from dual
