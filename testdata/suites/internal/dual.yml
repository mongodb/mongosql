testcases:

  - description: value
    expected_names: ['1']
    expected_results:
      - [1]
    expected_types: [int]
    id: '0'
    schema_mapping_heuristics: [drdl]
    sql: select 1

  - description: value from dual
    expected_names: ['1']
    expected_results:
      - [1]
    expected_types: [int]
    id: '1'
    schema_mapping_heuristics: [drdl]
    sql: select 1 from dual

  - description: multiple values
    expected_names: ['1', '3']
    expected_results:
      - [1, 3]
    expected_types: [int, int]
    id: '2'
    schema_mapping_heuristics: [drdl]
    sql: select 1, 3

  - description: multiple values from dual
    expected_names: ['1', '3']
    expected_results:
      - [1, 3]
    expected_types: [int, int]
    id: '3'
    schema_mapping_heuristics: [drdl]
    sql: select 1, 3 from dual

  - description: computed values
    expected_names: [2*1, 3+5]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '4'
    schema_mapping_heuristics: [drdl]
    sql: select 2*1, 3+5

  - description: computed values from dual
    expected_names: [2*1, 3+5]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '5'
    schema_mapping_heuristics: [drdl]
    sql: select 2*1, 3+5 from dual

  - description: aliased computed values
    expected_names: [a, b]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '6'
    schema_mapping_heuristics: [drdl]
    sql: select 2*1 as a, 3+5 as b

  - description: computed values from dual
    expected_names: [a, b]
    expected_results:
      - [2, 8]
    expected_types: [int, int]
    id: '7'
    schema_mapping_heuristics: [drdl]
    sql: select 2*1 as a, 3+5 as b from dual

  - description: unset user variable
    expected_names: ['@lkjasdflkjasdf']
    expected_results:
      - [null]
    expected_types: [varchar]
    id: '8'
    schema_mapping_heuristics: [drdl]
    sql: select @lkjasdflkjasdf

  - description: version
    expected_names: ['@@version = version()']
    expected_results:
      - ['1']
    expected_types: [varchar]
    id: '9'
    schema_mapping_heuristics: [drdl]
    sql: select @@version = version();

  - description: values from dual with limit
    expected_names: ["3"]
    expected_results:
      - [3]
    expected_types: [int]
    id: '10'
    schema_mapping_heuristics: [drdl]
    sql: select 3 limit 1
