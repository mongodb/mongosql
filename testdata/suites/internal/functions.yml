  - db: functions_test
    description: if one of the args concatenated together is NULL, return NULL
    expected_names: [a, z, 'group_concat(a, z)']
    expected_results:
      - [1, null, null]
    expected_types: [int, int, varchar]
    id: group_concat_multiple_args_one_NULL
    sql: select a, z, group_concat(a,z) from (select * from scalar limit 1) b

  - db: functions_test
    description: exclude NULL elements from final concatenated 'list' if non-NULL elems exist
    expected_names: ['group_concat(a, b)']
    expected_results:
      - ['1hey,4this']
    expected_types: [varchar]
    id: group_concat_exclude_NULLs
    sql: select group_concat(a,b) from scalar

