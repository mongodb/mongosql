    description: if one of the args concatenated together is NULL, return NULL
    expected_names: [a, z, 'group_concat(a, z)']
    expected_results:
      - [1, null, null]
    expected_types: [int, int, varchar]
    id: group_concat_multiple_args_one_NULL
    sql: select a, z, group_concat(a,z) from (select * from scalar limit 1) b

  - db: functions_test
