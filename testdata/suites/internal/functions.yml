  - db: functions_test
    description: Concatenating n empty strings results in a string consisting of n-1 separators
    expected_names: [group_concat(lpadTest.s)]
    expected_results:
      - [',,,,,,,,']
    expected_types: [varchar]
    id: group_concat_empty_strings
    sql: select group_concat(lpadTest.s) from lpadTest join lpadTest as b where lpadTest.s = ""

  - db: functions_test
    expected_names: [group_concat(lpadTest.s separator "")]
    expected_results:
      - ['']
    expected_types: [varchar]
    id: group_concat_empty_strings_empty_separator
    sql: select group_concat(lpadTest.s separator "") from lpadTest join lpadTest as b where lpadTest.s = ""

  - db: functions_test
    expected_names: [group_concat(s)]
    expected_results:
      - ['']
    expected_types: [varchar]
    id: group_concat_empty_string_as_result
