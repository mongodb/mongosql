
testcases:
- sql: "alter table alter_1 modify a varchar"
  variables: {"global.enable_table_alterations": 1}
  verify: "select data_type from information_schema.columns where table_schema='alter_test' and table_name='alter_1' and column_name='a'"
  sync: true
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  sql_cleanup: "alter table alter_1 modify a int"
  id: '0'
  db: alter_test
  description: "table alterations should change column type"
  expected_names: ["data_type"]
  expected_types: [varchar]
  expected:
  - ["varchar"]
- sql: "alter table alter_1 rename alter_1_renamed"
  variables: {"global.enable_table_alterations": 1}
  id: '1'
  sync: true
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  sql_cleanup: "alter table alter_1_renamed rename alter_1"
  db: alter_test
  description: "altering table names should succeed"
- sql: "alter table alter_1 modify a unknownType"
  variables: {"global.enable_table_alterations": 1}
  id: '3'
  sync: true
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  db: alter_test
  description: "altering column to unknown type should fail"
  expected_error: "Error 1064: parse sql 'alter table alter_1 modify a unknownType' error: unexpected ID at position 41 near unknownType"
- sql: "alter table alter_1 rename alter_2"
  variables: {"global.enable_table_alterations": 1}
  id: '4'
  sync: true
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  db: alter_test
  description: "altering table name to existing table name should fail"
  expected_error: "Error 1050: Table 'alter_2' already exists"
- sql: "alter table alter_1 change a c"
  variables: {"global.enable_table_alterations": 1}
  verify: "select data_type from information_schema.columns where table_schema='alter_test' and table_name='alter_1' and column_name='c'"
  sync: true
  id: '5'
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  sql_cleanup: "alter table alter_1 change c a"
  db: alter_test
  description: "column alterations should change column name"
  expected_names: ["data_type"]
  expected_types: [varchar]
  expected:
  - ["bigint"]
- sql: "alter table alter_1 rename alter_1_renamed"
  variables: {"global.enable_table_alterations": 0}
  id: '6'
  sync: true
  schema_mapping_heuristics:
  - drdl
  - lattice
  - majority
  db: alter_test
  description: "alterations should fail if global.enable_table_alterations is not set" 
  expected_error: "Error 1105: cannot alter schema: alterations not enabled"
