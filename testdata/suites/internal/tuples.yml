#
# Test Cases
#
testcases:
- sql: "select _id, a, b from foo where ((a, b), (b, a)) = ((2, 3), (3, 2));"
  id: '0'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct EQ"
  expected_names: ["_id", "a", "b"]
  expected_types: [varchar, int, int]
  expected:
  - ["5ba468e7691a878b86fc6406", 2, 3]
- sql: "select _id, b, e from foo where (a, b) in ((0, 3), (1, 2));"
  id: '1'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN"
  expected_names: ["_id", "b", "e"]
  expected_types: [varchar, int, float]
  expected:
  - ["5ba468dd691a878b86fc6404", 3, 1.2]
- sql: "select * from foo where (a, b) in ((3, 4), (2, 1), (5, 5));"
  id: '2'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with no results"
  expected_names: ["_id", "a", "b", "c", "d", "e"]
  expected_types: [varchar, int, int, int, int, float]
- sql: "select * from foo where (a, b) < ((2, 3));"
  id: '3'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct LT"
  expected_names: ["_id", "a", "b", "c", "d", "e"]
  expected_types: [varchar, int, int, int, int, float]
  expected:
  - ["5ba468dd691a878b86fc6404", 1, 3, 0, 2, 0]
  - ["5ba468e1691a878b86fc6405", 1, 2, 1, 3, 1]
- sql: "select a, b from foo where (a, b) = (3, 4);"
  id: '4'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct simple EQ"
  expected_names: ["a", "b"]
  expected_types: [int, int]
- sql: "select * from foo where (2 in (3, 2), false) in (true, false);"
  id: '5'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with nested tuple expression"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select a, b from foo where a in (2 in (2, 3), 6);"
  id: '6'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with nested IN"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 2]
- sql: "select * from foo where a in (select b, c from foo);"
  id: '7'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with subquery"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "select a, b from foo where a+1 in (select b from foo);"
  id: '8'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with subquery"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [0, 3]
  - [2, 3]
- sql: "Select * from foo where row(a, b) in (row (1,2, 3), row(2,3,4));"
  id: '9'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with rows"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "Select * from foo where row(a, b) in (row (1,2, 3), row(2,3,4));"
  id: '10'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with rows"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "Select a,b from foo where row(a, b) in (row (1,2), row(2,3), row(6, 7));"
  id: '11'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with rows"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 2]
- sql: "select * from foo where (a, b) = ((3, 4), (6, 7));"
  id: '12'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ 2-elem"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "select * from foo where ((a, b), (b, a)) = ((3, 4, 2), (2, 3));"
  id: '13'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ mixed-elem"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select a+1, b from foo where ((a, b), (b, a)) = 23;"
  id: '14'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ with right-side scalar"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select * from foo where 23 = ((a, b), (b, a));"
  id: '15'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ with left-side scalar"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "select * from foo where (a, b) not in ((3, 2),4,2);"
  id: '16'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with only one correct dimension"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select * from foo where (a, b) not in ((3, 2), (3, 3), (3, 5, 1));"
  id: '17'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with one wrong, mixed dimension"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select _id, d, c from foo where a not in (3, 4, 2, 8);"
  id: '18'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct simple IN"
  expected_names: ["_id", "d", "c"]
  expected_types: [varchar, int, int]
  expected:
  - ["5ba468dd691a878b86fc6404", 2, 0]
  - ["5ba468e1691a878b86fc6405", 3, 0]
- sql: "select * from foo where 5 not in (3, 4, 2, 8);"
  id: '19'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct simple IN with scalar"
  expected_names: ["_id", "a", "b", "c", "d", "e"]
  expected_types: [varchar, int, int, int, int, float]
  expected:
  - ["5ba468dd691a878b86fc6404", 0, 3, 0, 2, 1.2]
  - ["5ba468e1691a878b86fc6405", 1, 1, 0, 3, 0.0]
  - ["5ba468e7691a878b86fc6406", 2, 3, 1, 3, -2.2]
- sql: "select _id, a, b from foo where (a+1, a+b) in ((1, 3), (4/2, 3*POW(2, SIN(PI()))), (3*2, POW(2, 2)));"
  id: '20'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with complex expressions"
  expected_names: ["_id", "a", "b"]
  expected_types: [varchar, int, int]
  expected:
  - ["5ba468dd691a878b86fc6404", 0, 3]
