testcases:

  - db: tuple_test
    description: Correct EQ
    expected_names: [_id, a, b]
    expected_results:
      - [5ba468e7691a878b86fc6406, 2, 3]
    expected_types: [varchar, int, int]
    id: '0'
    sql: select _id, a, b from tupleTable where ((a, b), (b, a)) = ((2, 3), (3, 2));

  - db: tuple_test
    description: Correct IN
    expected_names: [_id, b, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 3, 1.2]
    expected_types: [varchar, int, float]
    id: '1'
    sql: select _id, b, e from tupleTable where (a, b) in ((0, 3), (1, 2));

  - db: tuple_test
    description: Correct IN with no results
    expected_names: [_id, a, b, c, d, e]
    expected_types: [varchar, int, int, int, int, float]
    id: '2'
    sql: select * from tupleTable where (a, b) in ((3, 4), (2, 1), (5, 5));

  - db: tuple_test
    description: Correct LT
    expected_names: [_id, a, b, c, d, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3, 0, 2, 1.2]
      - [5ba468e1691a878b86fc6405, 1, 1, 0, 3, 0.0]
    expected_types: [varchar, int, int, int, int, float]
    id: '3'
    sql: select * from tupleTable where (a, b) < ((2, 3));

  - db: tuple_test
    description: Correct simple EQ
    expected_names: [a, b]
    expected_types: [int, int]
    id: '4'
    sql: select a, b from tupleTable where (a, b) = (3, 4);

  - db: tuple_test
    description: Incorrect IN with nested tuple expression
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '5'
    sql: select * from tupleTable where (2 in (3, 2), false) in (true, false);

  - db: tuple_test
    description: Correct IN with nested IN
    expected_names: [a, b]
    expected_results:
      - [1, 1]
    expected_types: [int, int]
    id: '6'
    sql: select a, b from tupleTable where a in (2 in (2, 3), 6);

  - db: tuple_test
    description: Incorrect IN with subquery
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '7'
    sql: select * from tupleTable where a in (select b, c from tupleTable);

  - db: tuple_test
    description: Correct IN with subquery
    expected_names: [a, b]
    expected_results:
      - [0, 3]
      - [2, 3]
    expected_types: [int, int]
    id: '8'
    sql: select a, b from tupleTable where a+1 in (select b from tupleTable);

  - db: tuple_test
    description: Incorrect IN with rows
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '9'
    sql: Select * from tupleTable where row(a, b) in (row (1,2, 3), row(2,3,4));

  - db: tuple_test
    description: Incorrect IN with rows
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '10'
    sql: Select * from tupleTable where row(a, b) in (row (1,2, 3), row(2,3,4));

  - db: tuple_test
    description: Correct IN with rows
    expected_names: [a, b]
    expected_results:
      - [2, 3]
    expected_types: [int, int]
    id: '11'
    sql: Select a,b from tupleTable where row(a, b) in (row (1,2), row(2,3), row(6, 7));

  - db: tuple_test
    description: Incorrect EQ 2-elem
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '12'
    sql: select * from tupleTable where (a, b) = ((3, 4), (6, 7));

  - db: tuple_test
    description: Incorrect EQ mixed-elem
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '13'
    sql: select * from tupleTable where ((a, b), (b, a)) = ((3, 4, 2), (2, 3));

  - db: tuple_test
    description: Incorrect EQ with right-side scalar
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '14'
    sql: select a+1, b from tupleTable where ((a, b), (b, a)) = 23;

  - db: tuple_test
    description: Incorrect EQ with left-side scalar
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '15'
    sql: select * from tupleTable where 23 = ((a, b), (b, a));

  - db: tuple_test
    description: Incorrect IN with only one correct dimension
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '16'
    sql: select * from tupleTable where (a, b) not in ((3, 2),4,2);

  - db: tuple_test
    description: Incorrect IN with one wrong, mixed dimension
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '17'
    sql: select * from tupleTable where (a, b) not in ((3, 2), (3, 3), (3, 5, 1));

  - db: tuple_test
    description: Correct simple IN
    expected_names: [_id, d, c]
    expected_results:
      - [5ba468dd691a878b86fc6404, 2, 0]
      - [5ba468e1691a878b86fc6405, 3, 0]
    expected_types: [varchar, int, int]
    id: '18'
    sql: select _id, d, c from tupleTable where a not in (3, 4, 2, 8);

  - db: tuple_test
    description: Correct simple IN with scalar
    expected_names: [_id, a, b, c, d, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3, 0, 2, 1.2]
      - [5ba468e1691a878b86fc6405, 1, 1, 0, 3, 0.0]
      - [5ba468e7691a878b86fc6406, 2, 3, 1, 3, -2.2]
    expected_types: [varchar, int, int, int, int, float]
    id: '19'
    sql: select * from tupleTable where 5 not in (3, 4, 2, 8);

  - db: tuple_test
    description: Correct IN with complex expressions
    expected_names: [_id, a, b]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3]
    expected_types: [varchar, int, int]
    id: '20'
    sql: select _id, a, b from tupleTable where (a+1, a+b) in ((1, 3), (4/2, 3*POW(2, SIN(PI()))), (3*2, POW(2, 2)));

