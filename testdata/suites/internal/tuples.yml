  - db: tuple_test
    description: Correct EQ with nested subquery on FROM
    expected_names: [a, b]
    expected_results:
      - [1, 1]
    expected_types: [int, int]
    id: '23'
    sql: select a, b from (select * from tupleTable) foo_new where ((a, e), (e, a)) = ((1, 0.0), (0.0, 1));

  - db: tuple_test
    description: Correct EQ with nested correct IN in subquery on FROM
    expected_names: [e, e]
    expected_results:
      - [0.0, 0.0]
    expected_types: [float, float]
    id: '24'
    sql: select e, e from (select * from tupleTable where (a, d) in ((3, 4), (1, 3))) foo_new where (a, e) = (1, 0.0);

  - db: tuple_test
    description: Incorrect EQ with nested subquery on FROM
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '25'
    sql: select a, b from (select * from tupleTable) foo_new where ((a, e), (e, a)) = ((1, 0.0), (0.0, 1, 2));

  - db: tuple_test
    description: Incorrect EQ with nested correct IN in subquery on FROM
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '26'
    sql: select e, e from (select * from tupleTable where (a, d) in ((3, 4), (1, 3))) foo_new where (a, e) = ((1, 0.0), (2, 2));

  - db: tuple_test
    description: Correct EQ with nested incorrect IN in subquery on FROM
    expected_error: 'Error 1241: Operand should contain 3 column(s)'
    id: '27'
    sql: select e, e from (select * from tupleTable where (a, d, b) in ((3, 4, 1), (1, 3))) foo_new where (a, e) = (1, 0.0);

  - db: tuple_test
    description: Correct IN with non-simple subquery with tuple exprs
    expected_names: [c, d, e]
    expected_results:
      - [0, 3, 0.0]
    expected_types: [int, int, float]
    id: '28'
    sql: select c, d, e from tupleTable where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9) FROM tupleTable WHERE b in (1, 3) and d in (2, 3, 3));

  - db: tuple_test
    description: Incorrect IN with non-simple subquery with tuple exprs
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '29'
    sql: select c, d, e from tupleTable where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9), a*(c + POW(b, d)) FROM tupleTable WHERE b in (1, 3) and d in (2, 3, 3));

  - db: tuple_test
    description: Correct IN with non-simple subquery with incorrect tuple exprs
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: '30'
    sql: select c, d, e from tupleTable where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9) FROM tupleTable WHERE b in (1, 3, (1, 3)) and d in ((2, 3), 2, 3, 3));

  - db: tuple_test
    description: Incorrect subquery equals
    expected_error: 'Error 1241: Operand should contain 2 column(s)'
    id: '31'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) = 1;

  - db: tuple_test
    description: Correct subquery equals
    expected_names: [_id, a, b, c, d, e]
    expected_types: [varchar, int, int, int, int, float]
    id: '32'
    sql: SELECT * FROM tupleTable WHERE (SELECT a FROM tupleTable LIMIT 1) = 1;

  - db: tuple_test
    description: Correct handling of boolean in IN expression
    expected_names: ["_id", "a", "b"]
    expected_results:
      - ["0", 1, 1]
    expected_types: [varchar, int, int]
    id: '33'
    sql: SELECT * from bool_1 WHERE a in (true);

  - db: tuple_test
    description: Correct handling of boolean in IN expression
    expected_names: ["_id", "a", "b"]
    expected_results:
      - ["1", 1, 2]
    expected_types: [varchar, int, int]
    id: '34'
    sql: SELECT * from bool_2 WHERE a in (true);

  - db: tuple_test
    description: Correct handling of boolean in IN expression
    expected_names: ["_id", "a", "b"]
    expected_results:
      - ["3", 1, 4]
    expected_types: [varchar, int, int]
    id: '35'
    pushdown_only: true
    sql: SELECT * from bool_3 WHERE a in (true);
    variables: {polymorphic_type_conversion_mode: "off"}

  - db: tuple_test
    description: Correct handling of boolean in IN expression
    expected_names: ["_id", "a", "b"]
    expected_results:
      - ["0", 1, 1]
      - ["3", 1, 4]
    expected_types: [varchar, int, int]
    id: '36'
    sql: SELECT * from bool_3 WHERE a in (true);
    variables: {polymorphic_type_conversion_mode: fast}

  - db: tuple_test
    description: Correct handling of boolean in IN expression
    expected_names: ["_id", "a", "b"]
    expected_results:
      - ["1", 0, 2]
      - ["2", 0, 3]
    expected_types: [varchar, int, int]
    id: '37'
    sql: SELECT * from bool_3 WHERE a in (false);
    variables: {polymorphic_type_conversion_mode: fast}

  - db: tuple_test
    description: Correct subquery multi col equals any (this is aliased to in MySql)
    expected_names: [_id, a, b, c, d, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3, 0, 2, 1.2]
      - [5ba468e1691a878b86fc6405, 1, 1, 0, 3, 0.0]
      - [5ba468e7691a878b86fc6406, 2, 3, 1, 3, -2.2]
    expected_types: [varchar, int, int, int, int, float]
    id: 'Correct subquery multi col equals any'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) = ANY (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi col less than any
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: 'Incorrect subquery multi col less than any'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) < ANY (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Correct subquery multi col equals some (this is aliased to in MySql)
    expected_names: [_id, a, b, c, d, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3, 0, 2, 1.2]
      - [5ba468e1691a878b86fc6405, 1, 1, 0, 3, 0.0]
      - [5ba468e7691a878b86fc6406, 2, 3, 1, 3, -2.2]
    expected_types: [varchar, int, int, int, int, float]
    id: 'Correct subquery multi col equals some'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) = SOME (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi col less than some
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: 'Incorrect subquery multi col less than some'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) < SOME (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Correct subquery multi col not equals all (this is aliased to not in MySql)
    expected_names: [_id, a, b, c, d, e]
    expected_results:
      - [5ba468dd691a878b86fc6404, 0, 3, 0, 2, 1.2]
      - [5ba468e1691a878b86fc6405, 1, 1, 0, 3, 0.0]
      - [5ba468e7691a878b86fc6406, 2, 3, 1, 3, -2.2]
    expected_types: [varchar, int, int, int, int, float]
    id: 'Correct subquery multi col not equals all'
    sql: SELECT * FROM tupleTable WHERE (SELECT b, c FROM tupleTable LIMIT 1) <> ALL (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi col less than all
    expected_error: 'Error 1241: Operand should contain 1 column(s)'
    id: 'Incorrect subquery multi col less than all'
    sql: SELECT * FROM tupleTable WHERE (SELECT a, b FROM tupleTable LIMIT 1) < ALL (SELECT a, b FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi row in
    expected_error: 'Error 1242: Subquery returns more than 1 row'
    id: 'Incorrect subquery multi row in'
    sql: SELECT * FROM tupleTable WHERE (SELECT a FROM tupleTable) IN (SELECT a FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi row not in
    expected_error: 'Error 1242: Subquery returns more than 1 row'
    id: 'Incorrect subquery multi row not in'
    sql: SELECT * FROM tupleTable WHERE (SELECT a FROM tupleTable) NOT IN (SELECT a FROM tupleTable);

  - db: tuple_test
    description: Incorrect subquery multi row all
    expected_error: 'Error 1242: Subquery returns more than 1 row'
