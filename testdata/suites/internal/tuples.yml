- sql: "select a, b from (select * from foo) foo_new where ((a, e), (e, a)) = ((1, 0.0), (0.0, 1));"
  id: '23'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct EQ with nested subquery on FROM"
  expected_names: ["a", "b"]
  expected_types: [int, int]
  expected:
  - [1, 1]
- sql: "select e, e from (select * from foo where (a, d) in ((3, 4), (1, 3))) foo_new where (a, e) = (1, 0.0);"
  id: '24'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct EQ with nested correct IN in subquery on FROM"
  expected_names: ["e", "e"]
  expected_types: [float, float]
  expected:
  - [0.0, 0.0]
- sql: "select a, b from (select * from foo) foo_new where ((a, e), (e, a)) = ((1, 0.0), (0.0, 1, 2));"
  id: '25'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ with nested subquery on FROM"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "select e, e from (select * from foo where (a, d) in ((3, 4), (1, 3))) foo_new where (a, e) = ((1, 0.0), (2, 2));"
  id: '26'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect EQ with nested correct IN in subquery on FROM"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "select e, e from (select * from foo where (a, d, b) in ((3, 4, 1), (1, 3))) foo_new where (a, e) = (1, 0.0);"
  id: '27'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct EQ with nested incorrect IN in subquery on FROM"
  expected_error: "Error 1241: Operand should contain 3 column(s)"
- sql: "select c, d, e from foo where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9) FROM foo WHERE b in (1, 3) and d in (2, 3, 3));"
  id: '28'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with non-simple subquery with tuple exprs"
  expected_names: ["c", "d", "e"]
  expected_types: [int, int, float]
  expected:
  - [0, 3, 0.0]
- sql: "select c, d, e from foo where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9), a*(c + POW(b, d)) FROM foo WHERE b in (1, 3) and d in (2, 3, 3));"
  id: '29'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect IN with non-simple subquery with tuple exprs"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "select c, d, e from foo where RIGHT(_id, 3)/(b*d) IN (select (b+d)*(b*9) FROM foo WHERE b in (1, 3, (1, 3)) and d in ((2, 3), 2, 3, 3));"
  id: '30'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct IN with non-simple subquery with incorrect tuple exprs"
  expected_error: "Error 1241: Operand should contain 1 column(s)"
- sql: "SELECT * FROM foo WHERE (SELECT a, b FROM foo LIMIT 1) = 1;"
  id: '31'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Incorrect subquery equals"
  expected_error: "Error 1241: Operand should contain 2 column(s)"
- sql: "SELECT * FROM foo WHERE (SELECT a FROM foo LIMIT 1) = 1;"
  id: '32'
  schema_mapping_heuristics:
  - drdl
  db: tuple_test
  description: "Correct subquery equals"
  expected_names: ["_id", "a", "b", "c", "d", "e"]
  expected_types: [varchar, int, int, int, int, float]
