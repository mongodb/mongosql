    id: subquery union with alias
    schema_mapping_heuristics: [drdl]
    sql: select * from (select b from functions_test.bar union select b as d from functions_test.bar) derived order by 1
    unordered: true

  - db: union_test
    expected_names: [b]
    expected_results:
