  - db: union_test
    description: order by and limit paradigm
    expected_names: [a, c]
    expected_results:
      - [1, 5]
      - [2, 6]
      - [8, 12]
    expected_types: [int, int]
    id: '11'
    sql: select * from (select a, c from union_1 order by a limit 2 union select d, f from union_2 order by d limit 1) as tmp order by a
    unordered: true

  - db: union_test
    description: join paired with single union
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: '12'
    sql: select * from (select d from union_1 inner join union_2 on union_1._id=union_2._id union select g from union_3) as tmp order by d
    unordered: true

  - db: union_test
    description: join paired with two unions
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [4]
      - [7]
      - [8]
      - [13]
      - [14]
    expected_types: [int]
    id: '13'
    sql: select * from (select a from union_1 union select d from union_1 inner join union_2 on union_1._id=union_2._id union select g from union_3) as tmp order by a
    unordered: true

  - db: union_test
    description: two joins single union
    expected_names: [d]
    expected_results:
      - [1]
      - [1]
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: '14'
    sql: select * from (select d from union_1 inner join union_2 on union_1._id=union_2._id union all select a from union_3 inner join union_4 on union_3._id=union_4._id) as tmp order by d
    unordered: true

  - db: union_test
    description: parenthesis with order by and limit
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
    expected_types: [int]
    id: '15'
    sql: select * from ((select d from union_2) union (select g from union_3)) ut order by d limit 2
    unordered: true

  - db: union_test
    description: parenthesis with order by and limit
    expected_names: [d]
    expected_results:
      - [1]
    expected_types: [int]
    id: '16'
    sql: (select * from ((select d from union_2) union (select g from union_3)) ut) order by d limit 1
    unordered: true

  - db: union_test
    description: test the union all subquery still works, currently not optimized
    expected_names: [_id, d, e, f]
    expected_results:
      - [0, 1, 3, 5]
      - [1, 7, 9, 11]
      - [0, 1, 2, 3]
      - [2, 13, 15, 17]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
    expected_types: [int, int, int, int]
    id: union_subquery_1
    sql: select * from (select * from union_2 union all select * from union_3) c
    unordered: true

  - db: union_test
    description: test the union all subquery still works
    expected_names: [_id, d, e, f]
    expected_results:
      - [0, 1, 3, 5]
      - [1, 7, 9, 11]
      - [0, 1, 2, 3]
      - [2, 13, 15, 17]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
    expected_types: [int, int, int, int]
    id: union_subquery_2
    sql: select * from (select * from union_2) a union all (select * from union_3)
    unordered: true

  - db: union_test
    description: optimized union all
    expected_names: [d]
    expected_results:
      - [1]
      - [1]
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: optimized_union_all_1
    sql: select d from union_1 inner join union_2 on union_1._id=union_2._id union all select a from union_3 inner join union_4 on union_3._id=union_4._id
    unordered: true

  - db: union_test
    description: optimized union all 2
    expected_names: [_id, d, e, f]
    expected_results:
      - [0, 2, 4, 6]
      - [0, 1, 3, 5]
      - [1, 19, 7, 8]
      - [0, 1, 2, 3]
      - [1, 8, 10, 12]
      - [2, 14, 16, 18]
      - [0, 1, 3, 5]
      - [1, 4, 5, 6]
      - [2, 1, 3, 20]
      - [1, 7, 9, 11]
      - [2, 7, 8, 9]
      - [2, 13, 15, 17]
    expected_types: [int, int, int, int]
    id: optimized_union_all_2
    sql: select * from union_2 union all select * from union_5 union all select * from union_3 union all select * from union_1
    unordered: true

  - db: functions_test
    description: this is a regression test for a bug where NULLs in unions were rended as <invalid Value> due to a missing case in 'NewSQLValue'
    expected_names: [s]
    expected_results:
      - [foobarbar]
      - [null]
    expected_types: [varchar]
    id: nulls_in_union
    sql: select s from scalar union select s from scalar
    unordered: true

  - db: functions_test
    description: show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)
    expected_names: [s, t]
    expected_results:
      - [foobarbar, 0]
      - [null, 1]
      - [null, null]
    expected_types: [varchar, int]
    id: missing_in_union_1
    sql: select s,t from scalar union select s,t from scalar
    unordered: true

  - db: functions_test
    description: show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)
    expected_names: [t, s]
    expected_results:
      - [0, foobarbar]
      - [1, null]
      - [null, null]
    expected_types: [int, varchar]
    id: missing_in_union_2
    sql: select t,s from scalar union select t,s from scalar
    unordered: true

  - db: union_test
    description: optimized distinct all
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: optimized_union_distinct_1
    sql: select d from union_1 inner join union_2 on union_1._id=union_2._id union select a from union_3 inner join union_4 on union_3._id=union_4._id
    unordered: true

  - db: union_test
    description: optimized union distinct 2
    expected_names: [_id, d, e, f]
    expected_results:
      - [0, 2, 4, 6]
      - [1, 19, 7, 8]
      - [0, 1, 2, 3]
      - [1, 8, 10, 12]
      - [2, 14, 16, 18]
      - [0, 1, 3, 5]
      - [1, 4, 5, 6]
      - [2, 1, 3, 20]
      - [1, 7, 9, 11]
      - [2, 7, 8, 9]
      - [2, 13, 15, 17]
    expected_types: [int, int, int, int]
    id: optimized_union_distinct_2
    sql: select * from union_2 union all select * from union_5 union select * from union_3 union select * from union_1
    unordered: true

