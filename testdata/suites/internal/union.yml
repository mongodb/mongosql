- sql: "select s from bar union select s from bar"
  id: 'nulls_in_union'
  db: functions_test
  unordered: true
  description: "this is a regression test for a bug where NULLs in unions were rended as <invalid Value> due to a missing case in 'NewSQLValue'"
  exepected_names: ['s']
  expected_types: ['string']
  expected:
  - ["foobarbar"]
  - [~]
- sql: "select s,t from bar union select s,t from bar"
  id: 'missing_in_union_1'
  db: functions_test
  unordered: true
  description: "show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)"
  exepected_names: ['s', 't']
  expected_types: ['string', 'int']
  expected:
  - [ 'foobarbar', 0]
  - [ ~, 1 ]
  - [ ~, ~ ]
- sql: "select t,s from bar union select t,s from bar"
  id: 'missing_in_union_2'
  db: functions_test
  unordered: true
  description: "show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)"
  exepected_names: ['t', 's']
  expected_types: ['int', 'string']
  expected:
  - [ 0, 'foobarbar']
  - [ 1, ~ ]
  - [ ~, ~ ]
