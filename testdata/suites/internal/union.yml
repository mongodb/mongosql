      - [1, 7, 9, 11]
      - [2, 7, 8, 9]
      - [2, 13, 15, 17]
    expected_types: [int, int, int, int]
    id: optimized_union_distinct_2
    schema_mapping_heuristics: [drdl]
    sql: select * from bar union all select * from barbaz union select * from baz union select * from foo
    unordered: true

  - db: union_test
    expected_names: [ab]
