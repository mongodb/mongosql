testcases:

  - db: union_test
    description: distinct values with implicit distinct operator
    expected_names: [a, b]
    expected_results:
      - [1, 3]
      - [2, 4]
      - [7, 9]
      - [8, 10]
      - [13, 15]
      - [14, 16]
    expected_types: [int, int]
    id: '0'
    sql: select * from (select a, b from union_1 union select d, e from union_2) as tmp order by a
    unordered: true

  - db: union_test
    description: non-distinct values with implicit distinct operator
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: '1'
    sql: select * from (select d from union_2 union select g from union_3) as tmp order by d
    unordered: true

  - db: union_test
    description: non-distinct values with all operator
    expected_names: [d]
    expected_results:
      - [1]
      - [1]
      - [4]
      - [7]
      - [7]
      - [13]
    expected_types: [int]
    id: '2'
    sql: select * from (select d from union_2 union all select g from union_3) as tmp order by d
    unordered: true

  - db: union_test
    description: larger distinct values with implicit distinct operator
    expected_names: [_id, g, h, i]
    expected_results:
      - [0, 1, 2, 3]
      - [0, 1, 2, 4]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
      - [2, 1, 2, 18]
    expected_types: [int, int, int, int]
    id: '3'
    sql: select * from (select * from union_3 union select * from union_4) as tmp order by i
    unordered: true

  - db: union_test
    description: larger distinct values with all operator
    expected_names: [_id, g, h, i]
    expected_results:
      - [0, 1, 2, 3]
      - [0, 1, 2, 4]
      - [1, 4, 5, 6]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
      - [2, 1, 2, 18]
    expected_types: [int, int, int, int]
    id: '4'
    sql: select * from (select * from union_3 union all select * from union_4) as tmp order by i
    unordered: true

  - db: union_test
    description: three unions, implicit distinct operator
    expected_names: [a]
