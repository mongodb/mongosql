    schema_mapping_heuristics: [drdl]
    sql: select * from (select a from foo union all select d from bar union all select g from baz union all select a from foobar union all select d from barbaz) as tmp order by a

  - db: union_test
    description: five unions, all operator at position 1
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [4]
      - [7]
      - [8]
      - [13]
      - [14]
      - [19]
    expected_types: [int]
    id: '9'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select a from foo union all select d from bar union select g from baz union select a from foobar union select d from barbaz) as tmp order by a

  - db: union_test
    description: five unions, all operator at positions 3 and 4
    expected_names: [a]
    expected_results:
      - [1]
      - [1]
      - [1]
      - [1]
      - [1]
      - [2]
      - [4]
      - [4]
      - [7]
      - [8]
      - [13]
      - [14]
      - [19]
    expected_types: [int]
    id: '10'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select a from foo union select d from bar union select g from baz union all select a from foobar union all select d from barbaz) as tmp order by a

  - db: union_test
    description: order by and limit paradigm
    expected_names: [a, c]
    expected_results:
      - [1, 5]
      - [2, 6]
      - [8, 12]
    expected_types: [int, int]
    id: '11'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select a, c from foo order by a limit 2 union select d, f from bar order by d limit 1) as tmp order by a

  - db: union_test
    description: join paired with single union
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: '12'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select d from foo inner join bar on foo.id=bar.id union select g from baz) as tmp order by d

  - db: union_test
    description: join paired with two unions
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
      - [4]
      - [7]
      - [8]
      - [13]
      - [14]
    expected_types: [int]
    id: '13'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select a from foo union select d from foo inner join bar on foo.id=bar.id union select g from baz) as tmp order by a

  - db: union_test
    description: two joins single union
    expected_names: [d]
    expected_results:
      - [1]
      - [1]
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: '14'
    schema_mapping_heuristics: [drdl]
    sql: select * from (select d from foo inner join bar on foo.id=bar.id union all select a from baz inner join foobar on baz.id=foobar.id) as tmp order by d

  - db: union_test
    description: parenthesis with order by and limit
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
    expected_types: [int]
    id: '15'
    schema_mapping_heuristics: [drdl]
    sql: select * from ((select d from bar) union (select g from baz)) ut order by d limit 2

  - db: union_test
    description: parenthesis with order by and limit
    expected_names: [d]
    expected_results:
      - [1]
    expected_types: [int]
    id: '16'
    schema_mapping_heuristics: [drdl]
    sql: (select * from ((select d from bar) union (select g from baz)) ut) order by d limit 1

  - db: union_test
    description: test the union all subquery still works, currently not optimized
    expected_names: [id, d, e, f]
    expected_results:
      - [0, 1, 3, 5]
      - [1, 7, 9, 11]
      - [0, 1, 2, 3]
      - [2, 13, 15, 17]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
    expected_types: [int, int, int, int]
    id: union_subquery_1
    schema_mapping_heuristics: [drdl]
    sql: select * from (select * from bar union all select * from baz) c
    unordered: true

  - db: union_test
    description: test the union all subquery still works
    expected_names: [id, d, e, f]
    expected_results:
      - [0, 1, 3, 5]
      - [1, 7, 9, 11]
      - [0, 1, 2, 3]
      - [2, 13, 15, 17]
      - [1, 4, 5, 6]
      - [2, 7, 8, 9]
    expected_types: [int, int, int, int]
    id: union_subquery_2
    schema_mapping_heuristics: [drdl]
    sql: select * from (select * from bar) a union all (select * from baz)
    unordered: true

  - db: union_test
    description: optimized union all
    expected_names: [d]
    expected_results:
      - [1]
      - [1]
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: optimized_union_all_1
    schema_mapping_heuristics: [drdl]
    sql: select d from foo inner join bar on foo.id=bar.id union all select a from baz inner join foobar on baz.id=foobar.id
    unordered: true

  - db: union_test
    description: optimized union all 2
    expected_names: [id, d, e, f]
    expected_results:
      - [0, 2, 4, 6]
      - [0, 1, 3, 5]
      - [1, 19, 7, 8]
      - [0, 1, 2, 3]
      - [1, 8, 10, 12]
      - [2, 14, 16, 18]
      - [0, 1, 3, 5]
      - [1, 4, 5, 6]
      - [2, 1, 3, 20]
      - [1, 7, 9, 11]
      - [2, 7, 8, 9]
      - [2, 13, 15, 17]
    expected_types: [int, int, int, int]
    id: optimized_union_all_2
    schema_mapping_heuristics: [drdl]
    sql: select * from bar union all select * from barbaz union all select * from baz union all select * from foo
    unordered: true

  - db: functions_test
    description: this is a regression test for a bug where NULLs in unions were rended as <invalid Value> due to a missing case in 'NewSQLValue'
    expected_names: [s]
    expected_results:
      - [foobarbar]
      - [null]
    expected_types: [varchar]
    id: nulls_in_union
    schema_mapping_heuristics: [drdl]
    sql: select s from bar union select s from bar
    unordered: true

  - db: functions_test
    description: show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)
    expected_names: [s, t]
    expected_results:
      - [foobarbar, 0]
      - [null, 1]
      - [null, null]
    expected_types: [varchar, int]
    id: missing_in_union_1
    schema_mapping_heuristics: [drdl]
    sql: select s,t from bar union select s,t from bar
    unordered: true

  - db: functions_test
    description: show that optimized union works correctly even with NULL versus missing values (NULL and missing must hash the same)
    expected_names: [t, s]
    expected_results:
      - [0, foobarbar]
      - [1, null]
      - [null, null]
    expected_types: [int, varchar]
    id: missing_in_union_2
    schema_mapping_heuristics: [drdl]
    sql: select t,s from bar union select t,s from bar
    unordered: true

  - db: union_test
    description: optimized distinct all
    expected_names: [d]
    expected_results:
      - [1]
      - [4]
      - [7]
      - [13]
    expected_types: [int]
    id: optimized_union_distinct_1
    schema_mapping_heuristics: [drdl]
    sql: select d from foo inner join bar on foo.id=bar.id union select a from baz inner join foobar on baz.id=foobar.id
    unordered: true

  - db: union_test
    description: optimized union distinct 2
    expected_names: [id, d, e, f]
    expected_results:
