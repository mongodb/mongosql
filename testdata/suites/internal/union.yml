      - [2]
      - [4]
      - [7]
      - [8]
      - [13]
      - [14]
    expected_types: [int]
    id: '5'
    sql: select * from (select a from union_1 union select d from union_2 union select g from union_3) as tmp order by a
    unordered: true

  - db: union_test
    description: four unions, implicit distinct operator
    expected_names: [a]
