#
# Tests
#
testcases:

- sql: "select * from information_schema.schemata where SCHEMA_NAME = 'mysql' order by schema_name"
  id: '1'
  schema_mapping_heuristics:
  - drdl
  db: mysql
  description: "mysql database"
  expected_names: ["CATALOG_NAME", "SCHEMA_NAME", "DEFAULT_CHARACTER_SET_NAME", "DEFAULT_COLLATION_NAME", "SQL_PATH"]
  expected_types: [varchar, varchar, varchar, varchar, varchar]
  expected:
  - ["def", "mysql", "utf8", "utf8_bin", ""]

- sql: "select TABLE_CATALOG, TABLE_SCHEMA, TABLE_NAME, TABLE_TYPE, TABLE_COLLATION, TABLE_COMMENT from information_schema.tables where TABLE_SCHEMA = 'mysql' order by TABLE_SCHEMA, TABLE_NAME"
  id: '2'
  schema_mapping_heuristics:
  - drdl
  db: mysql
  description: "mysql tables"
  expected_names: ["TABLE_CATALOG", "TABLE_SCHEMA", "TABLE_NAME", "TABLE_TYPE", "TABLE_COLLATION", "TABLE_COMMENT"]
  expected_types: [varchar, varchar, varchar, varchar, varchar, varchar]
  expected:
  - ["def", "mysql", "proc", "SYSTEM VIEW", "utf8_bin", ""]

- sql: "select db from mysql.proc"
  id: '3'
  schema_mapping_heuristics:
  - drdl
  db: mysql
  description: "mysql tables"
  expected_names: ["db"]
  expected_types: [varchar]
  expected: []
