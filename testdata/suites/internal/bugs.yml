    expected_types: [int]
    id: BI-1944-predicate
    sql: select count(*) as count from oid where (_id in ('53c2ab5e4291b17b666d742a', '53c2ab5e4291b17b666d844e'))

  - db: bugs_database
    description: check that we can track non-conflicting fields under conflicts, BI-1947
    expected_names: ["_id", "a.b", "a.b.c.d.e"]
    expected_results:
      - [0, ~, "world"]
      - [1, "world", ~]
    expected_types: [int, varchar, varchar]
    id: select_under_conflicts
    sql: "select * from BI_1947"

  - db: bugs_database
    expected_names: [eq]
    expected_results:
      - [0]
    expected_types: [int]
    id: BI-1891
    sql: select _id = '53c2ab5e4291b17b666aaaaa' as eq from oid

  - db: bugs_database
    expected_names: [_id]
    expected_results: []
    expected_types: [int]
    id: BI-1891-predicate
    sql: select _id from oid where _id = '53c2ab5e4291b17b666aaaaa'

  - db: bugs_database
    expected_names: [_id]
    expected_results:
      - ["53c2ab5e4291b17b666d742a"]
    expected_types: [varchar]
    id: BI-1997-left join
    sql: select a._id from oid a left join oid b on a._id=b._id

  - description: BI-1949 subquery comparison type reconciliation failure
    expected_names: [cmp]
    expected_results:
      - [0]
    expected_types: [int]
    id: BI-1949-subquery-comparison-reconcile
    sql: select (select 1, 2, 3) < (select 1, 2, 3) as cmp

  - db: bugs_database
    description: BI-2258 Fix issue with large date/datetime literals
    expected_names: [_id, d1, dt1, d2, dt2]
    expected_results:
      - ['53c2ab5e4291b17b666d742a', '9999-12-31', '9999-12-31 01:01:01', '0050-01-23', '0050-01-23 12:34:34']
    expected_types: [varchar, varchar, varchar, varchar, varchar]
    id: BI-2258-literals
    sql: select _id, date('9999-12-31 01:01:01') as d1, timestamp('9999-12-31 01:01:01') as dt1, date('0050-01-23 12:34:34') as d2, timestamp('0050-01-23 12:34:34') as dt2 from oid limit 1

  - db: bugs_database
    description: BI-2258 Fix issue with large date/datetime values
    expected_names: [d, s, f]
    expected_results:
      - ['9999-12-31 23:59:59', 253402300799000, 253402300799000]
      - ['0050-01-01 01:01:01', -60589292339000, -60589292339000]
    expected_types: [varchar, int, float]
    id: BI-2258-values
    sql: select timestamp(d) d, nopushdown(convert(timestamp(d), signed)) s, nopushdown(convert(timestamp(d), decimal)) f from BI_2258;
    variables: {type_conversion_mode: mongosql}

  - db: bugs_database
    description: BI-2262 Allow numeric field names in unwind path
    expected_names: ["_id", "a.0", "a.0_idx"]
    expected_results:
      - [0, "a", 0]
      - [0, "b", 1]
      - [1, "c", 0]
      - [1, "d", 1]
      - [1, "e", 2]
      - [2, "f", 0]
    expected_types: [int, varchar, int]
    id: BI-2262-numeric-unwind-path
    sql: "select _id, `a.0`, `a.0_idx` from BI_2262_a_0;"

  - db: functions_test
