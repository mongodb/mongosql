testcases:

# Between
- sql: "select a from where_test.foo where id between 1 and 4"
  id: '0'
  schema_mapping_heuristics:
  - drdl
  db: where_test
  description: "between distinct values"
  expected_names: ["a"]
  expected_types: [int]
  expected:
  - [2]
  - [3]
- sql: "select a from baz where b = 5 and a between 1 and 4"
  id: '1'
  schema_mapping_heuristics:
  - drdl
  db: where_test
  description: "between distinct values"
  expected_names: ["a"]
  expected_types: [int]
