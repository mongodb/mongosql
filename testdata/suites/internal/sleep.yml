testcases:

  - expected_names: [sleep(0.1)]
    expected_results:
      - [0]
    expected_types: [int]
    id: '1'
    sql: select sleep(0.1)

  - db: functions_test
    expected_names: [sleep(0.1)]
    expected_results:
      - [0]
      - [0]
      - [0]
      - [0]
      - [0]
    expected_types: [int]
    id: '2'
    sql: select sleep(0.1) from scalar

  - db: functions_test
    expected_names: [_id]
    expected_results: []
    expected_types: [int]
    id: '3'
    sql: select _id from scalar where sleep(0.1)

  - expected_names: ['1', sleep(0.1)]
    expected_results:
      - [1, 0]
    expected_types: [int, int]
    id: '4'
    sql: select 1, sleep(0.1)

  - db: collation_test
    description: where
    expected_names: [_id, sleep(0.1)]
    expected_results:
      - [0, 0]
      - [2, 0]
    expected_types: [int, int]
    id: collation
    min_server_version: '3.4'
    sql: select _id, sleep(0.1) from collation_1 where a = 'A'

  - db: functions_test
    expected_names: [min(a), sleep(0.1)]
    expected_results:
      - [-3, 0]
    expected_types: [int, int]
    id: functions_1
    sql: select min(a), sleep(0.1) from scalar

  - db: functions_test
    expected_names: [sleep(0.1), 2+d]
    expected_results:
      - [0, 20000923134502.4]
      - [0, 20000924134502]
      - [0, 20001024134502.008]
      - [0, null]
      - [0, null]
    expected_types: [int, float]
    id: functions_2
    sql: select sleep(0.1), 2+d from scalar

  - db: groupby_test
    expected_names: [a, sum(b), count(*), sleep(0.1)]
    expected_results:
      - [1, 1, 1, 0]
      - [2, 5, 2, 0]
      - [3, 3, 1, 0]
    expected_types: [int, int, int, int]
    id: groupby
    sql: select a, sum(b), count(*), sleep(0.1) from groupby_test.groupby group by a order by a

  - db: join_test
    expected_names: [_id, a, b, _id, c, d, sleep(0.1)]
    expected_results:
      - [0, 1, null, 0, 10, null, 0]
      - [0, 1, null, 1, 11, 1, 0]
      - [0, 1, null, 20, 30, null, 0]
      - [1, 2, 1, 0, 10, null, 0]
      - [1, 2, 1, 1, 11, 1, 0]
      - [1, 2, 1, 20, 30, null, 0]
      - [2, 3, null, 0, 10, null, 0]
      - [2, 3, null, 1, 11, 1, 0]
      - [2, 3, null, 20, 30, null, 0]
    expected_types: [int, int, int, int, int, int, int]
    id: join
    sql: select f.*, b.*, sleep(0.1) from join_test.join_1 f, join_test.join_2 b

  - db: limit_test
    expected_names: [sleep(0.1), a]
    expected_results:
      - [0, 3]
    expected_types: [int, int]
    id: limit
    sql: select sleep(0.1), a from limit_test.limitTable limit 2, 1

  - db: orderby_test
    expected_names: [_id, a, sleep(0.1)]
    expected_results:
      - [0, 2, 0]
      - [3, 2, 0]
      - [2, 1, 0]
      - [1, 0, 0]
    expected_types: [int, int, int]
    id: orderby
    sql: select _id, a, sleep(0.1) from orderby_test.orderbyTable order by a desc

  - db: select_sTest
    expected_names: [b, sleep(0.1), _id]
    expected_results:
      - [null, 0, 0]
      - [null, 0, 1]
      - [null, 0, 2]
    expected_types: [int, int, int]
    id: select
    sql: select b, sleep(0.1), _id FROM select_Stest.select_1

  - db: subqueries_test
    expected_names: [_id, a, b, sleep(0.1)]
    expected_results:
      - [0, 1, null, 0]
      - [1, 2, null, 0]
      - [2, 3, null, 0]
    expected_types: [int, int, int, int]
    id: subquery
    sql: select _id, a, b, sleep(0.1) from (select * from subqueries_test.subqueries) foo

  - db: where_test
    expected_names: [a, sleep(0.1)]
    expected_results:
      - [1, 0]
    expected_types: [int, int]
    id: where
    sql: select a, sleep(0.1) from where_4 where b = 5 and a between 1 and 4

  - db: functions_test
    expected_names: [sleep(a)]
    expected_results:
      - [0]
      - [0]
    expected_types: [int]
    id: column_tinyint
    sql: select sleep(a) from convert_0 where a is not null

  - db: where_test
    expected_names: [sleep(b)]
    expected_results:
      - [0]
      - [0]
      - [0]
    expected_types: [int]
    id: column_bigint
    sql: select sleep(b) from where_4 where b is not null

  - db: where_test
    expected_names: [sleep(rnum)]
    expected_results:
      - [0]
      - [0]
      - [0]
      - [0]
      - [0]
    expected_types: [int]
    id: column_double
    sql: select sleep(rnum) from where_6

  - db: where_test
    expected_names: [sleep(a)]
    expected_results:
      - [0]
      - [0]
      - [0]
    expected_types: [int]
    id: column_varchar
    sql: select sleep(a) from where_5

  - expected_names: [sleep(1.5)]
    expected_results:
      - [0]
    expected_types: [int]
    id: float_duration
    sql: select sleep(1.5)
