testcases:

  - db: functions_test
    expected_names: [a]
    expected_results:
      - [1]
      - [0]
      - [null]
      - [null]
      - [null]
    expected_types: [int]
    id: '1'
    sql: select /*comment*/ a from convert_0;

  - db: functions_test
    expected_names: [a]
    expected_results:
      - [1]
      - [0]
      - [null]
      - [null]
      - [null]
    expected_types: [int]
    id: '2'
    sql: 'select a from convert_0; #comment'

  - db: functions_test
    expected_names: [a]
    expected_results:
      - [1]
      - [0]
      - [null]
      - [null]
      - [null]
    expected_types: [int]
    id: '3'
    sql: select a from convert_0; -- comment

  - db: functions_test
    expected_names: [a]
    expected_results:
      - [1]
      - [0]
      - [null]
      - [null]
      - [null]
    expected_types: [int]
    id: '4'
    sql: "select a /*this\n is \na \ncomment */ from convert_0;"

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['hello']
    expected_types: [varchar]
    id: 'conditional comment is executed'
    sql_list: [
      "set @foo = 'default'",
      "/*!30122 set @foo = 'hello'*/",
      "select @foo"]

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['hello']
    expected_types: [varchar]
    id: 'conditional comment is executed with non-standard spacing'
    sql_list: [
      "set @foo = 'default'",
      "         /*!30122set @foo = 'hello'     */   ",
      "select @foo"]

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['hello']
    expected_types: [varchar]
    id: 'conditional comment is executed with non-standard spacing and a query'
    sql_list: [
      "set @foo = 'hello'",
      "           /*!50712              select @foo                 */"]

  - db: information_schema
    expected_error: "Error 1105: unexpected LEX_ERROR at position 17 near hel"
    id: 'conditional comment is executed with non-standard spacing and broken statement'
    sql_list: [
      "set @foo = 'default'",
      "         /*!30122set @foo = 'hel     */   ",
      "select @foo"]

  - db: information_schema
    expected_error: "Error 1105: unexpected NUMBER at position 2 near 4"
    id: 'conditional comment has bad version code format'
    sql_list: [
      "set @foo = 'default'",
      "/*!301224set @foo = 'hel     */   ",
      "select @foo"]

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['default']
    expected_types: [varchar]
    id: 'conditional comment is not executed'
    sql_list: [
      "set @foo = 'default'",
      "/*!99999 set @foo = 'hello'*/",
      "select @foo"]

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['default']
    expected_types: [varchar]
    id: 'conditional comment is not executed with non-standard spacing'
    sql_list: [
      "set @foo = 'default'",
      "         /*!99999set @foo = 'hello'*/   ",
      "select @foo"]

  - db: information_schema
    expected_names: []
    expected_results: []
    expected_types: []
    id: 'conditional comment is not executed with non-standard spacing and a query'
    sql_list: [
      "set @foo = 'hello'",
      "         /*!99999select @foo*/   "]

  - db: information_schema
    expected_names: ['@foo']
    expected_results:
      - ['default']
    expected_types: [varchar]
    id: 'conditional comment is not executed with non-standard spacing and broken statement'
    sql_list: [
      "set @foo = 'default'",
      "         /*!99999set @foo = 'hel*/   ",
      "select @foo"]
