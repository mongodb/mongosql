testcases:

  - db: select_sTest
    description: numeric literal
    expected_names: ['3.141592653589793']
    expected_results:
      - [3.141592653589793]
      - [3.141592653589793]
      - [3.141592653589793]
    expected_types: [float]
    id: '0'
    sql: select 3.141592653589793 FROM select_sTest.select_1

  - db: select_sTest
    description: global *
    expected_names: [_id, a, b]
