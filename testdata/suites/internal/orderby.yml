testcases:

  - db: orderby_test
    description: single term
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '0'
    sql: select _id, a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: single term with asc
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '1'
    sql: select _id, a from orderby_test.orderbyTable order by a asc

  - db: orderby_test
    description: single term with desc
    expected_names: [_id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '2'
    sql: select _id, a from orderby_test.orderbyTable order by a desc

  - db: orderby_test
    description: single ordinal term
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '3'
    sql: select _id, a from orderby_test.orderbyTable order by 2

  - db: orderby_test
    description: single ordinal term with asc
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '4'
    sql: select _id, a from orderby_test.orderbyTable order by 2 asc

  - db: orderby_test
    description: single ordinal term with desc
    expected_names: [_id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '5'
    sql: select _id, a from orderby_test.orderbyTable order by 2 desc

  - db: orderby_test
    description: single aliased term
    expected_names: [_id, b]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '6'
    sql: select _id, a as b from orderby_test.orderbyTable order by b

  - db: orderby_test
    description: single aliased term with asc
    expected_names: [_id, b]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '7'
    sql: select _id, a as b from orderby_test.orderbyTable order by b asc

  - db: orderby_test
    description: single aliased term with desc
    expected_names: [_id, b]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '8'
    sql: select _id, a as b from orderby_test.orderbyTable order by b desc

  - db: orderby_test
    description: multiple terms
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '9'
    sql: select _id, a from orderby_test.orderbyTable order by a, _id

  - db: orderby_test
    description: multiple terms with the second desc
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [3, 2]
      - [0, 2]
    expected_types: [int, int]
    id: '10'
    sql: select _id, a from orderby_test.orderbyTable order by a, _id desc

  - db: orderby_test
    description: multiple terms with the first desc
    expected_names: [_id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '11'
    sql: select _id, a from orderby_test.orderbyTable order by a desc, _id

  - db: orderby_test
    description: multiple terms with both desc
    expected_names: [_id, a]
    expected_results:
      - [3, 2]
      - [0, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '12'
    sql: select _id, a from orderby_test.orderbyTable order by a desc, _id desc

  - db: orderby_test
    description: non-correlated subquery
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '13'
    sql: select a from orderbyTable order by (select a from orderbyTable limit 1)

  - db: orderby_test
    description: correlated subquery
    expected_names: [a]
    expected_results:
      - [2]
      - [2]
      - [1]
      - [0]
    expected_types: [int]
    id: '14'
    sql: select a from orderbyTable f order by (select -a from orderbyTable where f._id = _id)

  - db: orderby_test
    description: order by expression
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '15'
    sql: select a from orderbyTable f order by a * _id

  - db: orderby_test
    description: order by expression
    expected_names: [a]
    expected_results:
      - [0]
      - [1]
      - [2]
      - [2]
    expected_types: [int]
    id: '16'
    sql: select a from orderbyTable f order by a > _id

  - db: orderby_test
    description: non-correlated subquery with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '17'
    sql: select orderby_test.orderbyTable.a from orderbyTable order by (select orderby_test.orderbyTable.a from orderbyTable limit 1)

  - db: orderby_test
    description: correlated subquery with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [2]
      - [1]
      - [0]
    expected_types: [int]
    id: '18'
    sql: select orderby_test.f.a from orderbyTable f order by (select -orderby_test.orderbyTable.a from orderbyTable where f._id = orderby_test.orderbyTable._id)

  - db: orderby_test
    description: order by expression with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '19'
    sql: select orderby_test.f.a from orderbyTable f order by orderby_test.f.a * orderby_test.f._id

  - db: orderby_test
    description: order by expression with three dot notation
    expected_names: [a]
    expected_results:
      - [0]
      - [1]
      - [2]
      - [2]
    expected_types: [int]
    id: '20'
    sql: select orderby_test.f.a from orderbyTable f order by orderby_test.f.a > orderby_test.f._id

  - db: orderby_test
    description: multiple terms with the second desc with three dot notation
    expected_names: [_id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [3, 2]
      - [0, 2]
    expected_types: [int, int]
    id: '21'
    sql: select orderby_test.orderbyTable._id, orderby_test.orderbyTable.a from orderby_test.orderbyTable order by orderby_test.orderbyTable.a, orderby_test.orderbyTable._id desc

  - db: orderby_test
    description: same column chosen twice
    expected_names: [a, a]
    expected_results:
      - [0, 0]
      - [1, 1]
      - [2, 2]
      - [2, 2]
    expected_types: [int, int]
    id: '22'
    sql: select a, a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: same column aliased as itself
    expected_names: [a, a]
    expected_results:
      - [0, 0]
      - [1, 1]
      - [2, 2]
      - [2, 2]
    expected_types: [int, int]
    id: '23'
    sql: select a as a, a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: order by chooses the column with the matching alias
    expected_names: [a, _id]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '24'
    sql: select _id as a, a as _id from orderby_test.orderbyTable order by _id

  - db: orderby_test
    description: order by chooses the first unnamed column if multiple unnamed columns are provided
    expected_names: [a, a, a, a]
    expected_results:
      - [1, 1, "a", 1]
      - [0, 2, "a", 1]
      - [2, 3, "a", 1]
      - [3, 5, "a", 1]
    expected_types: [int, int, varchar, int]
    id: '25'
    sql: select _id as a, _id+a as a, "a" as a, 1 as a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: order by existing column aliased as an existing column along with that column
    expected_error: "Error 1052: Column 'a' in order clause is ambiguous"
    id: '26'
    sql: select _id as a, a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: order by existing column aliased as an existing column along with that column aliased as itself
    expected_error: "Error 1052: Column 'a' in order clause is ambiguous"
    id: '27'
    sql: select _id as a, a as a from orderby_test.orderbyTable order by a

  - db: orderby_test
    description: order by two existing columns aliased to an ambiguous name
    expected_error: "Error 1052: Column 'z' in order clause is ambiguous"
    id: '28'
    sql: select _id as z, a as z from orderby_test.orderbyTable order by z
