testcases:

  - db: orderby_test
    description: single term
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '0'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a

  - db: orderby_test
    description: single term with asc
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '1'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a asc

  - db: orderby_test
    description: single term with desc
    expected_names: [id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '2'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a desc

  - db: orderby_test
    description: single ordinal term
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '3'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by 2

  - db: orderby_test
    description: single ordinal term with asc
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '4'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by 2 asc

  - db: orderby_test
    description: single ordinal term with desc
    expected_names: [id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '5'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by 2 desc

  - db: orderby_test
    description: single aliased term
    expected_names: [id, b]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '6'
    schema_mapping_modes: [drdl]
    sql: select id, a as b from orderby_test.foo order by b

  - db: orderby_test
    description: single aliased term with asc
    expected_names: [id, b]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '7'
    schema_mapping_modes: [drdl]
    sql: select id, a as b from orderby_test.foo order by b asc

  - db: orderby_test
    description: single aliased term with desc
    expected_names: [id, b]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '8'
    schema_mapping_modes: [drdl]
    sql: select id, a as b from orderby_test.foo order by b desc

  - db: orderby_test
    description: multiple terms
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [0, 2]
      - [3, 2]
    expected_types: [int, int]
    id: '9'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a, id

  - db: orderby_test
    description: multiple terms with the second desc
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [3, 2]
      - [0, 2]
    expected_types: [int, int]
    id: '10'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a, id desc

  - db: orderby_test
    description: multiple terms with the first desc
    expected_names: [id, a]
    expected_results:
      - [0, 2]
      - [3, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '11'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a desc, id

  - db: orderby_test
    description: multiple terms with both desc
    expected_names: [id, a]
    expected_results:
      - [3, 2]
      - [0, 2]
      - [2, 1]
      - [1, 0]
    expected_types: [int, int]
    id: '12'
    schema_mapping_modes: [drdl]
    sql: select id, a from orderby_test.foo order by a desc, id desc

  - db: orderby_test
    description: non-correlated subquery
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '13'
    schema_mapping_modes: [drdl]
    sql: select a from foo order by (select a from foo limit 1)

  - db: orderby_test
    description: correlated subquery
    expected_names: [a]
    expected_results:
      - [2]
      - [2]
      - [1]
      - [0]
    expected_types: [int]
    id: '14'
    schema_mapping_modes: [drdl]
    sql: select a from foo f order by (select -a from foo where f.id = id)

  - db: orderby_test
    description: order by expression
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '15'
    schema_mapping_modes: [drdl]
    sql: select a from foo f order by a * id

  - db: orderby_test
    description: order by expression
    expected_names: [a]
    expected_results:
      - [0]
      - [1]
      - [2]
      - [2]
    expected_types: [int]
    id: '16'
    schema_mapping_modes: [drdl]
    sql: select a from foo f order by a > id

  - db: orderby_test
    description: non-correlated subquery with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '17'
    schema_mapping_modes: [drdl]
    sql: select orderby_test.foo.a from foo order by (select orderby_test.foo.a from foo limit 1)

  - db: orderby_test
    description: correlated subquery with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [2]
      - [1]
      - [0]
    expected_types: [int]
    id: '18'
    schema_mapping_modes: [drdl]
    sql: select orderby_test.f.a from foo f order by (select -orderby_test.foo.a from foo where f.id = orderby_test.foo.id)

  - db: orderby_test
    description: order by expression with three dot notation
    expected_names: [a]
    expected_results:
      - [2]
      - [0]
      - [1]
      - [2]
    expected_types: [int]
    id: '19'
    schema_mapping_modes: [drdl]
    sql: select orderby_test.f.a from foo f order by orderby_test.f.a * orderby_test.f.id

  - db: orderby_test
    description: order by expression with three dot notation
    expected_names: [a]
    expected_results:
      - [0]
      - [1]
      - [2]
      - [2]
    expected_types: [int]
    id: '20'
    schema_mapping_modes: [drdl]
    sql: select orderby_test.f.a from foo f order by orderby_test.f.a > orderby_test.f.id

  - db: orderby_test
    description: multiple terms with the second desc with three dot notation
    expected_names: [id, a]
    expected_results:
      - [1, 0]
      - [2, 1]
      - [3, 2]
      - [0, 2]
    expected_types: [int, int]
    id: '21'
    schema_mapping_modes: [drdl]
    sql: select orderby_test.foo.id, orderby_test.foo.a from orderby_test.foo order by orderby_test.foo.a, orderby_test.foo.id desc
