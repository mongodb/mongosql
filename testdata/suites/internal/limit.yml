testcases:

  - db: limit_test
    description: rowcount
    expected_names: [a]
    expected_results:
      - [1]
      - [2]
    expected_types: [int]
    id: '0'
    sql: select a from limit_test.limitTable limit 2
    unordered: true

  - db: limit_test
    description: offset and rowcount
    expected_names: [a]
    expected_results:
      - [3]
    expected_types: [int]
    id: '1'
    sql: select a from limit_test.limitTable limit 2, 1
    unordered: true

  - db: limit_test
    description: offset and rowcount
    expected_names: [a]
    expected_results:
      - [3]
    expected_types: [int]
    id: '2'
    sql: select a from limit_test.limitTable limit 1 OFFSET 2
    unordered: true

  - db: limit_test
    description: rowcount is 0
    expected_names: [a]
    expected_results: null
    expected_types: [int]
    id: '3'
    sql: select a from limit_test.limitTable limit 2, 0
    unordered: true

  - db: limit_test
    description: rowcount is 0
    expected_names: [a]
    expected_results: null
    expected_types: [int]
    id: '4'
    sql: select a from limit_test.limitTable limit 0 OFFSET 2
    unordered: true

  - db: limit_test
    description: offset and rowcount are 0
    expected_names: [a]
    expected_results: null
    expected_types: [int]
    id: '5'
    sql: select a from limit_test.limitTable limit 0, 0
    unordered: true
