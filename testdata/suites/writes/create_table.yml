testcases:

  - db: information_schema
    description: create new table
    expected_names: ['table_name']
    expected_results:
      - ['foo']
    expected_types: [varchar]
    id: 'create table created_writes_db.foo'
    sql_cleanup: drop database if exists created_writes_db
    sql_list: [
      drop database if exists created_writes_db,
      create database created_writes_db,
      'create table created_writes_db.foo(x int, y int, unique index idx(x,y))',
      select table_name from tables where table_schema = 'created_writes_db' and table_name = 'foo']
    sync: true

  - db: information_schema
    description: create new table that already exists with 'if not exists' set
    expected_names: ['table_name']
    expected_results:
      - ['foo']
    expected_types: [varchar]
    id: 'create table if not exists created_writes_db.foo'
    sql_cleanup: drop database if exists created_writes_db
    sql_list: [
      drop database if exists created_writes_db,
      create database created_writes_db,
      'create table created_writes_db.foo(x int, y int, unique index idx(x,y))',
      'create table if not exists created_writes_db.foo(x int, y int, unique index idx(x,y))',
      select table_name from tables where table_schema = 'created_writes_db' and table_name = 'foo']
    sync: true

  - db: information_schema
    description: create table that already exists, should error
    expected_error_contains: "already exists"
    id: 'create table create_writes_db.foo conflict'
    sql_cleanup: drop database if exists created_writes_db
    sql_list: [
      drop database if exists created_writes_db,
      create database created_writes_db,
      'create table created_writes_db.foo(x int, y int, unique index idx(x,y))',
      'create table created_writes_db.foo(x int, y int, unique index idx(x,y))']
    sync: true

  - db: information_schema
    description: create table in non-existent database, should error
    expected_error: "Error 1049: Unknown database 'random'"
    id: 'create table random.foo, random does not exist'
    sql_cleanup: drop database if exists random
    sql_list: [
      drop database if exists random,
      'create table random.foo(x int, y int, unique index idx(x,y))']
    sync: true

  - db: information_schema
    description: use database and create table
    expected_names: ['Tables_in_created_writes_db']
    expected_results:
      - ['foo']
    expected_types: [varchar]
    id: 'use database and create table'
    sql_cleanup: drop database if exists created_writes_db
    sql_list: [
      drop database if exists created_writes_db,
      create database created_writes_db,
      use created_writes_db,
      create table foo(x int),
      show tables
    ]
    sync: true

  - db: information_schema
    description: check describe table
    expected_names: [Field, Type, Null, Key, Default, Extra]
    expected_results:
      - ["a", "bigint(20)", "YES", "UNI", ~, ""]
      - ["b", "varchar(65535)", "NO", "MUL", ~, ""]
      - ["c", "varchar(65535)", "YES", "", ~, ""]
      - ["d", "bigint(20)", "YES", "MUL", ~, ""]
    expected_types: ["varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
    id: describe table
    sql_cleanup: "drop database if exists created_writes_db"
    sql_list: [
      "drop database if exists created_writes_db",
      "create database created_writes_db",
      "use created_writes_db",
      "create table idxes(a int, b varchar not null, c varchar comment 'Im C!!!', d int, unique index aa(a), index(a, b), unique index(d, a), fulltext index (b, c)) COMMENT = 'hello!'",
      "describe idxes"]
    sync: true

  - db: information_schema
    description: check describe table showing that unique single column indexes take priority over multiKey
    expected_names: [Field, Type, Null, Key, Default, Extra]
    expected_results:
      - ["a", "bigint(20)", "YES", "UNI", ~, ""]
      - ["b", "varchar(65535)", "NO", "MUL", ~, ""]
      - ["c", "varchar(65535)", "YES", "", ~, ""]
      - ["d", "bigint(20)", "YES", "MUL", ~, ""]
    expected_types: ["varchar", "varchar", "varchar", "varchar", "varchar", "varchar"]
    id: describe table prefer unique single column index
    sql_cleanup: "drop database if exists created_writes_db"
    sql_list: [
      "drop database if exists created_writes_db",
      "create database created_writes_db",
      "use created_writes_db",
      "create table idxes(a int, b varchar not null, c varchar comment 'Im C!!!', d int, index(a, b), unique index aa(a), unique index(d, a), fulltext index (b, c)) COMMENT = 'hello!'",
      "describe idxes"]
    sync: true

  - db: information_schema
    description: check show create table
    expected_names: [Table, Create Table]
    expected_results:
      - ["idxes",
         "CREATE TABLE `idxes` (\n  `a` bigint(20) DEFAULT NULL,\n  `b` varchar(65535) COLLATE utf8_bin NOT NULL,\n  `c` varchar(65535) COLLATE utf8_bin DEFAULT NULL COMMENT 'Im C!!!',\n  UNIQUE KEY `aa` (`a`),\n  FULLTEXT KEY `b_text_c_text` (`b`,`c`)\n) ENGINE=MongoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin COMMENT='hello!'"]
    expected_types: [varchar, varchar]
    id: show create table
    sql_cleanup: "drop database if exists created_writes_db"
    sql_list: [
      "drop database if exists created_writes_db",
      "create database created_writes_db",
      "use created_writes_db",
      "create table idxes(a int, b varchar not null, c varchar comment 'Im C!!!', unique index aa(a), fulltext index (b, c)) COMMENT = 'hello!'",
      "show create table idxes"]
    sync: true

  - db: information_schema
    description: check show create table no comment
    expected_names: [Table, Create Table]
    expected_results:
      - ["idxes",
         "CREATE TABLE `idxes` (\n  `a` bigint(20) DEFAULT NULL,\n  `b` varchar(65535) COLLATE utf8_bin NOT NULL,\n  `c` varchar(65535) COLLATE utf8_bin DEFAULT NULL COMMENT 'Im C!!!',\n  UNIQUE KEY `aa` (`a`),\n  FULLTEXT KEY `b_text_c_text` (`b`,`c`)\n) ENGINE=MongoDB DEFAULT CHARSET=utf8 COLLATE=utf8_bin"]
    expected_types: [varchar, varchar]
    id: show create table no comment
    sql_cleanup: "drop database if exists created_writes_db"
    sql_list: [
      "drop database if exists created_writes_db",
      "create database created_writes_db",
      "use created_writes_db",
      "create table idxes(a int, b varchar not null, c varchar comment 'Im C!!!', unique index aa(a), fulltext index (b, c))",
      "show create table idxes"]
    sync: true
