    sql: SELECT `Type` AS `none_Type_nk`, SUM(`Profit`) AS `sum_Profit_ok`, SUM(`Sales`) AS `sum_Sales_ok`, YEAR(`Date`) AS `yr_Date_ok` FROM Starbucks WHERE ((NOT (`Type` = 'Regular')) AND (NOT (YEAR(`Date`) = 1999))) GROUP BY `Type`, YEAR(`Date`) ORDER BY 1, 2, 3, 4
