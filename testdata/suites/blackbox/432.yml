
testcases:
- sql: "SELECT `Order Priority` AS `none_Order_Priority_nk` FROM Staples WHERE ((CONVERT(`Order Date`, SQL_TIMESTAMP) IN ('1997-01-01 00:00:00', '1997-01-03 00:00:00')) AND (`Order Date` IN ( '1997-01-01',  '1997-01-03'))) GROUP BY `Order Priority` ORDER BY 1"
  min_server_version: "3.4"
  expected_names: ["none_Order_Priority_nk"]
  expected_types: [varchar]
  expected: 
   - ["1-URGENT"]
   - ["2-HIGH"]
   - ["3-MEDIUM"]
   - ["4-NOT SPECIFIED"]
   - ["5-LOW"]

