
testcases:
- sql: "SELECT MIN(1) AS `min_Number_of_Records_ok`,   `Market` AS `none_Market_nk`,   `Product` AS `none_Product_nk`,   SUM(`Profit`) AS `sum_Profit_ok` FROM Starbucks WHERE ((`Market` = 'East') AND (`Product Type` = 'Tea')) GROUP BY `Market`,   `Product` ORDER BY 1, 2, 3, 4"
  expected_names: ["min_Number_of_Records_ok", "none_Market_nk", "none_Product_nk", "sum_Profit_ok"]
  expected_types: [int, varchar, varchar, float]
  expected:
  - [1, "East", "Darjeeling", 6496.8884943408175]
  - [1, "East", "Earl Grey", 3405.387434362076]
  - [1, "East", "Green Tea", 5654.3630636391]

