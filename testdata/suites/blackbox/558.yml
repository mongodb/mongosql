    expected_types: [int, varchar, int]
    sql: SELECT FLOOR(`Pop_SQ_Mile` / 50) AS `Pop_Bins`, `Candidate` AS `none_Candidate_nk`, SUM(CONVERT(`Votes`, SQL_BIGINT)) AS `sum_Votes_ok` FROM Election WHERE (FLOOR(`Pop_SQ_Mile` / 50) IN (13, 15, 19, 21)) GROUP BY FLOOR(`Pop_SQ_Mile` / 50), `Candidate` ORDER BY 1, 2, 3
