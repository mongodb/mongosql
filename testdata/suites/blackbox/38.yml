testcases:

  - expected_names: [Customer_Segment__group_]
    expected_results:
      - [CONSUMER]
      - [CORPORATE]
    expected_types: [varchar]
    min_server_version: '3.4'
    sql: SELECT (CASE WHEN (`Customer Segment` IN ('CONSUMER', 'HOME OFFICE', 'SMALL BUSINESS')) THEN 'CONSUMER' ELSE `Customer Segment` END) AS `Customer_Segment__group_` FROM Staples GROUP BY (CASE WHEN (`Customer Segment` IN ('CONSUMER', 'HOME OFFICE', 'SMALL BUSINESS')) THEN 'CONSUMER' ELSE `Customer Segment` END) ORDER BY 1
