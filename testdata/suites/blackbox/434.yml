    sql: SELECT SUM(`Sales Total`) AS `sum_Sales_Total_ok`, FLOOR((CASE WHEN 7 = 0 THEN NULL ELSE (((MOD(((7 + DAYOFWEEK(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) - 2), 7)) + 7) + (TIMESTAMPDIFF(SQL_TSI_DAY,TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))),`Order Date`) + (HOUR(`Order Date`) - HOUR(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE)))) + (MINUTE(`Order Date`) - MINUTE(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),
      CONVERT(`Order Date`, SQL_DATE)))) + (SECOND(`Order Date`) - SECOND(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) / 60.0) / 60.0) / 24.0)) / 7 END)) AS `wk_Order_Date__copy__ok` FROM Staples WHERE (FLOOR((CASE WHEN 7 = 0 THEN NULL ELSE (((MOD(((7 + DAYOFWEEK(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) - 2), 7)) + 7) + (TIMESTAMPDIFF(SQL_TSI_DAY,TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))),`Order Date`) + (HOUR(`Order Date`) - HOUR(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),
      TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE)))) + (MINUTE(`Order Date`) - MINUTE(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE)))) + (SECOND(`Order Date`) - SECOND(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) / 60.0) / 60.0) / 24.0)) / 7 END)) IN (1, 2, 3, 4, 5, 6, 7, 8)) GROUP BY FLOOR((CASE WHEN 7 = 0 THEN NULL ELSE (((MOD(((7 + DAYOFWEEK(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) - 2), 7)) + 7) +
      (TIMESTAMPDIFF(SQL_TSI_DAY,TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))),`Order Date`) + (HOUR(`Order Date`) - HOUR(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE)))) + (MINUTE(`Order Date`) - MINUTE(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE)))) + (SECOND(`Order Date`) - SECOND(TIMESTAMPADD(SQL_TSI_MONTH,(1 - (CASE WHEN (MONTH(`Order Date`) < 2) THEN 12 ELSE 0 END)),TIMESTAMPADD(SQL_TSI_DAY,FLOOR(-(DAYOFYEAR(`Order Date`) - 1)),CONVERT(`Order Date`, SQL_DATE))))) / 60.0) / 60.0) / 24.0)) / 7 END)) ORDER BY 1, 2
