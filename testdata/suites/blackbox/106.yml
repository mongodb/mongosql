testcases:

  - expected_names: [avg_X_ok, avg_Y_ok, none_Product_nk]
    expected_results:
      - [50, 50, Amaretto]
      - [50, 50, Caffe Latte]
      - [50, 50, Caffe Mocha]
      - [50, 50, Chamomile]
      - [50, 50, Columbian]
      - [50, 50, Darjeeling]
      - [50, 50, Decaf Espresso]
      - [50, 50, Decaf Irish Cream]
      - [50, 50, Earl Grey]
      - [50, 50, Green Tea]
      - [50, 50, Lemon]
      - [50, 50, Mint]
      - [50, 50, Regular Espresso]
    expected_types: [int, int, varchar]
    sql: SELECT AVG(CONVERT(50, SQL_DOUBLE)) AS `avg_X_ok`, AVG(CONVERT(50, SQL_DOUBLE)) AS `avg_Y_ok`, `Product` AS `none_Product_nk` FROM Starbucks GROUP BY `Product` ORDER BY 1, 2, 3
