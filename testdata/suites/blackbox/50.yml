
testcases:
- sql: "SELECT `Price` AS `none_Price_ok` FROM Staples WHERE (`Price` IN (0.98999999999999999, 1.1399999999999999, 1.24, 1.26, 1.3400000000000001)) GROUP BY `Price` ORDER BY 1"
