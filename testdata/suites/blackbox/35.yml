testcases:

  - expected_names: [cnt_Number_of_Records_ok, none_Employee_Name_nk]
    expected_results:
      - [8, Sandra Davis]
      - [95, "Sandra R\xEDos Balderrama"]
    expected_types: [int, varchar]
    sql: "SELECT COUNT(1) AS `cnt_Number_of_Records_ok`,   `Employee Name` AS `none_Employee_Name_nk` FROM Staples WHERE (`Employee Name` IN ('Sandra Davis', 'Sandra R\xEDos Balderrama')) GROUP BY `Employee Name` ORDER BY 1, 2"
