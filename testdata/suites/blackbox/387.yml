
testcases:
- sql: "SELECT CONVERT(LTRIM(CONVERT(`DateTime`, SQL_VARCHAR)), SQL_DATE) AS `none_BCHBFJ_ok`, SUM(CONVERT(1, SQL_BIGINT)) AS `sum_Number_of_Records_ok` FROM DateTime GROUP BY CONVERT(LTRIM(CONVERT(`DateTime`, SQL_VARCHAR)), SQL_DATE) ORDER BY 1, 2"
  expected_names: ["none_BCHBFJ_ok", "sum_Number_of_Records_ok"]
  expected_types: [varchar, float]
  expected: 
   - ["2001-01-01", 6]
   - ["2001-01-02", 8]
   - ["2001-01-03", 8]
   - ["2001-01-04", 8]
   - ["2001-01-05", 8]
   - ["2001-01-06", 8]
   - ["2001-01-07", 4]

