testcases:

  - expected_names: [min_Number_of_Records_ok, none_Market_nk, none_Product_nk]
    expected_results:
      - [1, East, Darjeeling]
      - [1, East, Earl Grey]
      - [1, East, Green Tea]
    expected_types: [int, varchar, varchar]
    sql: SELECT MIN(1) AS `min_Number_of_Records_ok`,   `Market` AS `none_Market_nk`,   `Product` AS `none_Product_nk` FROM Starbucks WHERE ((`Market` = 'East') AND (`Product Type` = 'Tea')) GROUP BY `Market`,   `Product` ORDER BY 1, 2, 3
    unordered: true
