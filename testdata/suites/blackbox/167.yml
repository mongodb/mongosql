    sql: SELECT `key` AS none_key_nk,  str2 AS none_strC_nk,  str3 AS none_strD_nk,  (CASE WHEN (CASE WHEN ((CASE WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1    ELSE LENGTH(str2) - LENGTH(str3) + 1 END) IS NULL) OR (LENGTH(str3) IS NULL) THEN NULL    WHEN LENGTH(str3) < 1 THEN ''    WHEN (CASE WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1    ELSE LENGTH(str2) - LENGTH(str3) + 1 END) < 1 THEN SUBSTRING(RTRIM(str2),1,LENGTH(str3))    ELSE SUBSTRING(RTRIM(str2),(CASE WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1    ELSE LENGTH(str2) - LENGTH(str3) + 1 END) ,LENGTH(str3)) END) = str3 THEN 1 WHEN NOT (CASE WHEN ((CASE WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1    ELSE LENGTH(str2) - LENGTH(str3) + 1 END) IS NULL) OR (LENGTH(str3) IS NULL) THEN NULL    WHEN LENGTH(str3) < 1 THEN ''    WHEN (CASE WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1    ELSE LENGTH(str2) - LENGTH(str3) + 1 END) < 1 THEN SUBSTRING(RTRIM(str2),1,LENGTH(str3))    ELSE SUBSTRING(RTRIM(str2),(CASE
      WHEN (LENGTH(str2) - LENGTH(str3)) < 0 THEN 1       ELSE LENGTH(str2) - LENGTH(str3) + 1 END) ,LENGTH(str3)) END) = str3 THEN 0 ELSE NULL END) AS none_z_startswith_str_str__copy__nk FROM Calcs ORDER BY 1, 2, 3, 4
