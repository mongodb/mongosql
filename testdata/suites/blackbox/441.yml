testcases:

  - expected_names: [none_Product_Type_nk, qr_Date_ok, sum_COGS_ok, yr_Date_ok]
    expected_results:
      - [Coffee, 1, 10670, 1998]
      - [Coffee, 2, 11613, 1999]
      - [Espresso, 1, 11879, 1998]
      - [Espresso, 2, 12194, 1999]
      - [Herbal Tea, 1, 11010, 1998]
      - [Herbal Tea, 2, 11649, 1999]
      - [Tea, 1, 9318, 1998]
      - [Tea, 2, 9906, 1999]
    expected_types: [varchar, int, int, int]
    sql: SELECT `Product Type` AS `none_Product_Type_nk`, QUARTER(`Date`) AS `qr_Date_ok`, SUM(CONVERT(`COGS`, SQL_BIGINT)) AS `sum_COGS_ok`, YEAR(`Date`) AS `yr_Date_ok` FROM Starbucks WHERE ((((YEAR(`Date`) * 100) + MONTH(`Date`)) IN (199801, 199802, 199803, 199904, 199905, 199906)) AND (QUARTER(`Date`) <= 2)) GROUP BY `Product Type`, QUARTER(`Date`), YEAR(`Date`) ORDER BY 1, 2, 3, 4
