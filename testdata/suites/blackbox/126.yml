testcases:

  - expected_names: [none_Year_ok, sum_Doubles_ok]
    expected_results:
      - [1871, 434]
      - [1872, 567]
      - [1873, 556]
      - [1874, 633]
      - [1875, 839]
    expected_types: [int, int]
    sql: SELECT `Year` AS `none_Year_ok`, SUM(CONVERT(`Doubles`, SQL_BIGINT)) AS `sum_Doubles_ok` FROM Batters WHERE (`Year` IN (1871, 1872, 1873, 1874, 1875)) GROUP BY `Year` ORDER BY 1, 2
