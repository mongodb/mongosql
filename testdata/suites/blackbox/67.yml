testcases:

  - expected_names: [Product__group_, avg_Margin_ok, cnt_Margin_ok, sum_Margin_ok]
    expected_results:
      - [Caffe Latte, 93.25862068965517, 696, 64908]
      - [Mint, 104.89310344827587, 3480, 365028]
      - [Regular Espresso, 181.97222222222223, 72, 13102]
    expected_types: [varchar, float, int, int]
    sql: SELECT (CASE `Product` WHEN 'Caffe Latte' THEN 'Caffe Latte' WHEN 'Caffe Mocha' THEN 'Caffe Latte' WHEN 'Regular Espresso' THEN 'Regular Espresso' ELSE 'Mint' END) AS `Product__group_`, AVG(CONVERT(`Margin`, SQL_DOUBLE)) AS `avg_Margin_ok`, COUNT(`Margin`) AS `cnt_Margin_ok`, SUM(CONVERT(`Margin`, SQL_BIGINT)) AS `sum_Margin_ok` FROM Starbucks GROUP BY (CASE `Product` WHEN 'Caffe Latte' THEN 'Caffe Latte' WHEN 'Caffe Mocha' THEN 'Caffe Latte' WHEN 'Regular Espresso' THEN 'Regular Espresso' ELSE 'Mint' END) ORDER BY 1, 2, 3, 4
