    sql: SELECT AVG(`Discount`) AS `avg_Discount_ok`,   `Customer State` AS `none_Customer_State_nk` FROM Staples GROUP BY `Customer State` HAVING ((AVG(`Discount`) >= 0.058200399999999416) AND (AVG(`Discount`) <= 0.058276600000000581)) ORDER BY 1, 2
    unordered: true
