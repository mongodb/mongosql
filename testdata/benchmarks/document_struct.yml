benchmarks:

- name: flat_filter
  query: select * from complex_docs where c >= 5 ;
  type: query

- name: flat_grouping
  query: select * from complex_docs group by c;
  type: query

- name: flat_ordering
  query: select * from complex_docs order by c;
  type: query

- name: nested_filter
  query: select * from complex_docs where `b.a` >= 5;
  type: query

- name: nested_grouping
  query: select * from complex_docs group by `b.a`;
  type: query

- name: nested_ordering
  query: select * from complex_docs order by `b.a`;
  type: query

- name: deeply_nested_filter
  query: select * from complex_docs where `a.b.c` >= 5;
  type: query

- name: deeply_nested_grouping
  query: select * from complex_docs group by `a.b.c`;
  type: query

- name: deeply_nested_ordering
  query: select * from complex_docs order by `a.b.c`;
  type: query

- name: nested_array_document_filter
  query: select * from complex_docs_d where `d.b` >= 5;
  type: query

- name: nested_array_document_grouping
  query: select * from complex_docs_d group by `d.b`;
  type: query

- name: nested_array_document_ordering
  query: select * from complex_docs_d order by `d.b`;
  type: query

- name: deeply_nested_array_document_filter
  query: select * from complex_docs_d_a where `d.a.b` >= 5;
  type: query

- name: deeply_nested_array_document_grouping
  query: select * from complex_docs_d_a group by `d.a.b`;
  type: query

- name: deeply_nested_array_document_ordering
  query: select * from complex_docs_d_a order by `d.a.b`;
  type: query
