benchmarks:

- name: single_column
  query: select * from foo order by a;
  type: query

- name: two_columns
  query: select * from foo order by a, b;
  type: query

- name: three_columns
  query: select * from foo order by a, b, c;
  type: query

- name: single_column_by_position
  query: select * from foo order by 2;
  type: query

- name: two_columns_by_position
  query: select * from foo order by 2, 3;
  type: query

- name: three_columns_by_position
  query: select * from foo order by 2, 3, 4;
  type: query

- name: random
  query: select * from foo order by RAND(13);
  type: query
