benchmarks:

- name: lpad
  query: select lpad(s, 20, '#') from strings
  type: query

- name: lpad_long
  query: select lpad(s, 2000, '#') from strings
  type: query

- name: lpad_many_column_args
  query: select lpad(s, 20, s) from strings
  type: query

- name: lpad_long_many_column_args
  query: select lpad(s, 2000, s) from strings
  type: query

- name: lpad_long_nested
  query: select lpad(s, 20000, lpad(s, 20, s)) from strings
  type: query

- name: count_million
  query: select count(*) from count;
  type: query

- name: count_hundred_thousand
  query: select count(*) from count;
  type: query

- name: count_thousand
  query: select count(*) from count;
  type: query

- name: complex_predicate_expr
  query: select * from items where rpad(lpad(a, 200, 'abc'), 500, 'def') = lpad(rpad(b, 200, 'def'), 500, 'abc')
  type: query
