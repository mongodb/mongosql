systemLog:
  verbosity: 4
net:
  bindIp: 127.0.0.1
  unixDomainSocket:
    enabled: false
    filePermissions: "0600"
mongodb:
  net:
    uri: "mongodb://localhost:27017"
processManagement:
  service:
    name: mongosql
    displayName: MongoSQL Service
    description: "MongoSQL accesses MongoDB data with SQL"
