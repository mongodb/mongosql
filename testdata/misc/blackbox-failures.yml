   - ["ALABAMA", 239.8100, 1998]
   - ["ALABAMA", 332.9800, 1999]
   - ["ALABAMA", 536.5500, 2002]
   - ["ALABAMA", 591.1400, 2001]
   - ["CALIFORNIA", 178.6800, 1999]
   - ["CALIFORNIA", 189.0900, 1997]
   - ["CALIFORNIA", 255.2600, 2000]
   - ["CALIFORNIA", 306.1200, 1998]
   - ["CALIFORNIA", 495.8700, 2001]
   - ["CALIFORNIA", 590.1200, 2002]
   - ["COLORADO", 105.5600, 2002]
   - ["COLORADO", 108.4700, 1999]
   - ["COLORADO", 169.2400, 2000]
   - ["COLORADO", 275.3700, 1997]
   - ["COLORADO", 324.6200, 1998]
