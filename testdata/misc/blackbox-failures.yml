
# 390.yml
testcases:
- sql: "SELECT {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{d '2004-07-04'})} AS \"z_dateadd_day\",   {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{d '2004-07-04'})} AS \"z_dateadd_dayofyear\",   {fn TIMESTAMPADD(SQL_TSI_HOUR,((10 * 365) * 24),{d '2004-07-04'})} AS \"z_dateadd_hour\",   {fn TIMESTAMPADD(SQL_TSI_MINUTE,(((10 * 365) * 24) * 60),{d '2004-07-04'})} AS \"z_dateadd_minute\",   {fn TIMESTAMPADD(SQL_TSI_MONTH,(10 * 12),{d '2004-07-04'})} AS \"z_dateadd_month\",   {fn TIMESTAMPADD(SQL_TSI_QUARTER,(10 * 4),{d '2004-07-04'})} AS \"z_dateadd_quarter\",   {fn TIMESTAMPADD(SQL_TSI_SECOND,((((10 * 365) * 24) * 60) * 60),{d '2004-07-04'})} AS \"z_dateadd_second\",   {fn TIMESTAMPADD(SQL_TSI_WEEK,(10 * 52),{d '2004-07-04'})} AS \"z_dateadd_week\",   {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{d '2004-07-04'})} AS \"z_dateadd_weekday\",   {fn TIMESTAMPADD(SQL_TSI_YEAR,10,{d '2004-07-04'})} AS \"z_dateadd_year\",   {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_day\",   {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_dayofyear\",   {fn TIMESTAMPADD(SQL_TSI_HOUR,((10 * 365) * 24),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_hour\",   {fn TIMESTAMPADD(SQL_TSI_MINUTE,(((10 * 365) * 24) * 60),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_minute\",   {fn TIMESTAMPADD(SQL_TSI_MONTH,(10 * 12),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_month\",   {fn TIMESTAMPADD(SQL_TSI_QUARTER,(10 * 4),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_quarter\",   {fn TIMESTAMPADD(SQL_TSI_SECOND,((((10 * 365) * 24) * 60) * 60),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_second\",   {fn TIMESTAMPADD(SQL_TSI_WEEK,(10 * 52),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_week\",   {fn TIMESTAMPADD(SQL_TSI_DAY,(10 * 365),{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_weekday\",   {fn TIMESTAMPADD(SQL_TSI_YEAR,10,{ts '2004-07-04 12:01:01'})} AS \"z_datetimeadd_year\" FROM Calcs HAVING (COUNT(1) > 0)"
  expected_names: ["z_dateadd_day", "z_dateadd_dayofyear", "z_dateadd_hour", "z_dateadd_minute", "z_dateadd_month", "z_dateadd_quarter", "z_dateadd_second", "z_dateadd_week", "z_dateadd_weekday", "z_dateadd_year", "z_datetimeadd_day", "z_datetimeadd_dayofyear", "z_datetimeadd_hour", "z_datetimeadd_minute", "z_datetimeadd_month", "z_datetimeadd_quarter", "z_datetimeadd_second", "z_datetimeadd_week", "z_datetimeadd_weekday", "z_datetimeadd_year"]
  expected_types: [varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar, varchar]
  expected:
  - ["2014-07-02", "2014-07-02", "2014-07-02 00:00:00", "2014-07-02 00:00:00", "2014-07-04", "2014-07-04", "2014-07-02 00:00:00", "2014-06-22", "2014-07-02", "2014-07-04", "2014-07-02 12:01:01", "2014-07-02 12:01:01", "2014-07-02 12:01:01", "2014-07-02 12:01:01", "2014-07-04 12:01:01", "2014-07-04 12:01:01", "2014-07-02 12:01:01", "2014-06-22 12:01:01", "2014-07-02 12:01:01", "2014-07-04 12:01:01"]

# 52.yml
testcases:
