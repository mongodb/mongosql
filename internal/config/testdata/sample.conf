systemLog:
  logAppend: true
  logRotate: "reopen"
  path: temp
  quiet: true
  verbosity: 2

schema:
  path: "/var/test"
  maxVarcharLength: 1000
  sample:
    mode: write
    source: sampleDb
    size: 969
    prejoin: true
    namespaces: ["foo.*", "*.bar"]
    refreshIntervalSecs: 983
    uuidSubtype3Encoding: java
    schemaMappingMode: majority

runtime:
  memory:
    maxPerServer: 2000000
    maxPerConnection: 1000000
    maxPerStage: 102400

net:
  bindIp: 192.168.20.1
  port: 3306
  unixDomainSocket:
    enabled: false
    pathPrefix: "/var"
    filePermissions: "0600"
  ssl:
    mode: requireSSL
    allowInvalidCertificates: true
    PEMKeyFile: "pemkeyfile"
    PEMKeyPassword: "pemkeypassword"
    CAFile: "cafile"
    minimumTLSVersion: "TLS1_0"

security:
  enabled: true
  defaultMechanism: "GSSAPI"
  defaultSource: "$external"
  gssapi:
    hostname: "something"
    serviceName: "awesome"

mongodb:
  versionCompatibility: "3.2"
  net:
    uri: "mongodb://hostname:27018"
    numConnectionsPerSession: 3
    auth:
      username: user
      password: pass
      source: adminer
      mechanism: SCRAM-SHA-256
      gssapiServiceName: "hola"
    ssl:
      enabled: true
      allowInvalidCertificates: true
      allowInvalidHostnames: true
      PEMKeyFile: "mongopemkeyfile"
      PEMKeyPassword: "mongopemkeypassword"
      CAFile: "mongocafile"
      CRLFile: "mongocrlfile"
      FIPSMode: true
      minimumTLSVersion: "TLS1_0"

metrics:
    stitchURL: "https://stitchapp.com/endpoint"

processManagement:
  service:
    name: oompa
    displayName: loompa
    description: doompa tee do

setParameter:
  enableTableAlterations: true
  metrics_backend: stitch
  optimize_cross_joins: false
  optimize_evaluations: false
  optimize_filtering: false
  optimize_inner_joins: false
  optimize_self_joins: false
  pushdown: false
  optimize_view_sampling: false
  polymorphic_type_conversion_mode: fast
  type_conversion_mode: mysql