schema:
- db: viewGeoDB
  tables:
  - table: base
    collection: base
    pipeline: []
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: objectid
    - Name: loc.coordinates.1
      MongoType: float64
      SqlName: loc.coordinates_latitude
      SqlType: numeric[]
    - Name: loc.coordinates.0
      MongoType: float64
      SqlName: loc.coordinates_longitude
      SqlType: numeric[]
    - Name: loc.type
      MongoType: string
      SqlName: loc.type
      SqlType: varchar
  - table: view
    collection: view
    pipeline: []
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: objectid
    - Name: loc.type
      MongoType: string
      SqlName: loc.type
      SqlType: varchar
  - table: view_loc_coordinates
    collection: view
    pipeline:
    - $unwind:
        includeArrayIndex: loc.coordinates_idx
        path: $loc.coordinates
        preserveNullAndEmptyArrays: false
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: objectid
    - Name: loc.coordinates
      MongoType: float64
      SqlName: loc.coordinates
      SqlType: float
    - Name: loc.coordinates_idx
      MongoType: int
      SqlName: loc.coordinates_idx
      SqlType: int
    - Name: loc.type
      MongoType: string
      SqlName: loc.type
      SqlType: varchar
