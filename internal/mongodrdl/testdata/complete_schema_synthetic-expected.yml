schema:
- db: syntheticQueryDB
  tables:
  - table: complete_schema
    collection: complete_schema
    pipeline: []
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: objectid
    - Name: __MONGOQUERY
      MongoType: mongo.Filter
      SqlName: __MONGOQUERY
      SqlType: varchar
    - Name: name
      MongoType: string
      SqlName: name
      SqlType: varchar
  - table: complete_schema_numbers
    collection: complete_schema
    pipeline:
    - $unwind:
        includeArrayIndex: numbers_idx
        path: $numbers
        preserveNullAndEmptyArrays: false
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: objectid
    - Name: __MONGOQUERY
      MongoType: mongo.Filter
      SqlName: __MONGOQUERY
      SqlType: varchar
    - Name: name
      MongoType: string
      SqlName: name
      SqlType: varchar
    - Name: numbers
      MongoType: int
      SqlName: numbers
      SqlType: int
    - Name: numbers_idx
      MongoType: int
      SqlName: numbers_idx
      SqlType: int
