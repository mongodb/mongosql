buildvariants:
- display_name: RHEL 7
  name: rhel7
  run_on:
  - rhel70
  tasks:
  - static-analysis
  - test

functions:
  export variables:
    - command: shell.exec
      type: system
      params:
        silent: true
        working_dir: src/github.com/10gen/mongoast
        script: |
          export GOROOT='/opt/golang/go1.11'
          export GOBINDIR="$GOROOT"/bin
          export PATH=$GOBINDIR:$PATH
          cat <<EOT > $(pwd)/expansions.yml
          PREPARE_SHELL: |
             export PATH="$PATH"
             export GOROOT="$GOROOT"
          EOT
    - command: expansions.update
      params:
        file: src/github.com/10gen/mongoast/expansions.yml

  fetch source:
    - command: shell.exec
      params:
        silent: true
        script: |
          rm -rf src && mkdir src
          git config --global url.git@github.com:.insteadOf https://github.com/
          git clone git@github.com:10gen/mongoast.git src/github.com/10gen/mongoast

  static-analysis:
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        curl -sfL https://install.goreleaser.com/github.com/golangci/golangci-lint.sh | sh -s -- -b /usr/local/bin "${GOLANGCI_LINT_VERSION}"
        go run build.go sa
      working_dir: src/github.com/10gen/mongoast

  test:
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        go run build.go test-unit -v
      working_dir: src/github.com/10gen/mongoast

tasks:
- name: static-analysis
  commands:
  - func: static-analysis

- name: test
  commands:
  - func: test

pre:
  - func: fetch source
  - func: export variables
