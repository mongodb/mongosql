    - integration
    - test
  exec_timeout_secs: 600 # 10 minutes
  commands:
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        var_test_gssapi: "true"
    - func: "run gssapi auth tests"

- name: gssapi-service-name-test
  tags:
    - oneoff-task
    - integration
    - test
  exec_timeout_secs: 600 # 10 minutes
  commands:
    - func: "run make"
      vars:
        var_target: "test-gssapi"

- name: jdbc-auth-test
  tags:
    - oneoff-task
    - integration
    - test
