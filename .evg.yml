buildvariants:

- matrix_name: full_matrix
  display_name: "${os_full_matrix} (${mongodb_version}) (${mongodb_topology})"
  tasks: [".test !.config !.oneoff-task !dynamic-schema"]
  matrix_spec:
    os_full_matrix: "*"
    mongodb_version: "*"
    mongodb_topology: "*"
  rules:
  - if:
      os_full_matrix: "*"
      mongodb_version: "latest"
      mongodb_topology: "standalone"
    then:
      add_tasks:
        - name: compile
        - name: dynamic-schema
        - name: sign
          run_on: linux-64-amzn-benchmark
      set:
        tags: ["packager"]
  - if:
      os_full_matrix: "*"
      mongodb_version: "!latest"
      mongodb_topology: "!standalone"
    then:
      remove_tasks:
        - unit-tests
        - .nopushdown

- matrix_name: single_variant
  display_name: "${os_single_variant}"
  tags: ["packager"]
  tasks:
    - ".test !.config !.oneoff-task"
    - name: compile
    - name: sign
      run_on: ["linux-64-amzn-benchmark"]
  matrix_spec:
    os_single_variant: "*"

- name: config-rhel62
  display_name: Config Tests (RHEL 6.2)
  expansions:
    _variant: rhel62
  run_on:
    - rhel62-test
  tasks:
    - ".test .config"

- name: jdbc-rhel62
  display_name: JDBC Auth RHEL 6.2
  expansions:
    _variant: rhel62
    _mongo_auth: true
    _client_auth: true
  run_on:
  - rhel62-test
  tasks:
  - "jdbc-auth-test"

- name: linux-64-amazon-ami-benchmarks
  display_name: Amazon Linux (Enterprise Benchmarks)
  expansions:
    _variant: amazon
    _mongo_ssl: true
  run_on:
    - linux-64-amzn-build
  batchtime: 1440 # 1 day
  tasks:
    - name: check
    - ".benchmark !.tpch"

- name: linux-64-amazon-ami-release
  batchtime: 1438560 # 999 days
  display_name: ~ Release Manager
  expansions:
    _variant: amazon
  run_on:
    - linux-64-amzn-benchmark
  tasks:
      - name: release

- name: linux-64-amazon-ami-tpch
  display_name: Amazon Linux (TPC-H Benchmarks)
  expansions:
    _variant: amazon
    _mongo_ssl: true
  run_on:
    - linux-64-amzn-benchmark
  batchtime: 1438560 # 999 days
  tasks:
    - ".tpch"
