stepback: true
command_type: system

functions:

  "build mongodrdl":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/build-mongodrdl.sh

  "build mongosqld":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/build-mongosqld.sh

  "check formatting":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/check-formatting.sh

  "check linting":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/check-lint.sh

  "check vet":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/check-vet.sh

  "create packages":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/create-packages.sh

  "download test data":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        export TPCH_DATASET="${var_tpch_dataset}"
        ${SCRIPT_DIR}/download-blackbox-data.sh
        ${SCRIPT_DIR}/download-tableau-data.sh
        ${SCRIPT_DIR}/download-tpch-data.sh

  "ensure schema available":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/ensure-schema-available.sh

  "export variables":
    - command: shell.exec
      params:
        silent: true
        working_dir: src/github.com/10gen/sqlproxy/testdata/bin
        script: |
          if [ "Windows_NT" = "$OS" ]; then
              set -o igncr
          fi

          export VARIANT='${_variant|other}'

          export CURRENT_VERSION="$(git describe)"
          if [ "${is_patch}" = "true" ]; then
             export CURRENT_VERSION="$CURRENT_VERSION-patch-${version_id}"
          fi

          export INFRASTRUCTURE_CONFIG=default

          if [ "${_mongodb_version}" != "" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/version/${_mongodb_version}"
          fi

          if [ "${_mongodb_topology}" != "" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/topology/${_mongodb_topology}"
          fi

          if [ "${_mongo_ssl}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/ssl/basic,sqlproxy/mongo-ssl/pem,sqlproxy/mongo-ssl/enabled"
          fi

          if [ "${_mongo_auth}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/auth"
          fi

          if [ "${_client_ssl}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/ssl/require,sqlproxy/ssl/pem"
          fi

          if [ "${_client_auth}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/auth"
          fi

          if [ "${_race_detector}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,race-detector"
          fi

          if [ "${_in_memory}" = "true" ]; then
              export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/in-memory"
          fi

          SCRIPT_DIR="$(pwd)"
          . "./platforms.sh"
          . "./prepare-shell.sh"

          BASE_GIT_SPEC="$(git rev-parse HEAD~1)"
          if [ "${is_patch}" != "" ]; then
              BASE_GIT_SPEC="$GIT_SPEC"
          fi

          # create expansions from values calculated above
          cat <<EOT > $PROJECT_DIR/expansions.yml
          CURRENT_VERSION: "$CURRENT_VERSION"
          GIT_SPEC: "$GIT_SPEC"
          BASE_GIT_SPEC: "$BASE_GIT_SPEC"
          PROJECT_DIR: "$PROJECT_DIR"
          SCRIPT_DIR: "$SCRIPT_DIR"
          PUSH_NAME: "$PUSH_NAME"
          PUSH_ARCH: "$PUSH_ARCH"
          ARCHIVE_FORMAT: "$ARCHIVE_FORMAT"
          ARCHIVE_CONTENT_TYPE: "$ARCHIVE_CONTENT_TYPE"
          PREPARE_SHELL: |
             if [ "Windows_NT" = "$OS" ]; then
                 set -o igncr
                 export SHELLOPTS
             fi

             export VARIANT="$VARIANT"
             export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG"

             cd $PROJECT_DIR
          EOT

    # Load the expansion file
    - command: expansions.update
      params:
        file: src/github.com/10gen/sqlproxy/expansions.yml

  "fetch packages":
    - command: s3.get
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        remote_file: sqlproxy/artifacts/${version_id}/${build_variant}/pkg/release-bundles.tgz
        extract_to: src/github.com/10gen/sqlproxy/testdata/artifacts/
        bucket: mciuploads

  "fetch source":
    - command: shell.exec
      params:
        silent: true
        script: |
          rm -rf src
          mkdir src
    - command: git.get_project
      params:
        directory: src/github.com/10gen/sqlproxy

  "generate reports":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/generate-reports.sh

  "install dependencies":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/install-dependencies.sh

  "process benchmark results":
    - command: shell.exec
      type: test
      params:
        script: |
            ${PREPARE_SHELL}
            export TYPE='${var_type}'
            ${SCRIPT_DIR}/parse-benchmark-results.sh
    - command: shell.exec
      type: test
      params:
        script: |
            ${PREPARE_SHELL}
            cp testdata/artifacts/out/benchmarks*.out testdata/artifacts/new.benchmark.txt
            if [ "${is_patch}" = "" ]; then
                cp testdata/artifacts/out/benchmarks*.out testdata/artifacts/${var_benchmark_set}.benchmark.txt
            fi
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/perf.json
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/perf.json
        bucket: mciuploads
        permissions: public-read
        content_type: application/json
        display_name: "Benchmark Results (perf.json)"
    - command: json.send
      params:
        name: perf
        file: src/github.com/10gen/sqlproxy/testdata/artifacts/perf.json
    - command: shell.exec
      type: test
      params:
        script: |
            ${PREPARE_SHELL}
            if [[ "${var_benchmark_set}" =~ ^overhead.* ]]; then
                echo "skipping benchstat analysis for overhead benchmark"
            else
                # download the benchmark results from the base commit for comparison.
                # If this is a commit, the base commit is the previous commit.
                # If this is a patch, the base commit is the merge base with master.
                export S3_URI="https://s3.amazonaws.com/mciuploads/sqlproxy/artifacts/${build_variant}/${BASE_GIT_SPEC}/${var_benchmark_set}.benchmark.txt"
                export OLD="testdata/artifacts/old.benchmark.txt"
                export NEW="testdata/artifacts/new.benchmark.txt"
                ${SCRIPT_DIR}/compare-benchmark-results.sh
            fi

  "release BI Connector":
    command: shell.exec
    params:
      evg_key: ${evg_key}
      evg_user: ${evg_user}
      release_aws_access_key_id: ${release_aws_access_key_id}
      release_aws_secret_access_key: ${release_aws_secret_access_key}
      working_dir: src/github.com/10gen/sqlproxy
      script: |
        set -o errexit
        export AWS_ACCESS_KEY_ID=${release_aws_access_key_id}
        export AWS_SECRET_ACCESS_KEY=${release_aws_secret_access_key}
        export EVG_USER=${evg_user}
        export EVG_KEY=${evg_key}
        set -o verbose
        cd release
        if [ "${is_patch}" = "true" ]; then
          echo "Can not release patch version: ${version_id}";
          exit 1;
        fi;
        echo "Commencing release on version '${version_id}'...";
        python release.py --version ${version_id}
    type: test

  "reset testing state":
    - command: shell.exec
      params:
        silent: true
        script: |
          ( ${killall_mci|true} ) > /dev/null 2>&1
    - command: shell.exec
      params:
        script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/reset-testing-state.sh
    - command: shell.exec
      params:
        silent: true
        script: |
          ${PREPARE_SHELL}
          mv ${PROJECT_DIR}/expansions.yml ${PROJECT_DIR}/testdata/artifacts > /dev/null 2>&1 || true

  "restore test data":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/restore-test-data.sh

  "run benchmarks":
    command: shell.exec
    type: test
    timeout_secs: 57600  # 16h
    params:
      script: |
        set -o errexit
        ${PREPARE_SHELL}
        export TYPE='${var_type}'
        ${SCRIPT_DIR}/run-benchmarks.sh

  "run gssapi auth tests":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/run-gssapi-auth-tests.sh

  "run integration tests":
    command: shell.exec
    type: test
    params:
      script: |
        set -o errexit
        ${PREPARE_SHELL}
        if [ "${var_nopushdown}" = "true" ]; then
            export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/nopushdown"
        fi
        export SUITE='${var_suite}'
        export NAMES='${var_names}'
        if [ "${var_parallel}" != "" ]; then
            export TEST_PARALLEL_FLAG='-parallel ${var_parallel}'
        fi
        ${SCRIPT_DIR}/run-integration-tests.sh
        # if we are on the race detector variant, check if races were detected
        [ -z "${_race_detector}" ] || ${SCRIPT_DIR}/check-races.sh

  "run jdbc auth plugin tests":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/run-jdbc-tests.sh

  "run make":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        make ${var_target}

  "run unit benchmarks":
    command: shell.exec
    type: test
    params:
      script: |
        set -o errexit
        ${PREPARE_SHELL}
        export PACKAGE='${var_package}'
        ${SCRIPT_DIR}/run-unit-benchmarks.sh

  "run unit tests":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/run-unit-tests.sh

  "sign msi installer":
    - command: shell.exec
      params:
        silent: true
        script: |
          echo "${signing_token_bi_connector}" > ${PROJECT_DIR}/signing_auth_token
    - command: shell.exec
      params:
        working_dir: src/github.com/10gen/sqlproxy/testdata/artifacts
        script: |
          /usr/local/bin/notary-client.py \
              --key-name "bi-connector" \
              --auth-token-file ${PROJECT_DIR}/signing_auth_token \
              --comment "Evergreen Automatic Signing (sqlproxy) - ${version_id} - ${build_variant}" \
              --notary-url http://notary-service.build.10gen.cc:5000 \
              --skip-missing \
              release.msi

  "start mongosqld":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        if [ "${var_nopushdown}" = "true" ]; then
            export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/nopushdown"
        fi
        if [ "${var_use_dynamic_schema}" = "true" ]; then
            # use clustered-write mode so that the benchmark harness can grab the schema directly from mongodb
            export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/schema/dynamic,sqlproxy/schema/clustered,sqlproxy/schema/write,sqlproxy/schema/enable-alter"
        fi
        if [ "${var_test_gssapi}" = "true" ]; then
            export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,sqlproxy/gssapi/test"
        fi
        ${SCRIPT_DIR}/start-mongosqld.sh

  "start mongo-orchestration":
    - command: shell.exec
      params:
        script: |
            ${PREPARE_SHELL}
            if [ "${var_version}" != "" ]; then
                export INFRASTRUCTURE_CONFIG="$INFRASTRUCTURE_CONFIG,mongo/version/${var_version}"
            fi
            ${SCRIPT_DIR}/start-orchestration.sh
    - command: expansions.update
      params:
        file: src/github.com/10gen/sqlproxy/testdata/artifacts/mo/mo-expansion.yml

  "upload artifacts":
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-coverage.txt
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-coverage.html
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/html
        bucket: mciuploads
        permissions: public-read
        display_name: "Coverage Report - "
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-suite.txt
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Test Suite Results - "
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/log/*.log*
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Log File - "
    - command: gotest.parse_files
      params:
        files:
          - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-suite.txt
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/artifacts.tar.gz
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/artifacts.tar.gz
        content_type: application/x-gzip
        bucket: mciuploads
        permissions: public-read
        display_name: "All Artifacts (.tar.gz)"
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
          - src/github.com/10gen/sqlproxy/testdata/artifacts/*-latest.benchmark.txt
        remote_file: sqlproxy/artifacts/${build_variant}/${GIT_SPEC}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Benchmark Results - "
    - command: s3.put
      params:
        optional: true
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/out/benchstat.out
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/benchstat.txt
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Benchstat Results"

  "upload binaries":
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/bin/mongosqld
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/mongosqld
        content_type: application/octet-stream
        bucket: mciuploads
        permissions: public-read
        display_name: mongosqld
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/bin/mongodrdl
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/mongodrdl
        content_type: application/octet-stream
        bucket: mciuploads
        permissions: public-read
        display_name: mongodrdl

  "upload packages":
    - command: archive.targz_pack
      params:
        target: src/github.com/10gen/sqlproxy/testdata/artifacts/upload.tgz
        source_dir: src/github.com/10gen/sqlproxy/testdata/artifacts/
        include:
          - "./release.*"
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/upload.tgz
        remote_file: sqlproxy/artifacts/${version_id}/${build_variant}/pkg/release-bundles.tgz
        content_type: application/x-gzip
        bucket: mciuploads
        permissions: public-read
        display_name: All Release Bundles (.tgz)

  "upload release packages":
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/release.${ARCHIVE_FORMAT}
        remote_file: sqlproxy/binaries/${PUSH_NAME}/mongodb-bi-${PUSH_NAME}-${PUSH_ARCH}-${CURRENT_VERSION}.${ARCHIVE_FORMAT}
        bucket: mciuploads
        permissions: public-read
        content_type: application/${ARCHIVE_CONTENT_TYPE}
        display_name: mongodb-bi-${PUSH_NAME}-${PUSH_ARCH}-${CURRENT_VERSION}.${ARCHIVE_FORMAT}
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/release-signed.msi
        remote_file: sqlproxy/binaries/${PUSH_NAME}/mongodb-bi-${PUSH_NAME}-${PUSH_ARCH}-${CURRENT_VERSION}.msi
        bucket: mciuploads
        permissions: public-read
        content_type: application/x-msi
        optional: true
        display_name: mongodb-bi-${PUSH_NAME}-${PUSH_ARCH}-${CURRENT_VERSION}.msi

variables:
  - &run-config-test
    # runs test-simple-connect.sh against a particular config.
    # the task name in evg should correspond to a make target.
    name: test
    commands:
      - func: "download test data"
      - func: "install dependencies"
      - func: "run make"
        vars:
          var_target: ${task_name}

pre:
  - command: shell.track
  - func: "fetch source"
  - func: "export variables"
  - func: "reset testing state"

post:
  - func: "generate reports"
  - func: "upload artifacts"
  - func: "reset testing state"

tasks:

- name: benchmark-evaluator
  tags: [ "benchmark" ]
  commands:
    - func: "run unit benchmarks"
      vars:
        var_package: evaluator
    - func: "process benchmark results"
      vars:
        var_type: unit
        var_benchmark_set: evaluator

- name: benchmark-tpch-micro
  tags: [ "benchmark" ]
  exec_timeout_secs: 14400  # 4h
  commands:
    - func: "download test data"
    - func: "start mongo-orchestration"
      vars:
        var_version: 3.6
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        var_use_dynamic_schema: true
    - func: "run benchmarks"
      vars:
        var_type: tpch-micro
    - func: "process benchmark results"
      vars:
        var_type: integration
        var_benchmark_set: tpch-micro

