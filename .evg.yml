- name: tpch-workbook-normalized
  tags:
    - oneoff-task
    - benchmark
    - tpch
  exec_timeout_secs: 86400 # 1 day
  commands:
    - func: "download tpch test data"
      vars:
        var_tpch_dataset: normalized
    - func: "start mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        var_suite: tpch
        var_benchmarks: workbook_normalized

- name: unit-tests
  tags: ["test"]
  commands:
    - func: "start mongo-orchestration"
    - func: "run unit tests"

