axes:

- id: os_full_matrix
  display_name: OS
  values:
  - id: ubuntu1404-64
    display_name: Ubuntu 14.04
    run_on:
    - ubuntu1404-build
    - ubuntu1404-test
    variables:
      _variant: ubuntu1404
  - id: osx
    display_name: OSX 10.12
    run_on: macos-1012
    variables:
      _variant: macos
  - id: windows
    display_name: Windows 64
    run_on:
    - windows-64-vs2013-test
    - windows-64-vs2013-compile
    variables:
      _variant: windows

- id: os_single_variant
  display_name: OS
  values:
  - id: debian71
    display_name: Debian 7.1
    run_on:
    - debian71-test
    - debian71-build
    variables:
      _variant: debian71
  - id: debian81
    display_name: Debian 8.1 (nightly)
    run_on:
    - debian81-test
    - debian81-build
    variables:
      _variant: debian81
  - id: linux-64-amazon-ami
    display_name: Amazon Linux (Enterprise)
    variables:
      _variant: amazon
    run_on:
    - linux-64-amzn-build
    - linux-64-amzn-test
  - id: rhel62
    display_name: RHEL 6.2
    variables:
      _variant: rhel62
    run_on:
    - rhel62-small
    - rhel62-test
    - rhel62-large
  - id: rhel70
    display_name: RHEL 7.0
    variables:
      _variant: rhel70
    run_on:
    - rhel70
    - rhel70-small
  - id: rhel-71-ppc64le
    display_name: RHEL 7.1 PPC64LE
    variables:
      _variant: ppc
    run_on:
    - rhel71-power8-build
    - rhel71-power8-test
    batchtime: 1440 # 1 day
  - id: rhel-72-s390x
    display_name: RHEL 7.2 s390x (nightly)
    variables:
      _variant: s390x
    run_on:
    - rhel72-zseries-build
    - rhel72-zseries-test
    batchtime: 1440 # 1 day
  - id: suse11-64
    display_name: SLES 11
    variables:
      _variant: suse11
    run_on:
    - suse11-test
    - suse11-build
  - id: suse12-64
    display_name: SLES 12
    variables:
      _variant: suse12
    run_on:
    - suse12-build
    - suse12-test

- id: mongodb_version
  display_name: MongoDB Version
  values:
  - id: latest
    display_name: MongoDB Latest
    variables:
      _mongodb_version: latest
  - id: 3.4
    display_name: MongoDB 3.4
    variables:
      _mongodb_version: 3.4
  - id: 3.2
    display_name: MongoDB 3.2
    variables:
      _mongodb_version: 3.2

- id: mongodb_topology
  display_name: Topology
  values:
  - id: standalone
    display_name: Standalone
    variables:
      _mongodb_topology: server
  - id: replica-set
    display_name: Replica Set
    variables:
      _mongodb_topology: replica-set
  - id: sharded-cluster
    display_name: Sharded Cluster
    variables:
      _mongodb_topology: sharded-cluster

buildvariants:

- matrix_name: full_matrix
  display_name: "${os_full_matrix} (${mongodb_version}) (${mongodb_topology})"
  tasks: [".test !.nopushdown !.config !.oneoff-task !dynamic-schema !unit-tests"]
  matrix_spec:
    os_full_matrix: "*"
    mongodb_version: "*"
    mongodb_topology: "*"
  rules:
  - if:
      os_full_matrix: "*"
      mongodb_version: "latest"
      mongodb_topology: "standalone"
    then:
      add_tasks:
        - .nopushdown
        - name: unit-tests
        - name: compile
        - name: dynamic-schema
        - name: sign
          run_on: linux-64-amzn-benchmark
      set:
        tags: ["packager"]

- matrix_name: single_variant
  display_name: "${os_single_variant}"
  tags: ["packager"]
  tasks:
    - ".test !.config !.oneoff-task"
    - name: compile
    - name: sign
      run_on: ["linux-64-amzn-benchmark"]
  matrix_spec:
    os_single_variant: "*"

- name: benchmark
  display_name: Benchmarks (CentOS 6)
  expansions:
    _variant: centos6-perf
    _in_memory: true
  run_on:
    - centos6-perf
  tasks:
    - '.benchmark !.tpch_full'

- name: benchmark-tpch-full
  display_name: TPCH Benchmarks (Full Dataset)
  batchtime: 43200  # 30 days
  expansions:
    _variant: centos6-perf
    _in_memory: true
  run_on:
    - centos6-perf
  tasks:
    - '.benchmark .tpch_full'

- matrix_name: config-tests
  display_name: "Configuration Parameter Tests (${os_full_matrix})"
  tasks:
    - ".test .config"
  matrix_spec:
    os_full_matrix: "*"
  rules:
  - if:
      os_full_matrix: "windows"
    then:
      remove_tasks: [".mongo-ssl"]

- name: race-detector
  display_name: Race Detector (Ubuntu 14.04)
  expansions:
    _variant: ubuntu1404
    _race_detector: true
  run_on:
  - ubuntu1404-build
  - ubuntu1404-test
  tasks:
    - ".test !.oneoff-task !unit-tests"

- name: jdbc-rhel62
  display_name: JDBC Auth RHEL 6.2
  expansions:
    _variant: rhel62
    _mongo_auth: true
    _client_auth: true
  run_on:
  - rhel62-test
  - rhel62-build
  - rhel62-large
  tasks:
  - "jdbc-auth-test"

- name: gssapi-rhel62
  display_name: GSSAPI Auth RHEL 6.2
  expansions:
    _variant: rhel62
    _mongo_auth: true
    _client_auth: true
  run_on:
  - rhel62-test
  - rhel62-build
  - rhel62-large
  tasks:
  - "gssapi-auth-test"
  - "gssapi-service-name-test"

- name: gssapi-ubuntu1404
  display_name: GSSAPI Auth Ubuntu 14.04
  expansions:
    _variant: ubuntu1404
    _mongo_auth: true
    _client_auth: true
  run_on:
  - ubuntu1404-build
  - ubuntu1404-test
  tasks:
  - "gssapi-auth-test"
  - "gssapi-service-name-test"


- name: code-quality
  display_name: Code Quality (Amazon Linux)
  expansions:
    _variant: amazon
  run_on:
  - linux-64-amzn-build
  tasks:
    - name: ".code-quality"

- name: linux-64-amazon-ami-release
  display_name: ~ Release Manager
  expansions:
    _variant: amazon
  run_on:
  - linux-64-amzn-benchmark
  tasks:
  - name: release
