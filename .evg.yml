stepback: true
command_type: system
buildvariants:

- matrix_name: full_matrix
  display_name: "${os_full_matrix} (${mongodb_version}) (${mongodb_topology})"
  tasks: ["!.oneoff-task !check"]
  matrix_spec:
    os_full_matrix: "*"
    mongodb_version: "*"
    mongodb_topology: "*"
  rules:
  - if:
      mongodb_version: "latest"
      mongodb_topology: "standalone"
    then:
      add_tasks: ["check"]
  - if:
      mongodb_version: "latest"
      mongodb_topology: "standalone"
    then:
      remove_tasks: ["dist"]

- matrix_name: single_variant
  display_name: "${os_single_variant}"
  tasks: ["!.oneoff-task"]
  matrix_spec:
    os_single_variant: "*"

- name: linux-64-amazon-ami-benchmarks
  display_name: Amazon Linux (Enterprise Benchmarks)
  expansions:
    mongo_ssl: true
    push_arch: x86_64-enterprise-amzn64
    push_name: linux
  run_on:
    - linux-64-amzn-build
  batchtime: 1440 # 1 day
  tasks:
  - "check"
  - "benchmark"
  - "tpch_micro"

- name: linux-64-amazon-ami-tpch
  display_name: Amazon Linux (TPC-H Benchmarks)
  expansions:
    mongo_ssl: true
    push_arch: x86_64-enterprise-amzn64
    push_name: linux
  run_on:
    - linux-64-amzn-benchmark
  batchtime: 1438560 # 999 days
  tasks:
  - "tpch_handwritten_denormalized"
  - "tpch_workbook_denormalized"
  - "tpch_workbook_normalized"

- name: ubuntu1404-64-race
  disabled: true
  display_name: Ubuntu 14.04 (Race Detector)
  expansions:
    push_arch: x86_64-ubuntu1404
    push_name: linux
    race_detector: true
  run_on:
  - ubuntu1404-build
  tasks:
  - "!.oneoff-task !dist"

- name: linux-64-amazon-ami-release
  batchtime: 2147483647 # max signed int32 (2^31 - 1)
  display_name: ~ Release Manager
  run_on:
  - linux-64-amzn-benchmark
  tasks:
  - "release"

- name: jdbc-rhel62
  display_name: JDBC Auth RHEL 6.2
  expansions:
    mongo_auth: true
    goroot: /opt/go
    gobindir: /opt/go/bin
  run_on:
  - rhel62-test
  tasks:
  - "jdbc-auth-test"

pre:
  - command: shell.track
  - func: "fetch source"
  - func: "export variables"
  - func: "reset testing state"

post:
  - func: "generate reports"
  - func: "upload artifacts"
  - func: "reset testing state"
  - command: shell.cleanup

functions:

  "check formatting":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/check-formatting.sh

  "build mongodrdl":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/build-mongodrdl.sh

  "build mongosqld":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/build-mongosqld.sh

  "create release":
    command: shell.exec
    type: test
    params:
      script: |
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/create-release.sh

  "download blackbox test data":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/download-blackbox-data.sh

  "download tpch test data":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        export TPCH_DATASET="${tpch_dataset}"
        ${SCRIPT_DIR}/download-tpch-data.sh

  "bootstrap mongo-orchestration":
    - command: shell.exec
      params:
        script: |
            ${PREPARE_SHELL}
            ${SCRIPT_DIR}/start-orchestration.sh
    - command: expansions.update
      params:
        file: src/github.com/10gen/sqlproxy/testdata/artifacts/orchestration/mo-expansion.yml

  "download tableau test data":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/download-tableau-data.sh

  "fetch source":
    - command: shell.exec
      params:
        silent: true
        script: |
          rm -rf src
          mkdir src
    - command: git.get_project
      params:
        directory: src/github.com/10gen/sqlproxy
    - command: git.apply_patch
      type: test
      params:
        directory: src/github.com/10gen/sqlproxy

  "export variables":
    - command: shell.exec
      params:
        silent: true
        working_dir: src/github.com/10gen/sqlproxy
        script: |
          if [ "Windows_NT" = "$OS" ]; then
              set -o igncr
          fi

          export PROJECT_DIR="$(pwd)"
          export SCRIPT_DIR="$PROJECT_DIR/testdata/bin"

          export CURRENT_VERSION="$(git describe)"
          if [ "${is_patch}" = "true" ]; then
             export CURRENT_VERSION="$CURRENT_VERSION-patch-${version_id}"
          fi
          export GIT_SPEC="$(git rev-parse HEAD)"

          export PUSH_ARCH="${push_arch}"
          export PUSH_NAME="${push_name}"

          if [ "${library_path}" != "" ]; then
              export PATH="${library_path}:$PATH"
          fi

          export GOPATH="$(dirname $(dirname $(dirname $(dirname $(pwd)))))"
          if [ "Windows_NT" = "$OS" ]; then
             export GOPATH="$(cygpath -m $GOPATH)"
          fi
          export GOROOT="${goroot|$GOROOT}"

          if [ "${gobindir}" != "" ]; then
              export PATH="${gobindir}:$PATH"
          fi

          export ON_EVERGREEN=true

          export PROJECT_DIR="$(pwd)"
          if [ "Windows_NT" = "$OS" ]; then
             export PROJECT_DIR="$(cygpath -m $PROJECT_DIR)"
          fi

          if [ "${race_detector}" = "true" ]; then
              export RACE_DETECTOR="-race"
          fi

          if [ '${cc}' != "" ]; then
              export CC="${cc}"
          fi

          if [ "${mongodb_version}" != "" ]; then
              export VERSION_FLAG="-serverVersion ${mongodb_version}"
          fi

          if [ "${mongo_ssl}" = "true" ]; then
              export SSL="ssl"
          fi

          if [ "${mongo_auth}" = "true" ]; then
              export AUTH="auth"
          fi

          export TOPOLOGY="${mongodb_topology}"
          export STORAGE_ENGINE="${STORAGE_ENGINE}"
          export MONGODB_VERSION="${mongodb_version}"

          # create expansions from values calculated above
          cat <<EOT > $PROJECT_DIR/expansions.yml
          CURRENT_VERSION: "$CURRENT_VERSION"
          PROJECT_DIR: "$PROJECT_DIR"
          SCRIPT_DIR: "$SCRIPT_DIR"
          PREPARE_SHELL: |
             if [ "Windows_NT" = "$OS" ]; then
                 set -o igncr
                 export SHELLOPTS
             fi

             export PROJECT_DIR="$PROJECT_DIR"

             # system env variables
             export GOROOT="$GOROOT"
             export GOPATH="$GOPATH"
             export PATH="$PATH"

             export PUSH_ARCH="$PUSH_NAME"
             export PUSH_NAME="$PUSH_ARCH"

             # env variables to be used by scripts
             export ON_EVERGREEN="$ON_EVERGREEN"
             export CURRENT_VERSION="$CURRENT_VERSION"
             export GIT_SPEC="$GIT_SPEC"

             export CC="$CC"
             export BUILD_FLAGS="$BUILD_FLAGS"

             export VERSION_FLAG="$VERSION_FLAG"

             export RACE_DETECTOR="$RACE_DETECTOR"

             export AUTH="$AUTH"
             export SSL="$SSL"
             export TOPOLOGY="$TOPOLOGY"
             export STORAGE_ENGINE="$STORAGE_ENGINE"
             export MONGODB_VERSION="$MONGODB_VERSION"

             export JAVA_HOME="/opt/java/jdk8"
          EOT

    # Load the expansion file
    - command: expansions.update
      params:
        file: src/github.com/10gen/sqlproxy/expansions.yml

  "reset testing state":
    - command: shell.exec
      params:
        silent: true
        script: |
          ${killall_mci}
    - command: shell.exec
      params:
        script: |
          ${killall_mci}
          ${PREPARE_SHELL}
          ${SCRIPT_DIR}/reset-testing-state.sh
    - command: shell.exec
      params:
        silent: true
        script: |
          ${PREPARE_SHELL}
          mv ${PROJECT_DIR}/expansions.yml ${PROJECT_DIR}/testdata/artifacts

  "generate reports":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/generate-reports.sh

  "release BI Connector":
    command: shell.exec
    params:
      evg_key: ${evg_key}
      evg_user: ${evg_user}
      release_aws_access_key_id: ${release_aws_access_key_id}
      release_aws_secret_access_key: ${release_aws_secret_access_key}
      working_dir: src/github.com/10gen/sqlproxy
      script: |
        set -o errexit
        export AWS_ACCESS_KEY_ID=${release_aws_access_key_id}
        export AWS_SECRET_ACCESS_KEY=${release_aws_secret_access_key}
        export EVG_USER=${evg_user}
        export EVG_KEY=${evg_key}
        set -o verbose
        cd release
        if [ "${is_patch}" = "true" ]; then
          echo "Can not release patch version: ${version_id}";
          exit 1;
        fi;
        echo "Commencing release on version '${version_id}'...";
        python release.py --version ${version_id}
    type: test

  "start mongosqld":
    command: shell.exec
    params:
      background: true
      script: |
        ${PREPARE_SHELL}
        export SQLPROXY_PUSHDOWN_OFF="${nopushdown}"
        ${SCRIPT_DIR}/start-mongosqld.sh

  "upload artifacts":
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-coverage.txt
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-coverage.html
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/html
        bucket: mciuploads
        permissions: public-read
        display_name: "Coverage Report - "
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-benchmarks.txt
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Benchmark Report - "
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-suite.txt
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Test Suite Results - "
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_files_include_filter:
            - src/github.com/10gen/sqlproxy/testdata/artifacts/log/*.log
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/
        content_type: text/plain
        bucket: mciuploads
        permissions: public-read
        display_name: "Log File - "
    - command: gotest.parse_files
      params:
        files:
          - src/github.com/10gen/sqlproxy/testdata/artifacts/reports/*-suite.txt
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/artifacts.tar.gz
        remote_file: sqlproxy/artifacts/${build_variant}/${task_id}/artifacts.tar.gz
        content_type: application/x-gzip
        bucket: mciuploads
        permissions: public-read
        display_name: "All Artifacts (.tar.gz)"

  "upload release":
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/release.${archive_format|tgz}
        remote_file: sqlproxy/binaries/${push_name}/mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.${archive_format|tgz}
        bucket: mciuploads
        permissions: public-read
        content_type: application/x-gzip
        display_name: mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.${archive_format|tgz}
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/release.msi
        remote_file: sqlproxy/binaries/${push_name}/mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.msi
        bucket: mciuploads
        permissions: public-read
        content_type: application/x-msi
        optional: true
        display_name: mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.msi
    - command: s3.put
      params:
        aws_key: ${aws_key}
        aws_secret: ${aws_secret}
        local_file: src/github.com/10gen/sqlproxy/testdata/artifacts/release.wixpdb
        remote_file: sqlproxy/binaries/${push_name}/mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.wixpdb
        bucket: mciuploads
        permissions: public-read
        content_type: application/octet-stream
        optional: true
        display_name: mongodb-bi-${push_name}-${push_arch}-${CURRENT_VERSION}.wixpdb

  "run integration tests":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        set -o errexit
        export SQLPROXY_PUSHDOWN_OFF='${nopushdown}'
        export SUITE='${suite}'
        ${SCRIPT_DIR}/generate-tests.sh
        ${SCRIPT_DIR}/run-integration-tests.sh

  "run benchmarks":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        set -o errexit
        export SUITE='${suite}'
        export BENCHMARKS='${benchmarks}'
        ${SCRIPT_DIR}/generate-tests.sh
        ${SCRIPT_DIR}/run-benchmarks.sh

  "run unit tests":
    command: shell.exec
    type: test
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/run-unit-tests.sh

  "run jdbc auth plugin tests":
    command: shell.exec
    params:
      script: |
        ${PREPARE_SHELL}
        ${SCRIPT_DIR}/run-jdbc-tests.sh

tasks:

- name: unit_tests
  commands:
    - func: "bootstrap mongo-orchestration"
    - func: "run unit tests"

- name: benchmark
  tags: ["oneoff-task"]
  commands:
    - func: "download blackbox test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        suite: blackbox,integration,tableau

- name: blackbox
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "download blackbox test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        suite: blackbox

- name: blackbox-nopushdown
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "download blackbox test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        nopushdown: true
    - func: "run integration tests"
      vars:
        suite: blackbox
        nopushdown: true

- name: check
  commands:
    - func: "check formatting"

- name: dist
  commands:
    - func: "build mongosqld"
    - func: "build mongodrdl"
    - func: "create release"
    - func: "upload release"

- name: release
  tags: ["oneoff-task"]
  commands:
    - func: "release BI Connector"

- name: sqlproxy
  commands:
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        suite: integration

- name: sqlproxy-nopushdown
  commands:
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        nopushdown: true
    - func: "run integration tests"
      vars:
        suite: integration
        nopushdown: true

- name: tableau
  commands:
    - func: "download tableau test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        suite: tableau

- name: tdvt
  commands:
    - func: "download blackbox test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        suite: tdvt

- name: tdvt-nopushdown
  commands:
    - func: "download blackbox test data"
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        nopushdown: true
    - func: "run integration tests"
      vars:
        suite: tdvt
        nopushdown: true

- name: tpch_handwritten_denormalized
  tags: ["oneoff-task"]
  exec_timeout_secs: 86400 # 1 day
  commands:
    - func: "download tpch test data"
      vars:
        tpch_dataset: denormalized
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        suite: tpch
        benchmarks: handwritten_denormalized

- name: tpch_workbook_denormalized
  tags: ["oneoff-task"]
  exec_timeout_secs: 86400 # 1 day
  commands:
    - func: "download tpch test data"
      vars:
        tpch_dataset: denormalized
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        suite: tpch
        benchmarks: workbook_denormalized

- name: tpch_workbook_normalized
  tags: ["oneoff-task"]
  exec_timeout_secs: 86400 # 1 day
  commands:
    - func: "download tpch test data"
      vars:
        tpch_dataset: normalized
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        suite: tpch
        benchmarks: workbook_normalized

- name: tpch_micro
  tags: ["oneoff-task"]
  exec_timeout_secs: 86400 # 1 day
  commands:
    - func: "download tpch test data"
      vars:
        tpch_dataset: micro
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run benchmarks"
      vars:
        suite: tpch

- name: jdbc-auth-test
  tags: ["oneoff-task"]
  exec_timeout_secs: 600 # 10 minutes
  commands:
    - func: "bootstrap mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run jdbc auth plugin tests"

axes:

- id: os_full_matrix
  display_name: OS
  values:
  - id: ubuntu1404-64
    display_name: Ubuntu 14.04
    run_on: ubuntu1404-build
    variables:
      push_arch: x86_64-ubuntu1404
      push_name: linux
  - id: osx
    display_name: OSX 10.12
    run_on: macos-1012
    variables:
      push_arch: x86_64
      push_name: osx
  - id: windows
    display_name: Windows 64
    run_on: windows-64-vs2013-test
    variables:
      archive_format: zip
      library_path: /cygdrive/c/mingw-w64/x86_64-4.9.1-posix-seh-rt_v3-rev1/mingw64/bin:/cygdrive/c/sasl/
      push_arch: x86_64
      push_name: win32
      separator: \\

- id: os_single_variant
  display_name: OS
  values:
  - id: debian71
    display_name: Debian 7.1
    run_on: debian71-test
    variables:
      goroot: /opt/go
      gobindir: /opt/go/bin
      push_arch: x86_64-debian71
      push_name: linux
  - id: debian81
    display_name: Debian 8.1 (nightly)
    run_on: debian81-test
    variables:
      goroot: /opt/go
      gobindir: /opt/go/bin
      push_arch: x86_64-debian81
      push_name: linux
  - id: linux-64-amazon-ami
    display_name: Amazon Linux (Enterprise)
    variables:
      mongo_ssl: true
      push_arch: x86_64-enterprise-amzn64
      push_name: linux
    run_on: linux-64-amzn-build
  - id: rhel62
    display_name: RHEL 6.2
    variables:
      goroot: /opt/go
      gobindir: /opt/go/bin
      push_arch: x86_64-rhel62
      push_name: linux
    run_on: rhel62-test
  - id: rhel70
    display_name: RHEL 7.0
    variables:
      goroot: /opt/go
      gobindir: /opt/go/bin
      push_arch: x86_64-rhel70
      push_name: linux
    run_on: rhel70
  - id: rhel-71-ppc64le
    display_name: RHEL 7.1 PPC64LE
    variables:
      mongo_ssl: true
      library_path: /opt/mongodbtoolchain/v2/bin/
      push_arch: ppc64le-rhel71
      push_name: linux
      goroot: /opt/go1.8/go
      gobindir: /opt/go1.8/go/bin
    run_on: rhel71-power8-test
    batchtime: 1440 # 1 day
  - id: rhel-72-s390x
    display_name: RHEL 7.2 s390x (nightly)
    disabled: true
    variables:
      mongo_ssl: true
      library_path: /opt/mongodbtoolchain/v2/bin/
      push_arch: s390x-enterprise-rhel72
      push_name: linux
      goroot: /opt/go1.8/go
      gobindir: /opt/go1.8/go/bin
      cc: s390x-redhat-linux-gcc
    run_on:
    - rhel72-zseries-build
    - rhel72-zseries-test
    batchtime: 1440 # 1 day
  - id: suse11-64
    display_name: SLES 11
    variables:
      push_arch: x86_64-suse11
      push_name: linux
    run_on: suse11-test
  - id: suse12-64
    display_name: SLES 12
    variables:
      push_arch: x86_64-suse12
      push_name: linux
    run_on: suse12-test

- id: mongodb_version
  display_name: MongoDB Version
  values:
  - id: latest
    display_name: MongoDB Latest
    variables:
      mongodb_version: ""
  - id: 3.4
    display_name: MongoDB 3.4
    variables:
      mongodb_version: 3.4
  - id: 3.2
    display_name: MongoDB 3.2
    variables:
      mongodb_version: 3.2

- id: mongodb_topology
  display_name: Topology
  values:
  - id: standalone
    display_name: Standalone
    variables:
      mongodb_topology: server
  - id: replica_set
    display_name: Replica Set
    variables:
      mongodb_topology: replica_set
  - id: sharded_cluster
    display_name: Sharded Cluster
    variables:
      mongodb_topology: sharded_cluster
