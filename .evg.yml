buildvariants:

- matrix_name: full_matrix
  display_name: "${os_full_matrix} (${mongodb_version}) (${mongodb_topology})"
  tasks: [".test !.nopushdown !.config !.oneoff-task !module-tests"]
  matrix_spec:
    os_full_matrix: "*"
    mongodb_version: "*"
    mongodb_topology: "*"
  exclude_spec:
  - os_full_matrix: ["osx", "ubuntu1404-64"]
    mongodb_version: ["3.2", "3.4", "3.6", "4.0"]
    mongodb_topology: ["standalone", "replica-set", "sharded-cluster"]
  - os_full_matrix: ["osx", "ubuntu1404-64"]
    mongodb_version: "latest"
    mongodb_topology: ["replica-set", "sharded-cluster"]
  - os_full_matrix: "ubuntu1604-64"
    mongodb_version: "*"
    mongodb_topology: "*"
  rules:
  - if:
      os_full_matrix: "*"
      mongodb_version: "latest"
      mongodb_topology: "standalone"
    then:
      add_tasks:
        - .nopushdown
        - name: module-tests
        - name: compile
        - name: sign
          run_on: amazon1-2018-test
      set:
        tags: ["packager"]

- matrix_name: single_variant
  display_name: "${os_single_variant}"
  tags: ["packager"]
  tasks:
    - ".test !.config !.oneoff-task"
    - name: compile
    - name: sign
      run_on: amazon1-2018-test
  matrix_spec:
    os_single_variant: "*"

- name: benchmark
  display_name: Benchmarks (CentOS 6)
  expansions:
    _variant: centos6-perf
    _in_memory: true
  run_on:
    - centos6-perf
  tasks:
    - '.benchmark !.tpch_full'

- name: benchmark-tpch-full
  display_name: TPCH Benchmarks (Full Dataset)
  batchtime: 43200  # 30 days
  expansions:
    _variant: centos6-perf
    _in_memory: true
  run_on:
    - centos6-perf
  tasks:
    - '.benchmark .tpch_full'

# We are disabling .tls tests on Windows because currently there
# is no built version of openssl that supports mysql with starttls.
# We are disabling .mongo-tls on OS X because default openssl version
# is 0.98 and that does not support TLS 1.1 or TLS 1.2 (needed for tests)
# and we currently have no way to point to a specific version of openssl
# to compile mongosqld with.
- matrix_name: config-tests
  display_name: "End-to-End Tests (${os_full_matrix})"
  tasks:
    - ".test .config !.gssapi"
  matrix_spec:
    os_full_matrix: "*"
  exclude_spec:
  - os_full_matrix: "ubuntu1404-64"
  rules:
  - if:
      os_full_matrix:
      - "windows"
    then:
      remove_tasks: [".tls", ".skip-windows"]
  - if:
      os_full_matrix:
      - "osx"
    then:
      remove_tasks: [".mongo-tls", "test-kill-queries-sharded", "test-kill-queries-replica-set"]

- name: race-detector
  display_name: Race Detector (RHEL 7.0)
  expansions:
    _variant: rhel70
    _race_detector: true
  run_on:
  - rhel70
  tasks:
    - ".test !.gssapi !.oneoff-task !module-tests"

- name: dependencies
  display_name: Inter-project Dependencies
  expansions:
    _variant: rhel62
    _mongo_auth: true
    _client_auth: true
  run_on:
  - rhel62-small
  tasks:
  - jdbc-auth-scram1
  - jdbc-auth-scram256

# We are excluding test-gssapi-with-keytab-and-username because RHEL currently does not pick up
# keytabs specified in environment variables.
- name: gssapi-rhel70
  display_name: GSSAPI Auth RHEL 7.0
  expansions:
    _variant: rhel70
  run_on:
  - rhel70
  tasks:
    - ".test .config .gssapi !test-gssapi-with-keytab-and-username"

- name: gssapi-ubuntu1604
  display_name: GSSAPI Auth Ubuntu 16.04
  expansions:
    _variant: ubuntu1604
  run_on:
  - ubuntu1604-test
  tasks:
    - ".test .config .gssapi"

- name: gssapi-macos
  display_name: GSSAPI Auth macOS 10.12
  expansions:
    _variant: macos
  run_on: macos-1012
  tasks:
    - ".test .config .gssapi !.gssapi-skip-macos"

- name: sspi-windows
  display_name: GSSAPI Auth Windows 64 (SSPI)
  expansions:
    _variant: windows
  run_on: windows-64-vs2013-test
  tasks:
    - ".test .config .gssapi !.skip-windows"

- name: code-quality
  display_name: Code Quality (Amazon Linux)
  expansions:
    _variant: amazon
  run_on:
  - amazon1-2018-test
  tasks:
    - name: ".code-quality"

