- name: blackbox
  tags:
    - integration
    - test
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "start mongodb"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        var_suite: blackbox

- name: blackbox-nopushdown
  tags:
    - integration
    - test
    - nopushdown
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "start mongodb"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        var_nopushdown: true
    - func: "run integration tests"
      vars:
        var_suite: blackbox
        var_nopushdown: true
        # turn down parallelism to avoid oom when running with race detection enabled
        var_parallel: "2"

- name: compile
  depends_on:
    - name: module-tests
    - name: ".test .integration !.oneoff-task"
  commands:
    - func: "build mongosqld"
    - func: "build mongodrdl"
    - func: "build mongotranslate"
    - func: "upload binaries"
    - func: "create packages"
    - func: "upload packages"

- name: sourcelint
  tags:
    - oneoff-task
    - code-quality
  commands:
    - func: "check source lint"

- name: yamllint
  tags:
    - oneoff-task
    - code-quality
  commands:
    - func: "check yamllint"

- name: jdbc-auth-scram1
  tags:
    - oneoff-task
    - integration
    - test
  exec_timeout_secs: 600 # 10 minutes
  commands:
    - func: "run make"
      vars:
        var_target: "test-jdbc-auth-scram1"

