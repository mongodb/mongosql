        var_target: "test-jdbc-auth-scram256"

- name: release
  depends_on:
  - name: sign
    variant: '.packager'
  commands:
    - func: "release BI Connector"

- name: sign
  depends_on:
    - name: compile
  commands:
    - func: "fetch packages"
    - func: "sign msi installer"
    - func: "upload release packages"

