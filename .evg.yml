        var_use_dynamic_schema: true
    - func: "run benchmarks"
      vars:
        var_type: queries
    - func: "process benchmark results"
      vars:
        var_type: integration
        var_benchmark_set: queries-3.2

- name: blackbox
  tags:
    - integration
    - test
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "download test data"
    - func: "start mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
    - func: "run integration tests"
      vars:
        var_suite: blackbox

- name: blackbox-nopushdown
  tags:
    - integration
    - test
    - nopushdown
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "download test data"
    - func: "start mongo-orchestration"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        var_nopushdown: true
    - func: "run integration tests"
      vars:
        var_suite: blackbox
        var_nopushdown: true
        # turn down parallelism to avoid oom when running with race detection enabled
        var_parallel: "2"

- name: compile
  depends_on:
    - name: unit-tests
    - name: ".test .integration !.oneoff-task"
  commands:
    - func: "build mongosqld"
    - func: "build mongodrdl"
    - func: "upload binaries"
    - func: "create packages"
    - func: "upload packages"

- name: dynamic-schema
  tags:
    - integration
    - test
  exec_timeout_secs: 14400 # 4h
  commands:
    - func: "start mongo-orchestration"
    - func: "download test data"
    - func: "restore test data"
    - func: "build mongosqld"
    - func: "start mongosqld"
      vars:
        var_use_dynamic_schema: "true"
    - func: "ensure schema available"
    - func: "run integration tests"
      vars:
        var_suite: blackbox
        var_names: "^2$"

- name: gofmt
