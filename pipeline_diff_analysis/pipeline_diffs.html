<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pipeline Diffs – index_usage_filter</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 1200px; margin: 2rem auto; padding: 0 1rem; color: #24292e; font-size: .875rem; }
h2 { font-size: 1.1rem; margin-bottom: .25rem; }
.note { color: #57606a; font-size: .8rem; margin-bottom: 1rem; line-height: 1.6; }
.tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid #e1e4e8; }
.tab { padding: .4rem .9rem; border: 1px solid transparent; border-bottom: none; border-radius: 4px 4px 0 0; cursor: pointer; font-size: .8rem; background: none; margin-bottom: -1px; color: #57606a; }
.tab.active { background: #fff; border-color: #e1e4e8; color: #24292e; font-weight: 600; }
.view { display: none; }
.view.active { display: block; }
.query { border: 1px solid #e1e4e8; border-radius: 6px; overflow: hidden; margin-bottom: 2rem; }
.qhead { background: #f6f8fa; padding: .75rem 1rem; border-bottom: 1px solid #e1e4e8; }
.qsql { font-family: monospace; color: #586069; font-size: .8rem; margin-top: .2rem; }
.cols { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #e1e4e8; }
.ch { padding: .4rem 1rem; font-weight: 600; color: #57606a; font-size: .75rem; background: #f6f8fa; }
.ch:first-child { border-right: 1px solid #e1e4e8; }
.row { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #eaecef; }
.cell { padding: .65rem 1rem; }
.cell:first-child { border-right: 1px solid #eaecef; }
.empty { background: #fafbfc; }
.op { font-weight: 700; font-size: .8rem; margin-bottom: .3rem; font-family: monospace; }
.plain-body { display: grid; grid-template-columns: 1fr 1fr; }
.plain-col { padding: .75rem 1rem; }
.plain-col:first-child { border-right: 1px solid #eaecef; }
pre { margin: 0; font-size: .7rem; font-family: "SFMono-Regular", Consolas, monospace; white-space: pre-wrap; }
</style>
</head>
<body>
<h2>Pipeline Diffs: <code>main</code> → <code>jp/match-language-not</code></h2>
<p class="note">
  DB: <code>index_usage_filter</code> &nbsp;·&nbsp; Expected utilization: <code>IX_SCAN</code> for all three queries.
</p>
<div class="tabs">
  <button class="tab active" onclick="switchTab('diff', this)">Diff</button>
  <button class="tab" onclick="switchTab('plain', this)">Plain Text</button>
</div>
<div id="diff-view" class="view active"></div>
<div id="plain-view" class="view"></div>
<script>
function switchTab(id, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(id + '-view').classList.add('active');
}

const queries = [
  {
    desc: "Unwound collection with filter on array field uses index",
    sql:  "SELECT * FROM UNWIND(arrays WITH PATH => v) WHERE v = 6",
    main: [
      { "$match":   { "v": { "$elemMatch": { "$eq": 6 } } } },
      { "$project": { "arrays": "$$ROOT", "_id": 0 } },
      { "$unwind":  { "path": "$arrays.v" } },
      { "$match":   { "$expr": { "$eq": ["$arrays.v", { "$literal": 6 }] } } }
    ],
    branch: [
      { "$project": { "arrays": "$$ROOT", "_id": 0 } },
      { "$unwind":  { "path": "$arrays.v" } },
      { "$match":   { "arrays.v": { "$eq": 6 } } }
    ]
  },
  {
    desc: "Optimizer correctly runs to fixed point",
    sql:  "SELECT * FROM FLATTEN(UNWIND(arrays WITH PATH => v)) WHERE _id = 1",
    main: [
      { "$match":   { "$expr": { "$eq": ["$_id", { "$literal": 1 }] } } },
      { "$project": { "arrays": "$$ROOT", "_id": 0 } },
      { "$unwind":  { "path": "$arrays.v" } },
      { "$project": { "arrays": { "_id": "$arrays._id", "v": "$arrays.v" }, "_id": 0 } }
    ],
    branch: [
      { "$project": { "arrays": "$$ROOT", "_id": 0 } },
      { "$unwind":  { "path": "$arrays.v" } },
      { "$match":   { "arrays._id": { "$eq": 1 } } },
      { "$project": { "arrays": { "_id": "$arrays._id", "v": "$arrays.v" }, "_id": 0 } }
    ]
  },
  {
    desc: "Filter can be pushed into derived table and utilize index",
    sql:  "SELECT t1.* FROM (SELECT * FROM nullable_fields AS t1) AS t1 WHERE t1.a > 100",
    main: [
      { "$match":   { "$expr": { "$and": [{ "$gt": ["$a", { "$literal": null }] }, { "$gt": ["$a", { "$literal": 100 }] }] } } },
      { "$project": { "t1": "$$ROOT", "_id": 0 } },
      { "$project": { "t1": "$t1", "_id": 0 } },
      { "$project": { "t1": "$t1", "_id": 0 } }
    ],
    branch: [
      { "$project": { "t1": "$$ROOT", "_id": 0 } },
      { "$project": { "t1": "$t1", "_id": 0 } },
      { "$match":   { "$and": [{ "t1.a": { "$gt": null } }, { "t1.a": { "$gt": 100 } }] } },
      { "$project": { "t1": "$t1", "_id": 0 } }
    ]
  }
];

function lcs(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => new Array(n+1).fill(0));
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = JSON.stringify(a[i-1]) === JSON.stringify(b[j-1])
        ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
  const rows = [];
  let i = m, j = n;
  while (i > 0 || j > 0) {
    if (i > 0 && j > 0 && JSON.stringify(a[i-1]) === JSON.stringify(b[j-1])) {
      rows.unshift({l: a[i-1], r: b[j-1], t: 'same'}); i--; j--;
    } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
      rows.unshift({l: null,   r: b[j-1], t: 'added'});   j--;
    } else {
      rows.unshift({l: a[i-1], r: null,   t: 'removed'}); i--;
    }
  }
  return rows;
}

function diffCell(stage) {
  if (!stage) return `<div class="cell empty"></div>`;
  const op = Object.keys(stage)[0];
  return `<div class="cell">
    <div class="op">${op}</div>
    <pre>${JSON.stringify(stage[op], null, 2)}</pre>
  </div>`;
}

const queryHeader = q => `<div class="qhead">
  <strong>${q.desc}</strong>
  <div class="qsql">${q.sql}</div>
</div>
<div class="cols">
  <div class="ch">main</div>
  <div class="ch">jp/match-language-not</div>
</div>`;

document.getElementById('diff-view').innerHTML = queries.map(q => {
  const rows = lcs(q.main, q.branch);
  let mi = 0, bi = 0;
  const diffHtml = rows.map(r => {
    if (r.l) mi++;
    if (r.r) bi++;
    return `<div class="row">
      ${diffCell(r.l)}
      ${diffCell(r.r)}
    </div>`;
  }).join('');
  return `<div class="query">${queryHeader(q)}${diffHtml}</div>`;
}).join('');

document.getElementById('plain-view').innerHTML = queries.map(q =>
  `<div class="query">
    ${queryHeader(q)}
    <div class="plain-body">
      <div class="plain-col"><pre>${JSON.stringify(q.main, null, 2)}</pre></div>
      <div class="plain-col"><pre>${JSON.stringify(q.branch, null, 2)}</pre></div>
    </div>
  </div>`
).join('');
</script>
</body>
</html>
