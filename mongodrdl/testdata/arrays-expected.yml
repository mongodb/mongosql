schema:
- db: test
  tables:
  - table: arrays
    collection: arrays
    pipeline: []
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: varchar
    - Name: close
      MongoType: float64
      SqlName: close
      SqlType: float64
    - Name: open
      MongoType: int
      SqlName: open
      SqlType: int
  - table: arrays_dates
    collection: arrays
    pipeline:
    - $unwind:
        includeArrayIndex: dates_idx
        path: $dates
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: varchar
    - Name: dates
      MongoType: date
      SqlName: dates
      SqlType: timestamp
    - Name: dates_idx
      MongoType: int
      SqlName: dates_idx
      SqlType: int
  - table: arrays_detail
    collection: arrays
    pipeline:
    - $unwind:
        includeArrayIndex: detail_idx
        path: $detail
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: varchar
    - Name: detail
      MongoType: int
      SqlName: detail
      SqlType: int
    - Name: detail_idx
      MongoType: int
      SqlName: detail_idx
      SqlType: int
  - table: arrays_docs
    collection: arrays
    pipeline:
    - $unwind:
        includeArrayIndex: docs_idx
        path: $docs
    columns:
    - Name: _id
      MongoType: bson.ObjectId
      SqlName: _id
      SqlType: varchar
    - Name: docs.a
      MongoType: string
      SqlName: docs.a
      SqlType: varchar
    - Name: docs.c
      MongoType: int
      SqlName: docs.c
      SqlType: int
    - Name: docs.d
      MongoType: int
      SqlName: docs.d
      SqlType: int
    - Name: docs.x
      MongoType: string
      SqlName: docs.x
      SqlType: varchar
    - Name: docs_idx
      MongoType: int
      SqlName: docs_idx
      SqlType: int